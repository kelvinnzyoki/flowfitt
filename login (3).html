<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FlowFit</title>
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
:root {
    --ink:          #07060c;
    --ink-1:        #0c0b12;
    --ink-2:        #111019;
    --g-card:       linear-gradient(145deg,rgba(20,18,32,0.95),rgba(14,13,22,0.95));
    --surface:      rgba(15,14,24,0.88);
    --Au:           #C9A84C;
    --Au-hi:        #E8C96A;
    --Au-lo:        #8E6E28;
    --Au-mist:      rgba(201,168,76,0.08);
    --Au-rim:       rgba(201,168,76,0.22);
    --Au-glow:      rgba(201,168,76,0.18);
    --g-Au:         linear-gradient(135deg,#E8C96A 0%,#C9A84C 50%,#8E6E28 100%);
    --sage:         #3BBF8A;
    --sage-dim:     rgba(59,191,138,0.12);
    --sky:          #5B9CF6;
    --coral:        #E07B54;
    --red:          #E05454;
    --t1:           #F0EBE0;
    --t2:           #8A8590;
    --t3:           #44404A;
    --t4:           #C4BFCA;
    --b1:           rgba(201,168,76,0.14);
    --b2:           rgba(201,168,76,0.26);
    --b3:           rgba(240,235,228,0.05);
    --b4:           rgba(240,235,228,0.09);
    --f-display:    'Josefin Sans', sans-serif;
    --f-serif:      'Lora', Georgia, serif;
    --f-mono:       'JetBrains Mono', monospace;
    --ease:         cubic-bezier(0.16,1,0.3,1);
    --r-card:       16px;
    --r-sm:         10px;
    --r-pill:       9999px;
    --sidebar-w:    270px;
    /* Legacy aliases — existing JS/inline styles resolve correctly */
    --bg-deep:          var(--ink);
    --bg-surface:       var(--ink-1);
    --bg-card:          var(--g-card);
    --bg-elevated:      var(--ink-2);
    --bg-dark:          var(--ink);
    --bg-sidebar:       var(--ink-1);
    --bg-primary:       var(--ink);
    --gold-main:        var(--Au);
    --gold-bright:      var(--Au-hi);
    --gold-deep:        var(--Au-lo);
    --gold-gradient:    var(--g-Au);
    --gold-soft:        var(--Au-mist);
    --gold-glow:        var(--Au-glow);
    --gold-gradient-soft:var(--Au-mist);
    --border-gold:      var(--b1);
    --border:           var(--b1);
    --border-subtle:    var(--b3);
    --text-primary:     var(--t1);
    --text-secondary:   var(--t2);
    --text-muted:       var(--t3);
    --accent:           var(--Au);
    --accent-green:     var(--sage);
    --action-red:       var(--red);
    --danger:           var(--red);
    --success:          var(--sage);
    --warning:          var(--coral);
    --glass-blur:       blur(20px);
    --transition:       all 0.3s cubic-bezier(0.16,1,0.3,1);
    --radius-card:      var(--r-card);
    --radius-btn:       var(--r-sm);
}


        :root {
            --gradient-accent: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --bg-dark: #0a0a0f;
            --bg-card: #1a1a24;
            --text-primary: var(--t1);
            --text-secondary: #a8a8b8;
            --accent: #f5576c;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--ink);
            color: var(--t1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: var(--g-card);
            padding: 3rem;
            border-radius: 25px;
            border: 1px solid var(--b1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
    font-family: 'Anton', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 14px rgba(212, 175, 55, 0.30));
}

        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .auth-header p  { color: var(--t2); font-size: 1rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.95rem; }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--b1);
            border-radius: 12px;
            color: var(--t1);
            font-size: 1rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--Au);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-input::placeholder { color: var(--t2); }

        .error-message {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
        .error-message.show { display: block; }

        .password-toggle { position: relative; }
        .password-toggle-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--t2);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-primary {
            background: var(--g-Au);
            color: #000;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .auth-footer { text-align: center; margin-top: 2rem; color: var(--t2); }
        .auth-footer a { color: var(--Au); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        

        @media (max-width: 768px) {
            .auth-card { padding: 2rem 1.5rem; }
            .logo { font-size: 2rem; }
            .auth-header h1 { font-size: 1.5rem; }
        }
    

/* ── Sidebar & Navigation Overrides ── */
.sidebar {
    background: var(--ink-1) !important;
    border-right: 1px solid var(--b1) !important;
    font-family: var(--f-display) !important;
}
.sidebar .logo,
.sidebar-logo {
    font-family: var(--f-display) !important;
    font-weight: 200 !important;
    font-size: 0.95rem !important;
    letter-spacing: 0.38em !important;
    color: var(--Au-hi) !important;
    background: none !important;
    -webkit-text-fill-color: var(--Au-hi) !important;
    text-transform: uppercase !important;
    text-decoration: none !important;
    display: block !important;
    margin-bottom: 2.4rem !important;
    padding: 0 !important;
}
.nav-link {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.78rem !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
    color: var(--t2) !important;
    border-radius: var(--r-sm) !important;
    padding: 0.72rem 1rem !important;
    transition: all 0.25s ease !important;
    border: 1px solid transparent !important;
    display: flex !important;
    align-items: center !important;
    gap: 0.75rem !important;
    text-decoration: none !important;
}
.nav-link:hover {
    color: var(--Au-hi) !important;
    background: var(--Au-mist) !important;
    border-color: var(--b1) !important;
}
.nav-link.active {
    background: var(--g-Au) !important;
    color: var(--ink) !important;
    font-weight: 400 !important;
    border-color: transparent !important;
}
.logout-btn {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.14em !important;
    text-transform: uppercase !important;
    color: var(--t2) !important;
    background: transparent !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-sm) !important;
}
.logout-btn:hover {
    color: var(--red) !important;
    border-color: rgba(224,84,84,0.4) !important;
    background: rgba(224,84,84,0.06) !important;
}
.user-avatar {
    background: var(--g-Au) !important;
    color: var(--ink) !important;
    font-family: var(--f-display) !important;
}
.user-info h4 {
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    font-size: 0.82rem !important;
    color: var(--t1) !important;
}
.plan-badge {
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    font-size: 0.58rem !important;
    letter-spacing: 0.1em !important;
    border-radius: 3px !important;
}
.plan-free    { background: var(--Au-mist) !important; color: var(--Au) !important; border: 1px solid var(--b1) !important; }
.plan-pro     { background: rgba(91,156,246,0.1) !important; color: var(--sky) !important; border: 1px solid rgba(91,156,246,0.25) !important; }
.plan-elite,
.plan-premium { background: rgba(201,168,76,0.15) !important; color: var(--Au-hi) !important; border: 1px solid var(--b2) !important; }

/* ── Top-level typography ── */
body {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    background-color: var(--ink) !important;
    color: var(--t1) !important;
    line-height: 1.7 !important;
    -webkit-font-smoothing: antialiased !important;
}

/* ── Page headers ── */
.header h1,
.page-title,
.header-left h1 {
    font-family: var(--f-serif) !important;
    font-weight: 300 !important;
    font-style: italic !important;
    letter-spacing: -0.01em !important;
    color: var(--t1) !important;
}
.header p,
.page-subtitle,
.header-left p {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.84rem !important;
    color: var(--t2) !important;
    letter-spacing: 0.03em !important;
}

/* ── Cards ── */
.card,
.stat-card,
.chart-card,
.panel-card,
.week-block,
.log-card,
.timer-card,
.sets-card,
.info-card,
.billing-card {
    background: var(--g-card) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-card) !important;
}

/* ── Stat values ── */
.stat-value,
.stat-number,
.streak-number,
.timer-display,
.trial-days {
    font-family: var(--f-mono) !important;
    font-weight: 300 !important;
    letter-spacing: -0.04em !important;
    background: var(--g-Au) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Buttons ── */
.btn,
button.btn,
a.btn {
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    font-size: 0.72rem !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
    /* Arrow tip shape */
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
    padding-right: 2rem !important;
}
.btn-primary,
.btn-start,
.btn-enroll,
.btn-log,
.btn-continue,
.btn-save,
.btn-log-workout,
.btn-start-session {
    background: var(--g-Au) !important;
    color: var(--ink) !important;
    border: none !important;
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
}
.btn-ghost,
.btn-secondary,
.btn-cancel,
.btn-details,
.btn-close-wm,
.btn-unlock {
    background: transparent !important;
    color: var(--Au-hi) !important;
    border: 1px solid var(--b2) !important;
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
}
/* Full-width buttons in modals / cards — no arrow tip */
.btn-full,
.btn-continue,
.btn-enroll,
.btn-log-workout,
.btn-start-session {
    clip-path: none !important;
    border-radius: var(--r-sm) !important;
    width: 100% !important;
}

/* Manage billing buttons (small, inline) */
.btn-manage {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    clip-path: none !important;
    border-radius: var(--r-sm) !important;
}

/* ── Form inputs ── */
input[type="text"],
input[type="email"],
input[type="password"],
input[type="number"],
input[type="date"],
input[type="tel"],
select,
textarea,
.form-input,
.form-select {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.84rem !important;
    background: rgba(201,168,76,0.04) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-sm) !important;
    color: var(--t1) !important;
    letter-spacing: 0.02em !important;
}
input:focus,
select:focus,
textarea:focus,
.form-input:focus {
    border-color: var(--Au) !important;
    outline: none !important;
    box-shadow: 0 0 0 3px var(--Au-mist) !important;
}
label,
.form-label {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    color: var(--t2) !important;
}

/* ── Badges / Pills ── */
.badge,
.difficulty-badge,
.status-pill,
.plan-tier-badge,
.hero-badge,
.premium-tag,
.free-tag {
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    font-size: 0.6rem !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
}

/* ── Filter tabs ── */
.tab-btn,
.time-btn,
.filter-btn {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
}
.tab-btn.active,
.time-btn.active,
.filter-btn.active {
    background: var(--g-Au) !important;
    color: var(--ink) !important;
    font-weight: 400 !important;
}

/* ── Modal ── */
.modal-backdrop,
.modal-overlay {
    background: rgba(0,0,0,0.72) !important;
    backdrop-filter: blur(6px) !important;
}
.modal-box,
.modal-content {
    background: var(--ink-2) !important;
    border: 1px solid var(--b2) !important;
    border-radius: var(--r-card) !important;
    font-family: var(--f-display) !important;
}
.modal-title {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
    color: var(--Au-hi) !important;
}

/* ── Loading ── */
.loading-text {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    letter-spacing: 0.2em !important;
    color: var(--Au) !important;
}
.spinner {
    border-color: var(--b1) !important;
    border-top-color: var(--Au) !important;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

/* ── Mobile menu button ── */
.mobile-menu-btn {
    background: var(--ink-1) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-sm) !important;
    color: var(--Au) !important;
}


/* ── Login/Register Auth Pages ── */
.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background:
        radial-gradient(circle at 20% 30%, rgba(201,168,76,0.1) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(142,110,40,0.07) 0%, transparent 45%);
}
.auth-card {
    background: var(--g-card) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-card) !important;
    padding: 3rem 2.5rem !important;
    position: relative !important;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6) !important;
}
.auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--g-Au);
    border-radius: var(--r-card) var(--r-card) 0 0;
}
.auth-card .logo {
    font-family: var(--f-display) !important;
    font-weight: 200 !important;
    font-size: 0.95rem !important;
    letter-spacing: 0.38em !important;
    color: var(--Au-hi) !important;
    background: none !important;
    -webkit-text-fill-color: var(--Au-hi) !important;
    text-transform: uppercase !important;
    margin-bottom: 2rem !important;
    display: block !important;
}
.auth-header h1 {
    font-family: var(--f-serif) !important;
    font-weight: 300 !important;
    font-style: italic !important;
    font-size: 1.8rem !important;
    color: var(--t1) !important;
    margin-bottom: 0.4rem !important;
}
.auth-header p {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.84rem !important;
    color: var(--t2) !important;
}

.auth-footer {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.8rem !important;
    color: var(--t2) !important;
    margin-top: 1.8rem !important;
    text-align: center !important;
}
.auth-footer a { color: var(--Au-hi) !important; text-decoration: none !important; }
.error-message,
.form-error {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.78rem !important;
    color: var(--red) !important;
}
.password-toggle-btn {
    background: none !important;
    border: none !important;
    color: var(--t2) !important;
    cursor: pointer !important;
    clip-path: none !important;
    padding: 0 !important;
    width: auto !important;
    height: auto !important;
}


/* ── Back to Home button ───────────────────────────────── */
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.4rem;
    padding: 0.55rem 1.1rem;
    background: rgba(212, 175, 55, 0.06);
    border: 1px solid rgba(212, 175, 55, 0.22);
    border-radius: 50px;
    color: rgba(212, 175, 55, 0.85);
    text-decoration: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: all 0.22s ease;
}
.back-link:hover {
    background: rgba(212, 175, 55, 0.12);
    border-color: rgba(212, 175, 55, 0.45);
    color: #F2D479;
    transform: translateX(-3px);
}



/* ════════════════════════════════════════════════════════
   GLOBAL POLISH — body, scrollbars, headings, page titles
════════════════════════════════════════════════════════ */

/* ── Body base ─────────────────────────────────────────── */
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ── All headings use Oswald ─────────────────────────────── */
h1, h2, h3, h4, h5, h6 {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
}

/* ── Page header (dashboard pages) ──────────────────────── */
.header h1,
.header-left h1,
.page-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #F0EBE0;
    margin-bottom: 0.25rem;
}

.header p,
.header-left p,
.page-subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    color: rgba(138, 133, 144, 0.85);
    font-weight: 400;
    letter-spacing: 0.01em;
}

/* ── Scrollbar global ────────────────────────────────────── */
::-webkit-scrollbar {
    width: 5px;
    height: 5px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

/* ══════════════════════════════════════════════════════════
   BUTTON SYSTEM — Arrow signature (matches index.html)
   Primary : gold-filled arrow → + shimmer + glow aura
   Ghost   : outlined arrow + fill-wash hover
   Both use clip-path polygon so shape is non-rectangular.
══════════════════════════════════════════════════════════ */

/* ── Base ──────────────────────────────────────────────── */
.btn,
button.btn,
a.btn,
.btn-primary,
.btn-ghost,
.btn-start,
.btn-enroll,
.btn-continue,
.btn-log,
.btn-save,
.btn-log-workout,
.btn-start-session,
.btn-unlock,
.btn-details {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0.78rem 2.4rem 0.78rem 1.6rem;
    position: relative;
    white-space: nowrap;
    border-radius: 0;
    overflow: hidden;
    transition:
        transform 0.28s cubic-bezier(0.16,1,0.3,1),
        box-shadow 0.28s cubic-bezier(0.16,1,0.3,1),
        filter 0.28s ease;
    /* Arrow tip: right-pointing pentagon */
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
}

/* ── Primary — gold fill ───────────────────────────────── */
.btn-primary,
.btn-start,
.btn-enroll,
.btn-continue,
.btn-log,
.btn-save,
.btn-log-workout,
.btn-start-session,
.btn-unlock {
    background: linear-gradient(135deg, #E8C96A 0%, #C9A84C 50%, #8E6E28 100%) !important;
    color: #0a0800 !important;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%) !important;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.22),
        0 5px 22px rgba(201,168,76,0.40),
        0 2px 8px rgba(0,0,0,0.38) !important;
}

/* Shimmer sweep */
.btn-primary::before,
.btn-start::before,
.btn-enroll::before,
.btn-continue::before,
.btn-log::before,
.btn-save::before,
.btn-log-workout::before,
.btn-start-session::before,
.btn-unlock::before {
    content: '';
    position: absolute;
    top: -60%; left: -120%;
    width: 52%; height: 220%;
    background: linear-gradient(108deg, transparent 20%, rgba(255,255,255,0.38) 50%, transparent 80%);
    transition: left 0.52s cubic-bezier(0.16,1,0.3,1);
    pointer-events: none;
}

.btn-primary:hover::before,
.btn-start:hover::before,
.btn-enroll:hover::before,
.btn-continue:hover::before,
.btn-log:hover::before,
.btn-save:hover::before,
.btn-log-workout:hover::before,
.btn-start-session:hover::before,
.btn-unlock:hover::before {
    left: 175%;
}

/* Glow aura */
.btn-primary::after,
.btn-start::after,
.btn-enroll::after,
.btn-continue::after,
.btn-log::after,
.btn-save::after,
.btn-log-workout::after,
.btn-start-session::after,
.btn-unlock::after {
    content: '';
    position: absolute;
    inset: -6px;
    background: radial-gradient(ellipse at 65% 50%, rgba(201,168,76,0.52), transparent 65%);
    opacity: 0;
    transition: opacity 0.32s ease;
    z-index: -1;
    filter: blur(10px);
    pointer-events: none;
}

.btn-primary:hover::after,
.btn-start:hover::after,
.btn-enroll:hover::after,
.btn-continue:hover::after,
.btn-log:hover::after,
.btn-save:hover::after,
.btn-log-workout:hover::after,
.btn-start-session:hover::after,
.btn-unlock:hover::after {
    opacity: 1;
}

.btn-primary:hover,
.btn-start:hover,
.btn-enroll:hover,
.btn-continue:hover,
.btn-log:hover,
.btn-save:hover,
.btn-log-workout:hover,
.btn-start-session:hover,
.btn-unlock:hover {
    transform: translateY(-2px) !important;
    filter: brightness(1.06) !important;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        0 10px 36px rgba(201,168,76,0.54),
        0 3px 12px rgba(0,0,0,0.42) !important;
}

.btn-primary:active,
.btn-start:active,
.btn-enroll:active,
.btn-continue:active {
    transform: translateY(0) !important;
    filter: brightness(0.96) !important;
}

.btn-primary:disabled,
.btn-start:disabled,
.btn-enroll:disabled,
.btn-continue:disabled,
.btn-log-workout:disabled {
    opacity: 0.52;
    cursor: not-allowed;
    transform: none !important;
    filter: none !important;
}

/* ── Ghost — outlined arrow ────────────────────────────── */
.btn-ghost,
.btn-details {
    background: transparent !important;
    color: #E8C96A !important;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%) !important;
    box-shadow: inset 0 0 0 1.5px rgba(201,168,76,0.30) !important;
    padding: 0.78rem 2.4rem 0.78rem 1.6rem !important;
}

.btn-ghost::before,
.btn-details::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.04) 100%);
    opacity: 0;
    transition: opacity 0.32s ease;
    pointer-events: none;
}

.btn-ghost::after,
.btn-details::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1.5px rgba(201,168,76,0.65);
    opacity: 0;
    transition: opacity 0.32s ease;
    pointer-events: none;
}

.btn-ghost:hover::before,
.btn-details:hover::before { opacity: 1; }
.btn-ghost:hover::after,
.btn-details:hover::after  { opacity: 1; }

.btn-ghost:hover,
.btn-details:hover {
    color: #F0EBE0 !important;
    transform: translateY(-1px) !important;
    box-shadow:
        inset 0 0 0 1.5px rgba(201,168,76,0.32),
        0 3px 20px rgba(201,168,76,0.12) !important;
}

/* ── Small/inline variant ──────────────────────────────── */
.btn-sm {
    font-size: 0.64rem !important;
    padding: 0.56rem 1.8rem 0.56rem 1.2rem !important;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%) !important;
}

/* ── Full-width (forms/checkout) ───────────────────────── */
.btn-full,
.btn[style*="width:100%"],
.btn[style*="width: 100%"] {
    width: 100% !important;
    clip-path: none !important;
    border-radius: 10px !important;
    padding: 0.88rem 1.8rem !important;
}

/* ── Logout stays subtle red (no arrow) ────────────────── */
.logout-btn,
.sidebar .logout-btn {
    clip-path: none !important;
    border-radius: 8px !important;
    background: transparent !important;
    border: 1px solid rgba(224, 84, 84, 0.28) !important;
    color: rgba(224, 84, 84, 0.85) !important;
    font-family: 'Josefin Sans', sans-serif !important;
    font-size: 0.7rem !important;
    font-weight: 300 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    padding: 0.7rem 1rem !important;
    width: 100% !important;
    justify-content: center !important;
    box-shadow: none !important;
}

.logout-btn:hover,
.sidebar .logout-btn:hover {
    background: rgba(224, 84, 84, 0.08) !important;
    border-color: rgba(224, 84, 84, 0.52) !important;
    color: #E05454 !important;
    transform: none !important;
    filter: none !important;
}

</style>

</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="auth-card">
            <div class="logo">FlowFit</div>

            <div class="auth-header">
                <h1>Welcome Back!</h1>
                <p>Login to continue your fitness journey</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        type="email"
                        class="form-input"
                        id="email"
                        placeholder="your@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-toggle">
                        <input
                            type="password"
                            class="form-input"
                            id="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle-btn" onclick="togglePassword()">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ── Redirect if already authenticated ─────────────────────────────────
        // isAuthenticated() now checks for stored user profile data (not a localStorage token).
        // If present, the user is considered logged in — the ff_access cookie will be
        // validated automatically when the first protected API call is made.
        if (isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        const form         = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn    = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            errorMessage.classList.remove('show');
            errorMessage.textContent = '';

            submitBtn.disabled    = true;
            submitBtn.textContent = 'Logging in...';

            try {
                const result = await AuthAPI.login(email, password);

                if (result.success) {
                    // User profile is now stored in localStorage by AuthAPI.login().
                    // The HTTP-only ff_access + ff_refresh cookies were set by the server.
                    Toast.success('Login successful!');

                    const redirect = localStorage.getItem('redirectAfterLogin') || 'dashboard.html';
                    localStorage.removeItem('redirectAfterLogin');

                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 500);
                }
            } catch (error) {
                errorMessage.textContent = error.message || 'Login failed. Please check your credentials.';
                errorMessage.classList.add('show');
                Toast.error(error.message || 'Login failed');
            } finally {
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Login';
            }
        });

        function togglePassword() {
            const input = document.getElementById('password');
            input.type  = input.type === 'password' ? 'text' : 'password';
        }

        // Enter key on any input submits the form
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
            });
        });
    </script>
</body>
