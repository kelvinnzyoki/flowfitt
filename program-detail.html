<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program - FlowFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300;400&family=Lora:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/*
 * FlowFit — Shared Design System
 * Applies the landing-page aesthetic (Josefin Sans + Lora + JetBrains Mono,
 * obsidian-gold tokens, sidebar, cards, inputs, buttons) to all interior pages.
 *
 * Specificity note: many existing rules use !important.
 * We match or exceed that where needed, but prefer clean overrides via :root tokens.
 */

/* ═══════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════ */
:root {
  /* backgrounds */
  --ink:         #07060c;
  --ink-1:       #0c0b12;
  --ink-2:       #111019;
  --ink-3:       #16142080;
  --surface:     rgba(15, 14, 24, 0.88);
  --surface-2:   rgba(20, 18, 32, 0.72);
  --g-card:      linear-gradient(145deg, rgba(20,18,32,0.95), rgba(14,13,22,0.95));

  /* gold */
  --Au:          #C9A84C;
  --Au-hi:       #E8C96A;
  --Au-lo:       #8E6E28;
  --Au-mist:     rgba(201, 168, 76, 0.08);
  --Au-rim:      rgba(201, 168, 76, 0.22);
  --Au-glow:     rgba(201, 168, 76, 0.18);
  --g-Au:        linear-gradient(135deg, #E8C96A 0%, #C9A84C 50%, #8E6E28 100%);

  /* accents */
  --sage:        #3BBF8A;
  --sage-dim:    rgba(59, 191, 138, 0.12);
  --sky:         #5B9CF6;
  --coral:       #E07B54;
  --red:         #E05454;

  /* text */
  --t1:          #F0EBE0;
  --t2:          #8A8590;
  --t3:          #44404A;
  --t4:          #C4BFCA;

  /* borders */
  --b1:          rgba(201, 168, 76, 0.14);
  --b2:          rgba(201, 168, 76, 0.26);
  --b3:          rgba(240, 235, 228, 0.05);
  --b4:          rgba(240, 235, 228, 0.09);

  /* typography */
  --f-display:   'Josefin Sans', sans-serif;
  --f-serif:     'Lora', Georgia, serif;
  --f-mono:      'JetBrains Mono', monospace;

  /* motion */
  --ease:        cubic-bezier(0.16, 1, 0.3, 1);

  /* layout */
  --sidebar-w:   270px;
  --r-card:      16px;
  --r-sm:        10px;
  --r-pill:      9999px;

  /* legacy aliases — keeps existing JS/inline-styles working */
  --bg-deep:          var(--ink);
  --bg-surface:       var(--ink-1);
  --bg-card:          var(--g-card);
  --bg-elevated:      var(--ink-2);
  --gold-main:        var(--Au);
  --gold-bright:      var(--Au-hi);
  --gold-deep:        var(--Au-lo);
  --gold-gradient:    var(--g-Au);
  --gold-soft:        var(--Au-mist);
  --gold-glow:        var(--Au-glow);
  --border-gold:      var(--b1);
  --border-gold-hover:var(--b2);
  --text-primary:     var(--t1);
  --text-secondary:   var(--t2);
  --accent-green:     var(--sage);
  --transition:       all 0.3s var(--ease);
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  overflow-x: hidden;
  max-width: 100vw;
}

body {
  font-family: var(--f-display);
  font-weight: 300;
  background-color: var(--ink);
  color: var(--t1);
  min-height: 100vh;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════════════════════ */
#loadingOverlay {
  position: fixed;
  inset: 0;
  background: var(--ink);
  z-index: 10000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 2px solid var(--b1);
  border-top-color: var(--Au);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
  margin-bottom: 1.5rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-family: var(--f-display);
  font-weight: 300;
  letter-spacing: 0.2em;
  color: var(--Au);
  font-size: 0.75rem;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════ */
#toastContainer {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.toast {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: 0.82rem;
  letter-spacing: 0.03em;
  padding: 0.8rem 1.4rem;
  border-radius: var(--r-sm);
  border: 1px solid var(--b2);
  background: var(--ink-2);
  color: var(--t1);
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  animation: toastIn 0.3s var(--ease);
}

@keyframes toastIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ═══════════════════════════════════════════════════════
   LAYOUT — SIDEBAR + MAIN CONTENT
═══════════════════════════════════════════════════════ */
.dashboard-container,
.app-container {
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: var(--sidebar-w) !important;
  height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  background: var(--ink-1) !important;
  border-right: 1px solid var(--b1) !important;
  display: flex !important;
  flex-direction: column !important;
  padding: 2rem 1.5rem !important;
  z-index: 100 !important;
  transition: transform 0.3s var(--ease) !important;
}

/* Logo inside sidebar */
.sidebar .logo {
  font-family: var(--f-display) !important;
  font-weight: 200 !important;
  font-size: 1rem !important;
  letter-spacing: 0.38em !important;
  color: var(--Au-hi) !important;
  background: none !important;
  -webkit-text-fill-color: unset !important;
  text-decoration: none !important;
  display: block !important;
  margin-bottom: 2.4rem !important;
  padding: 0 !important;
  text-transform: uppercase !important;
}

/* Nav menu */
.nav-menu {
  list-style: none !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 0.2rem !important;
  flex: 1 !important;
}

.nav-item {
  width: 100% !important;
}

.nav-link {
  display: flex !important;
  align-items: center !important;
  gap: 0.8rem !important;
  padding: 0.72rem 1rem !important;
  color: var(--t2) !important;
  text-decoration: none !important;
  border-radius: var(--r-sm) !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.8rem !important;
  letter-spacing: 0.06em !important;
  text-transform: uppercase !important;
  transition: all 0.25s ease !important;
  border: 1px solid transparent !important;
}

.nav-link:hover {
  color: var(--Au-hi) !important;
  background: var(--Au-mist) !important;
  border-color: var(--b1) !important;
}

.nav-link.active {
  color: var(--ink) !important;
  background: var(--g-Au) !important;
  border-color: transparent !important;
  font-weight: 400 !important;
}

/* Spacer pushes user section to bottom */
.nav-spacer {
  flex: 1 !important;
  min-height: 1rem !important;
}

/* User section at sidebar bottom */
.user-section {
  border-top: 1px solid var(--b1) !important;
  padding-top: 1.2rem !important;
  margin-top: auto !important;
}

.user-profile {
  display: flex !important;
  align-items: center !important;
  gap: 0.8rem !important;
  margin-bottom: 0.9rem !important;
}

.user-avatar {
  width: 36px !important;
  height: 36px !important;
  border-radius: 50% !important;
  background: var(--g-Au) !important;
  color: var(--ink) !important;
  font-family: var(--f-display) !important;
  font-weight: 600 !important;
  font-size: 0.85rem !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  flex-shrink: 0 !important;
}

.user-info h4 {
  font-family: var(--f-display) !important;
  font-weight: 400 !important;
  font-size: 0.82rem !important;
  color: var(--t1) !important;
  margin-bottom: 0.2rem !important;
  white-space: nowrap !important;
  overflow: hidden !important;
  text-overflow: ellipsis !important;
}

/* Plan badge */
.plan-badge {
  display: inline-block !important;
  padding: 0.12rem 0.6rem !important;
  border-radius: 3px !important;
  font-family: var(--f-display) !important;
  font-weight: 400 !important;
  font-size: 0.6rem !important;
  letter-spacing: 0.12em !important;
  text-transform: uppercase !important;
}

.plan-free {
  background: var(--Au-mist) !important;
  color: var(--Au) !important;
  border: 1px solid var(--b1) !important;
}

.plan-pro {
  background: rgba(91, 156, 246, 0.1) !important;
  color: var(--sky) !important;
  border: 1px solid rgba(91, 156, 246, 0.25) !important;
}

.plan-elite,
.plan-premium {
  background: rgba(201, 168, 76, 0.15) !important;
  color: var(--Au-hi) !important;
  border: 1px solid var(--b2) !important;
}

/* Logout button */
.logout-btn {
  width: 100% !important;
  padding: 0.65rem 1rem !important;
  background: transparent !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-sm) !important;
  color: var(--t2) !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.72rem !important;
  letter-spacing: 0.12em !important;
  text-transform: uppercase !important;
  cursor: pointer !important;
  transition: all 0.25s ease !important;
  text-align: center !important;
}

.logout-btn:hover {
  color: var(--red) !important;
  border-color: rgba(224, 84, 84, 0.4) !important;
  background: rgba(224, 84, 84, 0.06) !important;
}

/* ── MAIN CONTENT ── */
.main-content,
.main {
  margin-left: var(--sidebar-w) !important;
  flex: 1 !important;
  min-height: 100vh !important;
  padding: 2.5rem 3rem !important;
  overflow-x: hidden !important;
}

/* Mobile menu button */
.mobile-menu-btn {
  display: none !important;
  position: fixed !important;
  top: 1rem !important;
  left: 1rem !important;
  z-index: 200 !important;
  width: 40px !important;
  height: 40px !important;
  background: var(--ink-1) !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-sm) !important;
  color: var(--Au) !important;
  font-size: 1.1rem !important;
  cursor: pointer !important;
  align-items: center !important;
  justify-content: center !important;
}

/* Sidebar overlay (mobile) */
.sidebar-overlay {
  display: none !important;
  position: fixed !important;
  inset: 0 !important;
  background: rgba(0, 0, 0, 0.65) !important;
  z-index: 99 !important;
  backdrop-filter: blur(4px) !important;
}

/* ═══════════════════════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════════════════════ */
.header,
.page-header {
  display: flex !important;
  justify-content: space-between !important;
  align-items: flex-start !important;
  flex-wrap: wrap !important;
  gap: 1rem !important;
  margin-bottom: 2.5rem !important;
}

.header h1,
.page-header h1,
.page-title,
.header-left h1 {
  font-family: var(--f-serif) !important;
  font-weight: 300 !important;
  font-style: italic !important;
  font-size: clamp(1.6rem, 2.5vw, 2.2rem) !important;
  letter-spacing: -0.01em !important;
  color: var(--t1) !important;
  margin-bottom: 0.3rem !important;
}

.header p,
.page-header p,
.page-subtitle,
.header-left p {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.84rem !important;
  color: var(--t2) !important;
  letter-spacing: 0.03em !important;
}

/* ═══════════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════════ */
.card,
.stat-card,
.chart-card,
.program-card,
.exercise-card,
.form-section,
.week-block,
.panel-card,
.current-plan-banner,
.plan-card {
  background: var(--g-card) !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-card) !important;
  backdrop-filter: blur(16px) !important;
  transition: border-color 0.25s ease, box-shadow 0.25s ease !important;
}

.card:hover,
.stat-card:hover,
.program-card:hover,
.exercise-card:hover {
  border-color: var(--b2) !important;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 32px var(--Au-glow) !important;
}

/* Stat cards */
.stat-card {
  padding: 1.6rem !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 0.5rem !important;
}

/* Stat icon — replace emoji display */
.stat-icon {
  width: 40px !important;
  height: 40px !important;
  border-radius: var(--r-sm) !important;
  background: var(--Au-mist) !important;
  border: 1px solid var(--b1) !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  font-size: 1.1rem !important;
  margin-bottom: 0.4rem !important;
  color: var(--Au) !important;
}

.stat-value {
  font-family: var(--f-mono) !important;
  font-weight: 300 !important;
  font-size: clamp(1.6rem, 2.5vw, 2.2rem) !important;
  letter-spacing: -0.04em !important;
  line-height: 1 !important;
  background: var(--g-Au) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;
}

.stat-label {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.75rem !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  color: var(--t2) !important;
}

/* ═══════════════════════════════════════════════════════
   GRIDS
═══════════════════════════════════════════════════════ */
.stats-grid {
  display: grid !important;
  grid-template-columns: repeat(4, 1fr) !important;
  gap: 1.2rem !important;
  margin-bottom: 2rem !important;
}

.chart-grid {
  display: grid !important;
  grid-template-columns: repeat(2, 1fr) !important;
  gap: 1.2rem !important;
  margin-bottom: 2rem !important;
}

.exercise-grid,
.programs-grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
  gap: 1.2rem !important;
}

/* ═══════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════ */
.btn,
button.btn,
a.btn {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 0.5rem !important;
  font-family: var(--f-display) !important;
  font-weight: 400 !important;
  font-size: 0.73rem !important;
  letter-spacing: 0.12em !important;
  text-transform: uppercase !important;
  text-decoration: none !important;
  cursor: pointer !important;
  border: none !important;
  white-space: nowrap !important;
  padding: 0.75rem 2.2rem !important;
  position: relative !important;
  overflow: hidden !important;
  /* Arrow tip: pointed right pentagon */
  clip-path: polygon(
    0 0,
    calc(100% - 16px) 0,
    100% 50%,
    calc(100% - 16px) 100%,
    0 100%
  ) !important;
  border-radius: 0 !important;
  transition:
    transform 0.3s var(--ease),
    box-shadow 0.3s var(--ease),
    filter 0.3s ease !important;
}

/* Shimmer sweep on primary */
.btn-primary::before,
.btn-enroll::before,
.btn-start::before,
.btn-log::before,
.btn-continue::before,
.btn-save::before {
  content: '' !important;
  position: absolute !important;
  top: -60% !important;
  left: -110% !important;
  width: 55% !important;
  height: 220% !important;
  background: linear-gradient(
    108deg,
    transparent 20%,
    rgba(255, 255, 255, 0.38) 50%,
    transparent 80%
  ) !important;
  transition: left 0.55s var(--ease) !important;
  pointer-events: none !important;
}

/* Primary filled */
.btn-primary,
.btn-enroll,
.btn-start,
.btn-log,
.btn-continue,
.btn-save,
button[class*="btn-primary"],
input[type="submit"] {
  background: var(--g-Au) !important;
  color: var(--ink) !important;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.22),
    0 5px 22px rgba(201, 168, 76, 0.42),
    0 2px 8px rgba(0, 0, 0, 0.38) !important;
}

.btn-primary:hover,
.btn-enroll:hover,
.btn-start:hover,
.btn-log:hover,
.btn-continue:hover,
.btn-save:hover {
  transform: translateY(-2px) !important;
  filter: brightness(1.06) !important;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.28),
    0 10px 32px rgba(201, 168, 76, 0.54),
    0 4px 12px rgba(0, 0, 0, 0.42) !important;
}

.btn-primary:hover::before,
.btn-enroll:hover::before,
.btn-start:hover::before,
.btn-log:hover::before,
.btn-continue:hover::before,
.btn-save:hover::before {
  left: 170% !important;
}

/* Ghost outlined */
.btn-ghost,
.btn-details,
.btn-cancel,
.btn-secondary,
button[class*="btn-secondary"],
button[class*="btn-ghost"] {
  background: transparent !important;
  color: var(--Au-hi) !important;
  box-shadow: inset 0 0 0 1.5px rgba(201, 168, 76, 0.32) !important;
}

.btn-ghost:hover,
.btn-details:hover,
.btn-cancel:hover,
.btn-secondary:hover {
  color: var(--t1) !important;
  transform: translateY(-2px) !important;
  box-shadow:
    inset 0 0 0 1.5px rgba(201, 168, 76, 0.6),
    0 4px 20px rgba(201, 168, 76, 0.14) !important;
  background: rgba(201, 168, 76, 0.08) !important;
}

/* Danger / destructive */
.btn-danger,
.logout-btn-top,
button[class*="btn-danger"] {
  background: transparent !important;
  color: var(--red) !important;
  clip-path: polygon(
    0 0,
    calc(100% - 16px) 0,
    100% 50%,
    calc(100% - 16px) 100%,
    0 100%
  ) !important;
  box-shadow: inset 0 0 0 1.5px rgba(224, 84, 84, 0.3) !important;
}

.btn-danger:hover {
  background: rgba(224, 84, 84, 0.08) !important;
  box-shadow: inset 0 0 0 1.5px rgba(224, 84, 84, 0.6) !important;
}

/* Full-width override (used on modal/form submit) */
.btn-full,
.btn[style*="width:100%"],
.btn[style*="width: 100%"] {
  clip-path: none !important;
  border-radius: var(--r-sm) !important;
  width: 100% !important;
  padding: 0.85rem 2rem !important;
}

/* ═══════════════════════════════════════════════════════
   INPUTS & FORMS
═══════════════════════════════════════════════════════ */
.form-group {
  display: flex !important;
  flex-direction: column !important;
  gap: 0.45rem !important;
  margin-bottom: 1.2rem !important;
}

.form-label {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.72rem !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
  color: var(--t2) !important;
}

.form-input,
.form-select,
.form-textarea,
input[type="text"],
input[type="email"],
input[type="password"],
input[type="number"],
input[type="date"],
input[type="tel"],
select,
textarea {
  width: 100% !important;
  padding: 0.78rem 1rem !important;
  background: rgba(201, 168, 76, 0.04) !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-sm) !important;
  color: var(--t1) !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.85rem !important;
  letter-spacing: 0.02em !important;
  transition: border-color 0.25s ease, box-shadow 0.25s ease !important;
  outline: none !important;
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus,
input:focus,
select:focus,
textarea:focus {
  border-color: var(--Au) !important;
  box-shadow: 0 0 0 3px var(--Au-mist) !important;
}

input::placeholder,
textarea::placeholder {
  color: var(--t3) !important;
  font-weight: 300 !important;
}

select option {
  background: var(--ink-2) !important;
  color: var(--t1) !important;
}

.form-section {
  padding: 2rem !important;
  border-radius: var(--r-card) !important;
  margin-bottom: 1.5rem !important;
}

.form-section h2 {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.8rem !important;
  letter-spacing: 0.14em !important;
  text-transform: uppercase !important;
  color: var(--Au) !important;
  margin-bottom: 1.5rem !important;
  padding-bottom: 0.75rem !important;
  border-bottom: 1px solid var(--b1) !important;
}

.form-grid {
  display: grid !important;
  grid-template-columns: repeat(2, 1fr) !important;
  gap: 1rem !important;
}

/* Error messages */
.error-message,
.form-error {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.78rem !important;
  color: var(--red) !important;
  letter-spacing: 0.02em !important;
  min-height: 1.2rem !important;
  padding: 0.5rem 0 !important;
}

/* ═══════════════════════════════════════════════════════
   FILTER TABS / TIME BUTTONS
═══════════════════════════════════════════════════════ */
.filter-tabs,
.time-filters {
  display: flex !important;
  gap: 0.3rem !important;
  background: rgba(201, 168, 76, 0.04) !important;
  padding: 0.35rem !important;
  border-radius: var(--r-sm) !important;
  border: 1px solid var(--b1) !important;
}

.tab-btn,
.time-btn {
  padding: 0.5rem 1.2rem !important;
  background: transparent !important;
  border: none !important;
  border-radius: 8px !important;
  color: var(--t2) !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.72rem !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  cursor: pointer !important;
  transition: all 0.25s ease !important;
}

.tab-btn:hover,
.time-btn:hover {
  color: var(--t1) !important;
}

.tab-btn.active,
.time-btn.active {
  background: var(--g-Au) !important;
  color: var(--ink) !important;
  font-weight: 400 !important;
}

/* ═══════════════════════════════════════════════════════
   SEARCH BAR
═══════════════════════════════════════════════════════ */
.search-bar {
  position: relative !important;
  display: flex !important;
  align-items: center !important;
}

.search-bar input {
  padding-left: 2.8rem !important;
  min-width: 240px !important;
}

.search-icon {
  position: absolute !important;
  left: 0.9rem !important;
  color: var(--t2) !important;
  font-size: 0.85rem !important;
  pointer-events: none !important;
}

/* ═══════════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════════ */
.modal {
  display: none !important;
  position: fixed !important;
  inset: 0 !important;
  background: rgba(0, 0, 0, 0.7) !important;
  z-index: 1000 !important;
  align-items: center !important;
  justify-content: center !important;
  padding: 1rem !important;
  backdrop-filter: blur(6px) !important;
}

.modal.active {
  display: flex !important;
}

.modal-content {
  background: var(--ink-2) !important;
  border: 1px solid var(--b2) !important;
  border-radius: var(--r-card) !important;
  padding: 2rem !important;
  width: 100% !important;
  max-width: 500px !important;
  max-height: 90vh !important;
  overflow-y: auto !important;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7) !important;
}

.modal-header {
  display: flex !important;
  justify-content: space-between !important;
  align-items: center !important;
  margin-bottom: 1.5rem !important;
  padding-bottom: 1rem !important;
  border-bottom: 1px solid var(--b1) !important;
}

.modal-header h2,
.modal-header h3 {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.9rem !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
  color: var(--Au-hi) !important;
}

.close-btn {
  background: none !important;
  border: none !important;
  color: var(--t2) !important;
  font-size: 1.2rem !important;
  cursor: pointer !important;
  padding: 0.25rem !important;
  line-height: 1 !important;
  transition: color 0.2s !important;
  clip-path: none !important;
}

.close-btn:hover {
  color: var(--t1) !important;
}

/* ── FlowFit Confirm Dialog ── */
.ff-confirm-box {
  background: var(--ink-2) !important;
  border: 1px solid var(--b2) !important;
  border-radius: var(--r-card) !important;
  padding: 2rem !important;
  max-width: 420px !important;
  width: 100% !important;
  text-align: center !important;
}

.ff-confirm-icon {
  font-size: 2rem !important;
  margin-bottom: 1rem !important;
  color: var(--Au) !important;
}

.ff-confirm-title {
  font-family: var(--f-display) !important;
  font-weight: 400 !important;
  font-size: 0.88rem !important;
  letter-spacing: 0.12em !important;
  text-transform: uppercase !important;
  color: var(--t1) !important;
  margin-bottom: 0.75rem !important;
}

.ff-confirm-msg {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.82rem !important;
  color: var(--t2) !important;
  line-height: 1.7 !important;
  margin-bottom: 1.5rem !important;
}

.ff-confirm-actions {
  display: flex !important;
  gap: 0.75rem !important;
  justify-content: center !important;
}

.ff-confirm-ok.danger {
  background: rgba(224, 84, 84, 0.15) !important;
  color: var(--red) !important;
  box-shadow: inset 0 0 0 1.5px rgba(224, 84, 84, 0.4) !important;
}

/* ═══════════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════════ */
.empty-state {
  text-align: center !important;
  padding: 4rem 2rem !important;
  color: var(--t2) !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.88rem !important;
  letter-spacing: 0.03em !important;
}

/* ═══════════════════════════════════════════════════════
   BADGES / TAGS
═══════════════════════════════════════════════════════ */
.difficulty-badge,
.category-badge,
.program-badge,
.status-pill {
  display: inline-flex !important;
  align-items: center !important;
  padding: 0.2rem 0.65rem !important;
  border-radius: 3px !important;
  font-family: var(--f-display) !important;
  font-weight: 400 !important;
  font-size: 0.62rem !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
}

.difficulty-beginner,
.difficulty-beginner.difficulty-badge {
  background: rgba(59, 191, 138, 0.1) !important;
  color: var(--sage) !important;
  border: 1px solid rgba(59, 191, 138, 0.25) !important;
}

.difficulty-intermediate {
  background: rgba(201, 168, 76, 0.1) !important;
  color: var(--Au) !important;
  border: 1px solid var(--b1) !important;
}

.difficulty-advanced {
  background: rgba(224, 123, 84, 0.1) !important;
  color: var(--coral) !important;
  border: 1px solid rgba(224, 123, 84, 0.28) !important;
}

/* ═══════════════════════════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════════════════════════ */
.progress-bar,
.week-progress,
.strength-bar {
  height: 4px !important;
  background: var(--b3) !important;
  border-radius: 2px !important;
  overflow: hidden !important;
}

.progress-fill,
.week-progress-fill,
.strength-fill {
  height: 100% !important;
  background: var(--g-Au) !important;
  border-radius: 2px !important;
  transition: width 0.4s var(--ease) !important;
}

/* ═══════════════════════════════════════════════════════
   TOP NAV (workout-session / program-detail — no sidebar)
═══════════════════════════════════════════════════════ */
.top-nav {
  position: sticky !important;
  top: 0 !important;
  z-index: 100 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  padding: 1rem 2rem !important;
  background: rgba(7, 6, 12, 0.92) !important;
  border-bottom: 1px solid var(--b1) !important;
  backdrop-filter: blur(28px) !important;
}

.nav-left {
  display: flex !important;
  align-items: center !important;
  gap: 1rem !important;
}

.nav-title {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.82rem !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  color: var(--t2) !important;
}

.back-btn {
  background: transparent !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-sm) !important;
  color: var(--t2) !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.75rem !important;
  letter-spacing: 0.08em !important;
  padding: 0.45rem 1rem !important;
  cursor: pointer !important;
  transition: all 0.25s ease !important;
  clip-path: none !important;
}

.back-btn:hover {
  color: var(--Au-hi) !important;
  border-color: var(--b2) !important;
}

.logo-small {
  font-family: var(--f-display) !important;
  font-weight: 200 !important;
  font-size: 0.85rem !important;
  letter-spacing: 0.3em !important;
  color: var(--Au-hi) !important;
  text-transform: uppercase !important;
}

/* ═══════════════════════════════════════════════════════
   AUTH PAGES (login / register)
═══════════════════════════════════════════════════════ */
.auth-container {
  min-height: 100vh !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  padding: 2rem !important;
  position: relative !important;
}

.auth-card {
  background: var(--g-card) !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-card) !important;
  padding: 3rem 2.5rem !important;
  width: 100% !important;
  max-width: 440px !important;
  position: relative !important;
  backdrop-filter: blur(24px) !important;
  box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6) !important;
}

/* Pinstripe top */
.auth-card::before {
  content: '' !important;
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  height: 2px !important;
  background: var(--g-Au) !important;
  border-radius: var(--r-card) var(--r-card) 0 0 !important;
}

.auth-card .logo {
  font-family: var(--f-display) !important;
  font-weight: 200 !important;
  font-size: 1rem !important;
  letter-spacing: 0.38em !important;
  color: var(--Au-hi) !important;
  background: none !important;
  -webkit-text-fill-color: unset !important;
  text-transform: uppercase !important;
  margin-bottom: 2rem !important;
  display: block !important;
}

.auth-header {
  margin-bottom: 2rem !important;
}

.auth-header h1 {
  font-family: var(--f-serif) !important;
  font-weight: 300 !important;
  font-style: italic !important;
  font-size: 1.8rem !important;
  letter-spacing: -0.01em !important;
  color: var(--t1) !important;
  margin-bottom: 0.4rem !important;
}

.auth-header p {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.84rem !important;
  color: var(--t2) !important;
  letter-spacing: 0.03em !important;
}

.auth-footer {
  margin-top: 1.8rem !important;
  text-align: center !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.8rem !important;
  color: var(--t2) !important;
  letter-spacing: 0.03em !important;
}

.auth-footer a {
  color: var(--Au-hi) !important;
  text-decoration: none !important;
  transition: color 0.2s !important;
}

.auth-footer a:hover {
  color: var(--t1) !important;
}

.back-link {
  position: absolute !important;
  top: 2rem !important;
  left: 2rem !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.78rem !important;
  letter-spacing: 0.06em !important;
  color: var(--t2) !important;
  text-decoration: none !important;
  transition: color 0.25s !important;
}

.back-link:hover {
  color: var(--Au-hi) !important;
}

/* Password toggle */
.password-toggle {
  position: relative !important;
}

.password-toggle-btn {
  position: absolute !important;
  right: 0.9rem !important;
  top: 50% !important;
  transform: translateY(-50%) !important;
  background: none !important;
  border: none !important;
  color: var(--t2) !important;
  cursor: pointer !important;
  font-size: 0.9rem !important;
  padding: 0 !important;
  clip-path: none !important;
  width: auto !important;
  height: auto !important;
  line-height: 1 !important;
}

/* Password strength */
.password-strength {
  margin-top: 0.6rem !important;
}

.strength-bar {
  height: 3px !important;
  background: var(--b3) !important;
  border-radius: 2px !important;
}

/* ═══════════════════════════════════════════════════════
   CHART CARDS
═══════════════════════════════════════════════════════ */
.chart-card {
  padding: 1.8rem !important;
  border-radius: var(--r-card) !important;
}

.chart-card h3,
.chart-title {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.78rem !important;
  letter-spacing: 0.12em !important;
  text-transform: uppercase !important;
  color: var(--t2) !important;
  margin-bottom: 1.2rem !important;
}

/* ═══════════════════════════════════════════════════════
   EXERCISE CARDS
═══════════════════════════════════════════════════════ */
.exercise-card {
  border-radius: var(--r-card) !important;
  overflow: hidden !important;
  cursor: pointer !important;
}

.exercise-image {
  width: 100% !important;
  height: 160px !important;
  object-fit: cover !important;
  display: block !important;
  background: var(--ink-2) !important;
}

.exercise-content {
  padding: 1.4rem !important;
}

.exercise-title {
  font-family: var(--f-display) !important;
  font-weight: 400 !important;
  font-size: 0.9rem !important;
  letter-spacing: 0.04em !important;
  text-transform: uppercase !important;
  color: var(--t1) !important;
  margin-bottom: 0.5rem !important;
}

.exercise-description {
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.8rem !important;
  color: var(--t2) !important;
  line-height: 1.7 !important;
  margin-bottom: 0.8rem !important;
}

.exercise-meta {
  display: flex !important;
  gap: 0.5rem !important;
  flex-wrap: wrap !important;
  align-items: center !important;
}

.exercise-tags {
  display: flex !important;
  gap: 0.4rem !important;
  flex-wrap: wrap !important;
  margin-top: 0.6rem !important;
}

.exercise-actions {
  display: flex !important;
  gap: 0.6rem !important;
  margin-top: 1rem !important;
}

/* ═══════════════════════════════════════════════════════
   PROGRAM CARDS
═══════════════════════════════════════════════════════ */
.program-card {
  border-radius: var(--r-card) !important;
  overflow: hidden !important;
  cursor: pointer !important;
}

.program-header {
  padding: 1.8rem !important;
  background: var(--Au-mist) !important;
  border-bottom: 1px solid var(--b1) !important;
}

.program-icon {
  font-size: 2rem !important;
  margin-bottom: 0.75rem !important;
  display: block !important;
  width: 48px !important;
  height: 48px !important;
  background: var(--Au-mist) !important;
  border: 1px solid var(--b1) !important;
  border-radius: var(--r-sm) !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}

.program-meta {
  display: grid !important;
  grid-template-columns: repeat(3, 1fr) !important;
  gap: 0.75rem !important;
  padding: 1.2rem 1.6rem !important;
}

/* ═══════════════════════════════════════════════════════
   CONTROLS BAR (search + filters)
═══════════════════════════════════════════════════════ */
.controls {
  display: flex !important;
  align-items: center !important;
  gap: 1rem !important;
  flex-wrap: wrap !important;
  margin-bottom: 2rem !important;
}

/* ═══════════════════════════════════════════════════════
   PLAN / SUBSCRIPTION CARDS
═══════════════════════════════════════════════════════ */
.plan-card {
  border-radius: var(--r-card) !important;
  padding: 2rem !important;
  position: relative !important;
  transition:
    transform 0.35s var(--ease),
    box-shadow 0.35s var(--ease),
    border-color 0.35s ease !important;
}

.plan-card.featured,
.plan-card.popular {
  border-color: rgba(201, 168, 76, 0.38) !important;
  transform: translateY(-12px) !important;
  box-shadow:
    0 0 0 1px rgba(201, 168, 76, 0.07),
    0 28px 70px rgba(0, 0, 0, 0.7),
    0 0 90px rgba(201, 168, 76, 0.13) !important;
}

/* ═══════════════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════════════ */
::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}

::-webkit-scrollbar-track {
  background: var(--ink);
}

::-webkit-scrollbar-thumb {
  background: var(--b2);
  border-radius: 2px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--Au-lo);
}

/* ═══════════════════════════════════════════════════════
   DEV / TRIAL BANNER
═══════════════════════════════════════════════════════ */
.dev-banner,
.trial-banner,
.alert-banner {
  display: flex !important;
  align-items: flex-start !important;
  gap: 1rem !important;
  padding: 1.2rem 1.6rem !important;
  border-radius: var(--r-card) !important;
  margin-bottom: 1.5rem !important;
  font-family: var(--f-display) !important;
  font-weight: 300 !important;
  font-size: 0.82rem !important;
}

.dev-banner {
  background: rgba(91, 156, 246, 0.08) !important;
  border: 1px solid rgba(91, 156, 246, 0.22) !important;
  color: var(--sky) !important;
}

.trial-banner {
  background: var(--Au-mist) !important;
  border: 1px solid var(--b1) !important;
  color: var(--t1) !important;
}

.alert-past-due {
  background: rgba(224, 84, 84, 0.08) !important;
  border: 1px solid rgba(224, 84, 84, 0.28) !important;
  color: var(--t1) !important;
}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════ */
@media (max-width: 1100px) {
  .stats-grid {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  .chart-grid {
    grid-template-columns: 1fr !important;
  }
}

@media (max-width: 768px) {
  :root {
    --sidebar-w: 0px;
  }

  .mobile-menu-btn {
    display: flex !important;
  }

  .sidebar {
    transform: translateX(-100%) !important;
    width: 260px !important;
  }

  .sidebar.mobile-active {
    transform: translateX(0) !important;
  }

  .sidebar-overlay.mobile-active {
    display: block !important;
  }

  .main-content,
  .main {
    margin-left: 0 !important;
    padding: 1.5rem !important;
    padding-top: 4rem !important;
  }

  .stats-grid {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  .exercise-grid,
  .programs-grid {
    grid-template-columns: 1fr !important;
  }

  .form-grid {
    grid-template-columns: 1fr !important;
  }

  .header,
  .page-header {
    flex-direction: column !important;
    align-items: flex-start !important;
  }
}

@media (max-width: 480px) {
  .stats-grid {
    grid-template-columns: 1fr !important;
  }

  .auth-card {
    padding: 2rem 1.5rem !important;
  }

  .btn {
    clip-path: none !important;
    border-radius: var(--r-sm) !important;
  }
}


/* Program detail — no sidebar layout */
.main {
    margin-left: 0 !important;
    padding: 0 !important;
}
/* Hero section */
.hero {
    position: relative;
    min-height: 280px;
    display: flex;
    align-items: flex-end;
    padding: 2rem;
    overflow: hidden;
}
.hero-bg {
    position: absolute;
    inset: 0;
    background: var(--ink-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    opacity: 0.15;
    user-select: none;
}
.hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to top,
        rgba(7,6,12,0.95) 0%,
        rgba(7,6,12,0.5) 60%,
        transparent 100%
    );
}
.hero-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
    width: 100%;
}
.breadcrumb {
    font-family: var(--f-display);
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--t2);
    margin-bottom: 0.75rem;
}
.breadcrumb a {
    color: var(--Au);
    text-decoration: none;
}
.hero-title {
    font-family: var(--f-serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    color: var(--t1);
    margin-bottom: 0.5rem;
}
.hero-meta {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    font-family: var(--f-display);
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--t2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}
/* Program body content */
.program-body {
    max-width: 960px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
}
.week-accordion {
    margin-bottom: 0.75rem;
}
.week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.5rem;
    background: var(--g-card);
    border: 1px solid var(--b1);
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: border-color 0.25s ease;
    font-family: var(--f-display);
    font-weight: 300;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--t1);
}
.week-header:hover {
    border-color: var(--b2);

'},{id:'ex-plank',name:'Plank',category:'CORE',caloriesPerMin:5,description:'Core stability.'}]}]}))},

let prog=null,enroll=null,activeEx=null,_activeDay='',_activeDayIndex=-1;

// updatePlanBadge() is provided by api.js — uses live subscription data with caching
async function loadAll(){
    try { populateSidebarUser(); } catch (_) {}
    try { updatePlanBadge(); } catch (_) {}
    LoadingManager.show('Loading...');
    // Safety net: force-hide after 10s
    const _safetyTimer = setTimeout(() => LoadingManager.hide(), 10000);
    try{
        const[pR,eR]=await Promise.all([ProgramsAPI.getProgramById(PROG_ID),ProgramsAPI.getUserPrograms()]);
        // API returns { success, data: programObject } — pR.data IS the full program
        if(pR.success&&pR.data){
            prog=pR.data;
            // Normalise exercises in each day so they work with render functions
            // DB shape: day.exercises[k] = DayExercise { id, exercise:{id,name,...}, ... }
            // We flatten to: { id, name, category, caloriesPerMin, description }
            if(prog.weeks&&prog.weeks.length){
                prog.weeks.forEach(wk=>(wk.days||[]).forEach(day=>{
                    day.exercises=(day.exercises||[]).map(de=>{
                        if(de.exercise) return {
                            id:           de.exercise.id||de.exerciseId||de.id,
                            name:         de.exercise.name||'Exercise',
                            category:     de.exercise.category||'STRENGTH',
                            caloriesPerMin: de.exercise.caloriesPerMin||de.exercise.calories_per_min||8,
                            description:  de.exercise.description||'',
                        };
                        return de; // already flat shape
                    });
                }));
            } else {
                // weeks empty — enrich with fallback weeks if same title matches
                const f=FALLBACK.find(p=>p.id===PROG_ID||p.title===prog.title);
                if(f) prog.weeks=f.weeks;
            }
        } else {
            prog=FALLBACK.find(p=>p.id===PROG_ID)||FALLBACK[0];
        }
        // Enrollment: eR.data is array of { id, programId, progress, program:{...} }
        if(eR.success&&eR.data){
            enroll=eR.data.find(e=>
                e.programId===PROG_ID||
                e.program?.id===PROG_ID||
                String(e.programId)===String(PROG_ID)
            )||null;
            // Compute progress percent if completedDays/totalDays present
            if(enroll&&enroll.completedDays!=null){
                const tot=(prog.durationWeeks||0)*(prog.daysPerWeek||0)||1;
                enroll.progress=Math.round((enroll.completedDays/tot)*100);
            }
        }
        if(!enroll&&EID)enroll={id:EID,programId:PROG_ID,progress:0};
    }catch(err){
        console.warn('Program load error:',err);
        prog=FALLBACK.find(p=>p.id===PROG_ID)||FALLBACK[0];
        enroll=EID?{id:EID,programId:PROG_ID,progress:0}:null;
    }
    finally{ clearTimeout(_safetyTimer); LoadingManager.hide(); }
    if(!prog){document.getElementById('heroTitle').textContent='Program Not Found';return;}
    renderHero();renderIncludes();renderWeeks();renderPanel();
    checkCompletionRedirect();
}

function renderIncludes(){

}
function renderWeeks(){
    const weeks=prog.weeks||[],totalDays=(prog.durationWeeks||0)*(prog.daysPerWeek||0),pct=enroll?(enroll.progress||0):0,doneDays=Math.round(pct/100*totalDays);
    let dc=0;
    document.getElementById('weeksContainer').innerHTML=weeks.map((wk,wi)=>{
        const days=wk.days||[],ws=dc;
        const dh=days.map((day,di)=>{
            const gi=dc+di,isDone=gi<doneDays,isCur=!isDone&&gi===doneDays&&!!enroll,chips=(day.exercises||[]).map(ex=>{
                const _n=ex.name||ex.exercise?.name||ex.exerciseName||'Exercise';
                const _c=(ex.category||ex.exercise?.category||'STRENGTH').toUpperCase();
                return`<span class="ex-chip">${CI[_c]||'💪'} ${_n}</span>`;
            }).join('');
            return `<div class="day-row ${isDone?'completed-day':''} ${isCur?'current-day':''}"><div class="day-num">${isCur?'▶':isDone?'✓':di+1}</div><div class="day-info"><div class="day-title">Day ${day.dayNumber}: ${day.title||'Workout Day'}</div><div class="day-exercises">${chips}</div></div><div class="day-status">${isDone?'<span class="status-done">✅</span>':isCur?`<button class="status-current" onclick="openDay(${gi})">Start →</button>`:'<span class="status-locked">🔒</span>'}</div></div>`;
        }).join('');
        const doneW=Math.max(0,Math.min(days.length,doneDays-ws)),wPct=Math.round(doneW/days.length*100);
        dc+=days.length;
        return `<div class="week-block"><div class="week-header ${wi===0?'open':''}" onclick="toggleWeek(this)"><div class="week-num">W${wi+1}</div><div class="week-info"><div class="week-title">${wk.title||'Week '+(wi+1)}</div><div class="week-meta">${days.length} sessions · ${days.flatMap(d=>d.exercises||[]).length} exercises</div></div><span class="week-chevron">▾</span></div><div class="week-progress-bar"><div class="week-progress-fill" style="width:${wPct}%"></div></div><div class="week-body ${wi===0?'open':''}">${dh}</div></div>`;
    }).join('');
}
function getDayAt(idx){let c=0;for(const wk of(prog.weeks||[])){for(const d of(wk.days||[])){if(c===idx)return d;c++;}}return null;}

// ── Day overview modal — shows ALL exercises for the current day ──────────────

        return `<div style="display:flex;align-items:center;gap:.85rem;padding:.75rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:.5rem">
            <span style="font-size:1.4rem;width:36px;text-align:center">${icon}</span>
            <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:.95rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
                <div style="color:var(--text-secondary);font-size:.78rem">${cat}${cal ? ' · 🔥 ' + cal + ' cal/min' : ''}</div>
            </div>
            <button onclick="hideModal();showModal(dayExercises[${idx}])"
                style="padding:.45rem .85rem;background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.3);color:#D4AF37;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Oswald',sans-serif;letter-spacing:.5px">
                Preview ›
            </button>
            <button onclick="hideModal();startExercise(${idx})"
                style="padding:.45rem .85rem;background:linear-gradient(135deg,#D4AF37,#b8860b);border:none;color:#000;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Oswald',sans-serif;letter-spacing:.5px">
                Start →
            </button>
        </div>`;
    }).join('');

    // Store exercises array on window so inline onclick can access them
    window.dayExercises = d.exercises;

    // Use the existing wmodal but repurpose it as day overview
    const modal = document.getElementById('wmodal');
    modal.innerHTML = `
        <div class="wm-box" style="max-width:520px">
            <div class="wm-hero" id="wmHero" style="background:var(--ga);min-height:90px;display:flex;align-items:center;justify-content:center;gap:1rem;padding:1.25rem 1.5rem;flex-direction:column">
                <div style="font-size:2rem">📅</div>
                <div style="font-family:'Oswald',sans-serif;font-size:1.4rem;letter-spacing:1px;color:#fff">${_activeDay}: ${d.title || 'Workout Day'}</div>
                <div style="font-size:.82rem;color:rgba(255,255,255,.7)">${d.exercises.length} exercise${d.exercises.length !== 1 ? 's' : ''} · Do all for a full session</div>
            </div>
            <div class="wm-body" style="padding:1.25rem 1.5rem 1.5rem">
                <div style="margin-bottom:1rem">${exItems}</div>
                <div style="display:flex;gap:.75rem;margin-top:1.25rem">
                    <button onclick="hideModal()" style="flex:1;padding:.85rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;border-radius:12px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:.9rem;letter-spacing:1px">CLOSE</button>
                    <button onclick="hideModal();markDayComplete()" style="flex:1;padding:.85rem;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:#4ade80;border-radius:12px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px">✅ MARK DAY DONE</button>
                </div>
            </div>
        </div>`;
    modal.classList.add('active');
}

// Start a specific exercise by index within the current day
function startExercise(exIndex) {
    // Legacy entry point — redirects through goToSession with index
    goToSession(exIndex);
}
function toggleWeek(h){const b=h.nextElementSibling.nextElementSibling;h.classList.toggle('open');b.classList.toggle('open');}
function renderPanel(){
    const p=prog,e=enroll,tot=(p.durationWeeks||0)*(p.daysPerWeek||0),pct=e?Math.round(e.progress||0):0,done=Math.round(pct/100*tot),left=tot-done,curW=Math.min(Math.floor(done/(p.daysPerWeek||3))+1,p.durationWeeks||4),curD=(done%(p.daysPerWeek||3))+1;
    const circ=376.99;
    document.getElementById('progRingFill').style.strokeDashoffset=circ-(circ*pct/100);
    document.getElementById('progPct').textContent=pct+'%';
    document.getElementById('statDone').textContent=done;
    document.getElementById('statLeft').textContent=left;
    document.getElementById('statWeek').textContent=curW;
    document.getElementById('statDay').textContent=curD;
    const cta=document.getElementById('ctaArea');
    if(!e){document.getElementById('panelTitle').textContent='Join This Program';cta.innerHTML='<button class="btn-enroll" onclick="enrollNow()">Enroll Now →</button>';}
    else if(pct>=100){cta.innerHTML='<button class="btn-continue" disabled>✅ Completed!</button>';}
    else{cta.innerHTML=`<button class="btn-continue" onclick="continueNow()">Continue: Day ${curD} →</button>`;renderNextCard(done);}
}
function renderNextCard(done){
    const day=getDayAt(done);if(!day)return;
    document.getElementById('nextCard').style.display='block';
    document.getElementById('nextContent').innerHTML=`<div style="font-weight:700;margin-bottom:.25rem;">Day ${day.dayNumber}: ${day.title||'Workout Day'}</div><div style="color:var(--s);font-size:.82rem;margin-bottom:.75rem;">${(day.exercises||[]).length} exercises</div>${(day.exercises||[]).map(ex=>`<div style="display:flex;align-items:center;gap:.75rem;padding:.55rem;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);margin-bottom:.4rem;cursor:pointer;" onclick='showModal(${JSON.stringify(ex).replace(/'/g,"&#39;")})'><span style="font-size:1.1rem;">${CI[(ex.category||'').toUpperCase()]||'💪'}</span><div style="flex:1;"><div style="font-weight:600;font-size:.85rem;">${ex.name||ex.exercise?.name||'Exercise'}</div><div style="color:var(--s);font-size:.76rem;">${ex.category||ex.exercise?.category||''} · ${ex.caloriesPerMin||ex.exercise?.caloriesPerMin||0} cal/min</div></div><span style="color:var(--acc);font-size:.8rem;font-weight:700;">Preview ›</span></div>`).join('')}`;
}
function continueNow(){const tot=(prog.durationWeeks||0)*(prog.daysPerWeek||0),done=Math.round((enroll?enroll.progress||0:0)/100*tot);openDay(done);}
function showModal(ex){
    activeEx=ex;
    const cat=(ex.category||'STRENGTH').toUpperCase(),icon=CI[cat]||'💪',gi=Object.keys(CI).indexOf(cat)%CG.length;
    const modal = document.getElementById('wmodal');

            <div class="wm-box">
                <div class="wm-hero" id="wmHero"></div>
                <div class="wm-body" id="wmBody">
                    <div class="wm-header">
                        <span class="wm-icon" id="wmIcon"></span>
                        <div>
                            <h2 id="wmTitle" class="wm-title"></h2>
                            <p id="wmCat" class="wm-cat"></p>
                        </div>
                    </div>
                    <p id="wmCal" class="wm-cal"></p>
                    <p id="wmDesc" class="wm-desc"></p>
                    <ol id="wmSteps" class="wm-steps"></ol>
                    <div class="wm-actions">
                        <button class="btn-wm-go" onclick="goToSession()">🏋️ START THIS EXERCISE</button>

    document.getElementById('wmDesc').textContent=ex.description||'Perform with controlled form.';
    const steps=STEPS[ex.id]||['Start in correct position.','Perform with controlled form.','Rest between sets.'];
    document.getElementById('wmSteps').innerHTML=steps.map((s,i)=>`<li class="wm-step"><div class="wm-step-n">${i+1}</div><p class="wm-step-t">${s}</p></li>`).join('');
    modal.classList.add('active');

function closeModal(){document.getElementById('wmodal').classList.remove('active');}
function hideModal(){document.getElementById('wmodal').classList.remove('active');}
// ── Per-exercise completion helpers ──────────────────────────────────────────
function _exKey(dayIdx) {
    return `ff_ex_${PROG_ID}_${enroll ? enroll.id : 'none'}_d${dayIdx}`;
}
function getCompletedExercises(dayIdx) {
    try { return JSON.parse(localStorage.getItem(_exKey(dayIdx)) || '[]'); }
    catch { return []; }
}
function setExerciseDone(dayIdx, exIdx) {
    const done = getCompletedExercises(dayIdx);
    if (!done.includes(exIdx)) { done.push(exIdx); localStorage.setItem(_exKey(dayIdx), JSON.stringify(done)); }
}
function clearExerciseProgress(dayIdx) {
    localStorage.removeItem(_exKey(dayIdx));
}

// ── Launch a specific exercise from the current day ───────────────────────────
function goToSession(exIdx) {
    const d = getDayAt(_activeDayIndex);
    if (!d || !d.exercises[exIdx]) return;
    const ex  = d.exercises[exIdx];
    const eid = enroll ? enroll.id : '';
    const name = ex.name || ex.exercise?.name || 'Exercise';
    const cat  = (ex.category || ex.exercise?.category || 'STRENGTH');
    const cal  = ex.caloriesPerMin || ex.exercise?.caloriesPerMin || 8;
    const id   = ex.id || ex.exerciseId || ex.exercise?.id || '';
    // Pass exIdx back so we know which exercise was completed on return
    const returnUrl = encodeURIComponent(
        `program-detail.html?id=${PROG_ID}&enrollmentId=${eid}&exDone=1&dayIndex=${_activeDayIndex}&exIndex=${exIdx}`
    );
    location.href = `workout-session.html?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&cal=${cal}&category=${encodeURIComponent(cat)}&program=${encodeURIComponent(PROG_ID)}&enrollment=${encodeURIComponent(eid)}&day=${encodeURIComponent(_activeDay)}&dayIndex=${_activeDayIndex}&exIndex=${exIdx}&returnUrl=${returnUrl}`;
}

// ── Render the day modal with per-exercise checklist ─────────────────────────
function openDay(gi) {
    const d = getDayAt(gi);
    if (!d || !d.exercises || !d.exercises.length) return;
    _activeDay       = `Day ${d.dayNumber}`;
    _activeDayIndex  = gi;
    window.dayExercises = d.exercises;
    renderDayModal();
}

function renderDayModal() {
    const d    = getDayAt(_activeDayIndex);
    if (!d) return;
    const done = getCompletedExercises(_activeDayIndex);
    const total = d.exercises.length;
    const allDone = done.length >= total;

    const exItems = d.exercises.map((ex, idx) => {
        const name   = ex.name || ex.exercise?.name || 'Exercise';
        const cat    = (ex.category || ex.exercise?.category || 'STRENGTH').toUpperCase();
        const icon   = CI[cat] || '💪';
        const cal    = ex.caloriesPerMin || ex.exercise?.caloriesPerMin || 0;
        const isDone = done.includes(idx);
        return `
        <div style="display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;
                    background:${isDone ? 'rgba(74,222,128,0.07)' : 'rgba(255,255,255,0.03)'};
                    border:1px solid ${isDone ? 'rgba(74,222,128,0.25)' : 'rgba(255,255,255,0.07)'};
                    border-radius:14px;margin-bottom:.55rem;transition:all .25s">
            <div style="width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
                        font-size:${isDone ? '1.1rem' : '1.3rem'};
                        background:${isDone ? 'rgba(74,222,128,0.18)' : 'rgba(255,255,255,0.06)'};
                        border:1px solid ${isDone ? 'rgba(74,222,128,0.4)' : 'transparent'}">
                ${isDone ? '✓' : icon}
            </div>
            <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:.95rem;color:${isDone ? '#4ade80' : '#fff'};
                            text-decoration:${isDone ? 'line-through' : 'none'};
                            white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
                <div style="color:var(--text-secondary);font-size:.75rem;margin-top:1px">
                    ${cat}${cal ? ' · 🔥 ' + cal + ' cal/min' : ''}${isDone ? ' · <span style="color:#4ade80">Done!</span>' : ''}
                </div>
            </div>
            ${isDone
                ? `<div style="padding:.4rem .75rem;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.3);
                              color:#4ade80;border-radius:8px;font-size:.78rem;font-weight:700;font-family:'Oswald',sans-serif">DONE ✓</div>`
                : `<button onclick="hideModal();goToSession(${idx})"
                        style="padding:.5rem .9rem;background:linear-gradient(135deg,#D4AF37,#b8860b);border:none;
                               color:#000;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;
                               white-space:nowrap;font-family:'Oswald',sans-serif;letter-spacing:.5px">
                        Start →
                   </button>`
            }
        </div>`;
    }).join('');

    // Progress bar
    const pct = total > 0 ? Math.round((done.length / total) * 100) : 0;

    const modal = document.getElementById('wmodal');
    modal.innerHTML = `
        <div class="wm-box" style="max-width:520px">
            <div class="wm-hero" style="background:var(--ga);min-height:90px;display:flex;align-items:center;
                    justify-content:center;gap:1rem;padding:1.25rem 1.5rem;flex-direction:column">
                <div style="font-size:2rem">${allDone ? '🏆' : '📅'}</div>
                <div style="font-family:'Oswald',sans-serif;font-size:1.3rem;letter-spacing:1px;color:#fff">
                    ${_activeDay}: ${d.title || 'Workout Day'}
                </div>
                <div style="font-size:.82rem;color:rgba(255,255,255,.7)">
                    ${done.length}/${total} exercise${total !== 1 ? 's' : ''} completed
                </div>
                <div style="width:100%;max-width:280px;height:5px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden">
                    <div style="height:100%;width:${pct}%;background:${allDone ? '#4ade80' : '#D4AF37'};
                                border-radius:10px;transition:width .4s ease"></div>
                </div>
            </div>
            <div class="wm-body" style="padding:1.25rem 1.5rem 1.5rem">
                <div style="margin-bottom:1rem">${exItems}</div>
                <div style="display:flex;gap:.75rem;margin-top:1.25rem">
                    <button onclick="hideModal()"
                        style="flex:1;padding:.85rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
                               color:#aaa;border-radius:12px;cursor:pointer;font-family:'Oswald',sans-serif;
                               font-size:.9rem;letter-spacing:1px">CLOSE</button>
                    <button onclick="hideModal();markDayComplete()"
                        id="btnMarkDone"
                        style="flex:1.4;padding:.85rem;
                               background:${allDone ? 'rgba(74,222,128,0.18)' : 'rgba(255,255,255,0.05)'};
                               border:1px solid ${allDone ? 'rgba(74,222,128,0.4)' : 'rgba(255,255,255,0.12)'};
                               color:${allDone ? '#4ade80' : '#aaa'};border-radius:12px;cursor:pointer;
                               font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px;
                               transition:all .25s">

                    </button>
                </div>
                ${!allDone ? `<p style="text-align:center;font-size:.76rem;color:rgba(255,255,255,.35);margin-top:.75rem">
                    Finish all exercises to unlock day completion</p>` : ''}
            </div>
        </div>`;
    modal.classList.add('active');
}

// ── Mark a day complete and persist to API ────────────────────────────────────
async function markDayComplete(fromSession = false) {
    if (!enroll) {
        Toast.warning('Enroll in this program first to track progress.');
        closeModal();
        return;
    }
    const dayIndex = _activeDayIndex;
    if (dayIndex < 0) { closeModal(); return; }

    const tot = (prog.durationWeeks || 0) * (prog.daysPerWeek || 0) || 1;
    const currentDone = enroll.completedDays ?? Math.round((enroll.progress || 0) / 100 * tot);
    if (dayIndex !== currentDone) {
        Toast.warning('Complete days in order — finish the current day first.');
        return;
    }

    closeModal();
    LoadingManager.show('Saving progress...');

    try {
        const newCompleted   = currentDone + 1;
        const newCurrentWeek = Math.min(Math.floor(newCompleted / (prog.daysPerWeek || 3)) + 1, prog.durationWeeks || 4);
        const newCurrentDay  = (newCompleted % (prog.daysPerWeek || 3)) + 1;

        const res = await ProgramsAPI.updateProgress(enroll.id, {
            completedDays: newCompleted,
            currentWeek:   newCurrentWeek,
            currentDay:    newCurrentDay,
        });

        if (res.success) {
            enroll.completedDays = newCompleted;
            enroll.currentWeek   = newCurrentWeek;
            enroll.currentDay    = newCurrentDay;
            enroll.progress      = Math.round((newCompleted / tot) * 100);

            // Clear per-exercise progress for this day — it's fully done
            clearExerciseProgress(dayIndex);

            const d = getDayAt(dayIndex);
            const exCount = d?.exercises?.length || 0;
            Toast.success(`Day ${newCompleted} complete! ${exCount > 1 ? 'All ' + exCount + ' exercises done.' : ''} Keep it up 🔥`);
            renderPanel();
            renderWeeks();
        } else {
            Toast.error('Could not save progress. Try again.');
        }
    } catch (err) {
        console.error('markDayComplete error:', err);
        Toast.error(err.message || 'Failed to save progress.');
    } finally {
        LoadingManager.hide();
    }
}

// ── Handle redirect back from workout-session ─────────────────────────────────
// Two cases:
//   ?exDone=1&dayIndex=N&exIndex=M  → mark exercise M as done, re-open day modal
//   ?completed=1&dayIndex=N         → legacy — mark whole day (kept for safety)
function checkCompletionRedirect() {
    const urlParams = new URLSearchParams(location.search);
    const clean = `program-detail.html?id=${PROG_ID}${EID ? '&enrollmentId=' + EID : ''}`;

    if (urlParams.get('exDone') === '1') {
        const dayIdx = parseInt(urlParams.get('dayIndex') ?? '-1', 10);
        const exIdx  = parseInt(urlParams.get('exIndex')  ?? '-1', 10);
        history.replaceState({}, '', clean);
        if (dayIdx < 0 || exIdx < 0) return;

        _activeDayIndex = dayIdx;
        setExerciseDone(dayIdx, exIdx);

        const d     = getDayAt(dayIdx);
        const total = d?.exercises?.length || 0;
        const done  = getCompletedExercises(dayIdx);
        const name  = d?.exercises?.[exIdx]?.name || d?.exercises?.[exIdx]?.exercise?.name || 'Exercise';

        Toast.success(`${name} logged! ${done.length}/${total} done.`);

        // Small delay so toast shows before modal opens
        setTimeout(() => openDay(dayIdx), 400);
        return;
    }

    if (urlParams.get('completed') === '1') {
        const dayIdx = parseInt(urlParams.get('dayIndex') ?? '-1', 10);
        if (dayIdx < 0) return;
        history.replaceState({}, '', clean);
        _activeDayIndex = dayIdx;
        markDayComplete(true);
    }
}
function enrollNow(){
    showConfirm({
        icon:'🏋️', title:'Enroll in Program',
        message:`Ready to start <strong style="color:#D4AF37">${prog.title}</strong>?`,
        okText:'ENROLL NOW', cancelText:'Not Yet',
        onOk: async ()=>{
    try{LoadingManager.show('Enrolling...');const r=await ProgramsAPI.enrollInProgram(PROG_ID);if(r.success){enroll=r.data;Toast.success('Enrolled! 🎉');renderPanel();renderWeeks();}
        }catch(e){Toast.error(e.message||'Enrollment failed');}finally{LoadingManager.hide();}
        }
    });
}
function handleLogout() {
    showConfirm({ icon:'🚪', title:'LOG OUT', message:'Log out of FlowFit Elite?', okText:'LOG OUT', cancelText:'Stay', danger:true, onOk: async ()=>{ LoadingManager.show('Logging out...'); await AuthAPI.logout(); } });
}
document.getElementById('wmodal').addEventListener('click',e=>{if(e.target===document.getElementById('wmodal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.addEventListener('DOMContentLoaded', () => { try { requireAuth(); } catch(_) {} loadAll(); });

/* ── SIDEBAR SCROLL-LOCK ──────────────────────────── */

function showConfirm({ icon = '⚠️', title = 'Are you sure?', message = '', okText = 'Confirm', cancelText = 'Cancel', danger = false, onOk }) {
    const ex = document.getElementById('ff-confirm');
    if (ex) ex.remove();
    const backdrop = document.createElement('div');
    backdrop.className = 'ff-confirm-backdrop';
    backdrop.id = 'ff-confirm';
    backdrop.innerHTML = `
        <div class="ff-confirm-box">
            <span class="ff-confirm-icon">${icon}</span>
            <div class="ff-confirm-title">${title}</div>
            <p class="ff-confirm-msg">${message}</p>
            <div class="ff-confirm-actions">
                <button class="ff-confirm-cancel" id="ffCancel">${cancelText}</button>
                <button class="ff-confirm-ok ${danger ? 'danger' : ''}" id="ffOk">${okText}</button>
            </div>
        </div>`;
    document.body.appendChild(backdrop);
    const close = () => {
        backdrop.style.opacity = '0';
        backdrop.style.pointerEvents = 'none';
        backdrop.style.visibility = 'hidden';
        if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
    };
    backdrop.querySelector('#ffCancel').addEventListener('click', e => { e.stopPropagation(); close(); });
    backdrop.querySelector('#ffOk').addEventListener('click', e => { e.stopPropagation(); close(); if (onOk) onOk(); });
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
    });
}
