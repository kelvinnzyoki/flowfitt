    <title>Program - FlowFit</title>

    <style>
:root {
    --ink:          #07060c;
    --ink-1:        #0c0b12;
    --ink-2:        #111019;
    --g-card:       linear-gradient(145deg,rgba(20,18,32,0.95),rgba(14,13,22,0.95));
    --surface:      rgba(15,14,24,0.88);
    --Au:           #C9A84C;
    --Au-hi:        #E8C96A;
    --Au-lo:        #8E6E28;
    --Au-mist:      rgba(201,168,76,0.08);
    --Au-rim:       rgba(201,168,76,0.22);
    --Au-glow:      rgba(201,168,76,0.18);
    --g-Au:         linear-gradient(135deg,#E8C96A 0%,#C9A84C 50%,#8E6E28 100%);
    --sage:         #3BBF8A;
    --sage-dim:     rgba(59,191,138,0.12);
    --sky:          #5B9CF6;
    --coral:        #E07B54;
    --red:          #E05454;
    --t1:           #F0EBE0;
    --t2:           #8A8590;
    --t3:           #44404A;
    --t4:           #C4BFCA;
    --b1:           rgba(201,168,76,0.14);
    --b2:           rgba(201,168,76,0.26);
    --b3:           rgba(240,235,228,0.05);
    --b4:           rgba(240,235,228,0.09);
    --f-display:    'Josefin Sans', sans-serif;
    --f-serif:      'Lora', Georgia, serif;
    --f-mono:       'JetBrains Mono', monospace;
    --ease:         cubic-bezier(0.16,1,0.3,1);
    --r-card:       16px;
    --r-sm:         10px;
    --r-pill:       9999px;
    --sidebar-w:    270px;
    /* Legacy aliases — existing JS/inline styles resolve correctly */
    --bg-deep:          var(--ink);
    --bg-surface:       var(--ink-1);
    --bg-card:          var(--g-card);
    --bg-elevated:      var(--ink-2);
    --bg-dark:          var(--ink);
    --bg-sidebar:       var(--ink-1);
    --bg-primary:       var(--ink);
    --gold-main:        var(--Au);
    --gold-bright:      var(--Au-hi);
    --gold-deep:        var(--Au-lo);
    --gold-gradient:    var(--g-Au);
    --gold-soft:        var(--Au-mist);
    --gold-glow:        var(--Au-glow);
    --gold-gradient-soft:var(--Au-mist);
    --border-gold:      var(--b1);
    --border:           var(--b1);
    --border-subtle:    var(--b3);
    --text-primary:     var(--t1);
    --text-secondary:   var(--t2);
    --text-muted:       var(--t3);
    --accent:           var(--Au);
    --accent-green:     var(--sage);
    --action-red:       var(--red);
    --danger:           var(--red);
    --success:          var(--sage);
    --warning:          var(--coral);
    --glass-blur:       blur(20px);
    --transition:       all 0.3s cubic-bezier(0.16,1,0.3,1);
    --radius-card:      var(--r-card);
    --radius-btn:       var(--r-sm);
}


        :root {
    --bg-deep:      var(--ink);
    --bg-surface:   var(--ink-1);
    --bg-card:      rgba(15,15,18,0.9);
    --bg-elevated:  var(--ink-2);
    --bg-dark:      var(--ink);
    --bg-sidebar:   var(--ink-1);
    --gold-main:    var(--Au);

    --gold-deep:    var(--Au-lo);
    --gold-glow:    rgba(212,175,55,0.3);

    --gold-gradient:linear-gradient(135deg,var(--Au) 0%,var(--Au-hi) 50%,var(--Au-lo) 100%);

    --data-cyan:    var(--sky);

    --gradient-2:   linear-gradient(135deg,var(--Au-lo) 0%,var(--Au) 100%);

    /* ── Shorthand aliases used by compact CSS blocks ── */
    --sid:   var(--ink-1);

    --s:     var(--t2);
    --g1:    linear-gradient(135deg,var(--Au) 0%,var(--Au) 100%);
    --g2:    linear-gradient(135deg,var(--Au-lo) 0%,var(--Au) 100%);
    --g3:    linear-gradient(135deg,var(--Au) 0%,var(--Au-hi) 100%);
    --ga:    linear-gradient(135deg,var(--Au) 0%,var(--Au-hi) 50%,var(--Au-lo) 100%);

}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Josefin Sans',sans-serif;background:var(--dark);color:var(--t1);min-height:100vh;overflow-x:hidden;}
        .sidebar{width:260px;background:var(--ink-1);border-right:1px solid var(--b1);padding:2rem 1.5rem 2.5rem 1.5rem;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:100;}
        .logo{font-family:'Josefin Sans',sans-serif;font-size:1.8rem;background:var(--g-Au);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3rem;}
        .nav-menu{list-style:none;}.nav-item{margin-bottom:.4rem;}
        .nav-link{display:flex;align-items:center;gap:1rem;padding:.9rem 1.1rem;color:var(--t2);text-decoration:none;border-radius:12px;transition:all .3s;font-weight:500;font-size:.95rem;}
        .nav-link:hover{background:rgba(255,255,255,.05);color:var(--t1);}
        .nav-link.active{background:var(--g-Au);color:#fff;}
        .nav-icon{font-size:1.3rem;}
        .user-profile{display:flex;align-items:center;gap:1rem;padding:1.1rem;background:rgba(255,255,255,.03);border-radius:14px;}
        .user-avatar{width:42px;height:42px;border-radius:50%;background:var(--g-Au);display:flex;align-items:center;justify-content:center;font-weight:700;}
        .user-info h4{font-weight:700;font-size:.9rem;margin:0 0 3px;}.user-info p,.user-info span{color:var(--t2);font-size:.73rem;display:block;margin:0;line-height:1.2;}
        .main{margin-left:0;min-height:100vh;}
        .hero{height:340px;position:relative;display:flex;align-items:flex-end;overflow:hidden;}
        .hero-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9rem;}
        .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--dark) 5%,rgba(0,0,0,.4) 60%,transparent);}
        .hero-content{position:relative;z-index:1;padding:2.5rem 3rem;width:100%;}
        .breadcrumb{display:flex;align-items:center;gap:.6rem;color:var(--t2);font-size:.9rem;margin-bottom:1rem;}
        .breadcrumb a{color:rgba(255,255,255,.6);text-decoration:none;}.breadcrumb a:hover{color:var(--t1);}
        .hero-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.45rem 1rem;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:50px;font-size:.75rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:.75rem;}
        .hero-title{font-family:'Josefin Sans',sans-serif;font-size:3rem;letter-spacing:-2px;line-height:1;margin-bottom:.75rem;}
        .hero-desc{color:rgba(255,255,255,.75);max-width:600px;line-height:1.7;margin-bottom:1.5rem;font-size:1rem;}
        .hero-stats{display:flex;gap:2.5rem;}
        .hero-stat .val{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;display:block;}
        .hero-stat .lbl{color:rgba(255,255,255,.5);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;}
        .body{padding:2rem 3rem;display:grid;grid-template-columns:1fr 340px;gap:2.5rem;}
        .progress-panel{position:sticky;top:2rem;display:flex;flex-direction:column;gap:1.5rem;}
        .panel-card{background:var(--g-card);border-radius:20px;border:1px solid var(--b1);padding:1.75rem;}
        .panel-title{font-family:'Josefin Sans',sans-serif;font-size:1.2rem;margin-bottom:1.25rem;}
        .prog-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 1.25rem;}
        .prog-svg{transform:rotate(-90deg);display:block;width:100%;height:100%;}
        .prog-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:10;}
        .prog-fill{fill:none;stroke:url(#progGrad);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
        .prog-inner{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
        .prog-pct{font-family:'JetBrains Mono',monospace;font-size:1.65rem;font-weight:800;line-height:1;}.prog-lbl{font-size:.75rem;color:var(--t2);}
        .prog-stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem;}
        .prog-stat{background:rgba(255,255,255,.03);border-radius:12px;padding:.9rem;text-align:left;border:1px solid var(--b1);}
        .prog-stat .v{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--Au);}.prog-stat .l{font-size:.75rem;color:var(--t2);margin-top:.2rem;}
        .btn-continue{width:100%;padding:1.1rem;background:var(--g-Au);color:#000;border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all .3s;margin-bottom:.75rem;}
        .btn-continue:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(245,87,108,.3);}
        .btn-continue:disabled{opacity:.5;cursor:not-allowed;transform:none;}
        .btn-enroll{width:100%;padding:1.1rem;background:var(--g-Au);color:#000;border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all .3s;}
        .btn-enroll:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(245,87,108,.3);}
        .includes-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem;}
        .include-item{padding:1rem;background:rgba(255,255,255,.03);border-radius:14px;border:1px solid var(--b1);display:flex;align-items:center;gap:.75rem;}
        .include-icon{font-size:1.4rem;}.include-text h4{font-weight:700;font-size:.9rem;}.include-text p{color:var(--t2);font-size:.8rem;margin-top:.1rem;}
        .week-block{background:var(--g-card);border-radius:20px!important;border:1px solid var(--b1);margin-bottom:1.25rem;overflow:hidden;}
        .week-header{padding:1.4rem 1.75rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:background .2s;user-select:none;}
        .week-header:hover,.week-header.open{background:rgba(255,255,255,.03);}
        .week-num{width:38px;height:38px;border-radius:10px;background:var(--g-Au);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;}
        .week-info{flex:1;}.week-title{font-weight:700;font-size:.95rem;margin-bottom:.15rem;}.week-meta{color:var(--t2);font-size:.82rem;}
        .week-chevron{color:var(--t2);font-size:1.1rem;transition:transform .3s;}
        .week-header.open .week-chevron{transform:rotate(180deg);}
        .week-progress-bar{height:3px;background:rgba(255,255,255,.04);}
        .week-progress-fill{height:100%;background:var(--g-Au);transition:width .6s ease;}
        .week-body{display:none;padding:0 1.5rem 1.5rem;}.week-body.open{display:block;}
        .day-row{display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:rgba(255,255,255,.02);border-radius:14px;margin-bottom:.5rem;border:1px solid transparent;transition:all .3s;}
        .day-row:last-child{margin-bottom:0;}
        .day-row.current-day{border-color:rgba(245,87,108,.3);background:rgba(245,87,108,.05);}
        .day-row.completed-day{border-color:rgba(74,222,128,.15);background:rgba(74,222,128,.03);}
        .day-num{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0;}
        .day-row.current-day .day-num{background:var(--g-Au);}.day-row.completed-day .day-num{background:rgba(74,222,128,.2);color:var(--green);}
        .day-info{flex:1;min-width:0;}.day-title{font-weight:600;font-size:.9rem;margin-bottom:.3rem;}
        .day-exercises{display:flex;gap:.35rem;flex-wrap:wrap;}
        .ex-chip{padding:.2rem .6rem;background:rgba(255,255,255,.06);border-radius:50px;font-size:.73rem;color:var(--t2);}
        .day-status{flex-shrink:0;}
        .status-done{color:var(--green);font-size:1.1rem;}
        .status-current{padding:.4rem .9rem;background:var(--Au);color:#fff;border:none;border-radius:50px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all .2s;white-space:nowrap;}
        .status-current:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(245,87,108,.4);}
        .status-locked{color:rgba(255,255,255,.2);font-size:1rem;}
        .wmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:500;align-items:center;justify-content:center;padding:1.5rem;}
        .wmodal.active{display:flex;}
        .wmodal-box{background:var(--g-card);border-radius:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.08);}
        .wm-hero{height:150px;display:flex;align-items:center;justify-content:center;font-size:5rem;border-radius:24px 24px 0 0;}
        .wm-body{padding:1.75rem;}
        .wm-title{font-family:'Josefin Sans',sans-serif;font-size:1.7rem;margin-bottom:.3rem;}
        .wm-meta{color:var(--t2);font-size:.88rem;margin-bottom:1.25rem;display:flex;gap:1rem;}
        .wm-desc{color:var(--t2);line-height:1.7;margin-bottom:1.25rem;font-size:.92rem;}
        .wm-steps{list-style:none;margin-bottom:1.5rem;}
        .wm-step{display:flex;gap:.75rem;padding:.7rem 0;border-bottom:1px solid var(--b1);}
        .wm-step:last-child{border-bottom:none;}
        .wm-step-n{width:26px;height:26px;border-radius:50%;background:var(--g-Au);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0;}
        .wm-step-t{color:var(--t2);line-height:1.6;font-size:.88rem;padding-top:.1rem;}
        .wm-actions{display:flex;gap:.75rem;}
        .btn-start-session{flex:2;padding:1rem;background:var(--g-Au);color:#000;border:none;border-radius:14px;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;font-size:.95rem;transition:all .3s;}
        .btn-start-session:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,87,108,.3);}
        .btn-close-wm{flex:1;padding:1rem;background:rgba(255,255,255,.05);color:var(--t1);border:1px solid var(--b1);border-radius:14px;font-weight:600;cursor:pointer;font-family:'Josefin Sans',sans-serif;}
                    .sidebar .logo{font-size:0.7rem!important;letter-spacing:1px!important;margin-bottom:1.2rem!important;-webkit-text-fill-color:var(--Au)!important;}
            .sidebar .nav-link{justify-content:center!important;padding:0.8rem!important;gap:0!important;}
            .sidebar .nav-link span:not(.nav-icon){display:none!important;}
            .sidebar .user-info{display:none!important;}
            .sidebar .logout-btn span{display:none!important;}
            .sidebar .logout-btn{justify-content:center!important;padding:0.55rem!important;}
            .sidebar .user-profile{justify-content:center!important;padding:0.55rem!important;}
            .main{margin-left:72px!important;}
            .hero-content{padding:1.5rem;}
            .hero-title{font-size:2rem;}
            .body{grid-template-columns:1fr;padding:1.5rem;}
            .progress-panel{position:static!important;}
            .hero-stats{gap:1.5rem;}
        }
                    .sidebar.mobile-active .logo{font-size:2rem!important;letter-spacing:4px!important;-webkit-text-fill-color:transparent!important;}
            .sidebar.mobile-active .nav-link{justify-content:flex-start!important;padding:0.75rem 0.5rem!important;gap:0.9rem!important;}

            .sidebar.mobile-active .logout-btn{padding:0.75rem!important;justify-content:center!important;}
            .sidebar.mobile-active .user-profile{justify-content:flex-start!important;padding:0.75rem!important;}
            .main{margin-left:0!important;}
            .mobile-menu-btn{display:flex!important;}
        }
    
/* ═══════════════════════════════════════
   GLOBAL DESIGN SYSTEM — FLOWFIT GOLD
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
    overflow-x: hidden;
    max-width: 100vw;
}

body {
    font-family:'Josefin Sans',sans-serif;
    background: var(--ink);
    color: var(--t1);
    line-height: 1.6;
}

/* ── Typography ─── */
h1, h2, h3, h4, h5, h6,
.hero-title, .section-title, .card-title,
.stat-value, .logo, .greeting,
.panel-title, .wm-title, .hero-text h1,
.section-header h2, .pricing-card h3,
.feature-card h3, .auth-header h1,
.modal-header h2, .nav-title {
    font-family:'Josefin Sans',sans-serif;
    letter-spacing: 0.02em;
}

/* Biggest display text → Anton */
.hero-text h1,
.hero-title,
.stat-number {
    font-family:'Josefin Sans',sans-serif;
    letter-spacing: 0.01em;
}

.logo {
    font-family:'Josefin Sans',sans-serif !important;
    letter-spacing: 0.05em;
    background: var(--g-Au) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Sidebar ─── */
/* ── Cards ─── */
.card, .stat-card, .chart-card, .panel-card,
.program-card, .exercise-card, .feature-card,
.pricing-card, .auth-card, .form-section,
.week-block {
    background: var(--g-card) !important;
    border: 1px solid var(--b1) !important;
    border-radius: 16px !important;
    backdrop-filter: blur(12px);
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1) !important;
}

.card:hover, .stat-card:hover, .program-card:hover,
.exercise-card:hover, .feature-card:hover {
    border-color: var(--b2) !important;
    box-shadow: 0 0 30px var(--Au-glow), 0 10px 40px rgba(0,0,0,0.5) !important;
    transform: translateY(-4px) !important;
}

/* ── Stat card accent bars ─── */
.stat-card::before {
    background: var(--g-Au) !important;
}

/* ── Buttons ─── */
.btn-primary, .btn-start, .btn-enroll, .btn-log,
.btn-continue, .btn-enroll, .btn-start-session,
.btn-continue, .logout-btn,
button[class*="btn-enroll"],
button[class*="btn-continue"] {
    background: var(--g-Au) !important;
    color: #000 !important;
    font-weight: 700 !important;
    border: none !important;
    font-family:'Josefin Sans',sans-serif !important;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1) !important;
}

.btn-primary:hover, .btn-start:hover, .btn-enroll:hover,
.btn-log:hover, .btn-continue:hover,
.btn-start-session:hover {
    box-shadow: 0 8px 30px var(--Au-glow) !important;
    transform: translateY(-2px) !important;
}

.btn-details, .btn-save, .btn-ghost, .btn-close-wm,
.close-btn, .back-btn {
    border-color: var(--b1) !important;
    color: var(--Au-hi) !important;
}

.btn-details:hover, .btn-save:hover, .btn-ghost:hover {
    border-color: var(--b2) !important;
    background: var(--Au-mist) !important;
}

/* ── Logout btn special ─── */
.logout-btn {
    background: rgba(212, 175, 55, 0.1) !important;
    color: var(--Au) !important;
    border: 1px solid var(--b1) !important;
}
.logout-btn:hover {
    background: rgba(212, 175, 55, 0.2) !important;
    box-shadow: none !important;
    transform: none !important;
}

/* ── Inputs ─── */
.form-input, .form-select, .form-textarea,
.search-bar input, .form-field input,

/* ── CUSTOM CONFIRM MODAL ──────────────────────────── */
.ff-confirm-backdrop {
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
}
@keyframes ffSlideUp {
    from { transform: translateY(24px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
}
.ff-confirm-box {
    background: var(--ink-2);

.ff-confirm-cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }
.ff-confirm-ok { flex: 1.4; padding: 0.9rem; background: linear-gradient(135deg,var(--Au),var(--Au-hi),var(--Au-lo)); border: none; border-radius: 12px; color: #000; font-family:'Josefin Sans',sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
.ff-confirm-ok:hover { box-shadow: 0 6px 20px rgba(212,175,55,0.4); }

// updatePlanBadge() is provided by api.js — uses live subscription data with caching
async function loadAll(){
    try { populateSidebarUser(); } catch (_) {}
    try { updatePlanBadge(); } catch (_) {}
    LoadingManager.show('Loading...');
    // Safety net: force-hide after 10s
    const _safetyTimer = setTimeout(() => LoadingManager.hide(), 10000);
    try{
        const[pR,eR]=await Promise.all([ProgramsAPI.getProgramById(PROG_ID),ProgramsAPI.getUserPrograms()]);
        // API returns { success, data: programObject } — pR.data IS the full program
        if(pR.success&&pR.data){
            prog=pR.data;
            // Normalise exercises in each day so they work with render functions
            // DB shape: day.exercises[k] = DayExercise { id, exercise:{id,name,...}, ... }
            // We flatten to: { id, name, category, caloriesPerMin, description }
            if(prog.weeks&&prog.weeks.length){
                prog.weeks.forEach(wk=>(wk.days||[]).forEach(day=>{
                    day.exercises=(day.exercises||[]).map(de=>{
                        if(de.exercise) return {
                            id:           de.exercise.id||de.exerciseId||de.id,
                            name:         de.exercise.name||'Exercise',
                            category:     de.exercise.category||'STRENGTH',
                            caloriesPerMin: de.exercise.caloriesPerMin||de.exercise.calories_per_min||8,
                            description:  de.exercise.description||'',
                        };
                        return de; // already flat shape
                    });
                }));
            } else {
                // weeks empty — enrich with fallback weeks if same title matches
                const f=FALLBACK.find(p=>p.id===PROG_ID||p.title===prog.title);
                if(f) prog.weeks=f.weeks;
            }
        } else {
            prog=FALLBACK.find(p=>p.id===PROG_ID)||FALLBACK[0];
        }
        // Enrollment: eR.data is array of { id, programId, progress, program:{...} }
        if(eR.success&&eR.data){
            enroll=eR.data.find(e=>
                e.programId===PROG_ID||
                e.program?.id===PROG_ID||
                String(e.programId)===String(PROG_ID)
            )||null;
            // Compute progress percent if completedDays/totalDays present
            if(enroll&&enroll.completedDays!=null){
                const tot=(prog.durationWeeks||0)*(prog.daysPerWeek||0)||1;
                enroll.progress=Math.round((enroll.completedDays/tot)*100);
            }
        }
        if(!enroll&&EID)enroll={id:EID,programId:PROG_ID,progress:0};
    }catch(err){
        console.warn('Program load error:',err);
        prog=FALLBACK.find(p=>p.id===PROG_ID)||FALLBACK[0];
        enroll=EID?{id:EID,programId:PROG_ID,progress:0}:null;
    }
    finally{ clearTimeout(_safetyTimer); LoadingManager.hide(); }
    if(!prog){document.getElementById('heroTitle').textContent='Program Not Found';return;}
    renderHero();renderIncludes();renderWeeks();renderPanel();
    checkCompletionRedirect();
}

                    border-radius:14px;margin-bottom:.55rem;transition:all .25s">
            <div style="width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
                        font-size:${isDone ? '1.1rem' : '1.3rem'};
                        background:${isDone ? 'rgba(74,222,128,0.18)' : 'rgba(255,255,255,0.06)'};
                        border:1px solid ${isDone ? 'rgba(74,222,128,0.4)' : 'transparent'}">
                ${isDone ? '✓' : icon}
            </div>
            <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:.95rem;color:${isDone ? '#4ade80' : '#fff'};
                            text-decoration:${isDone ? 'line-through' : 'none'};
                            white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
                <div style="color:var(--text-secondary);font-size:.75rem;margin-top:1px">
                    ${cat}${cal ? ' · 🔥 ' + cal + ' cal/min' : ''}${isDone ? ' · <span style="color:#4ade80">Done!</span>' : ''}
                </div>
            </div>
            ${isDone
                ? `<div style="padding:.4rem .75rem;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.3);
                              color:#4ade80;border-radius:8px;font-size:.78rem;font-weight:700;font-family:'Oswald',sans-serif">DONE ✓</div>`
                : `<button onclick="hideModal();goToSession(${idx})"
                        style="padding:.5rem .9rem;background:linear-gradient(135deg,#D4AF37,#b8860b);border:none;
                               color:#000;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;
                               white-space:nowrap;font-family:'Oswald',sans-serif;letter-spacing:.5px">
                        Start →
                   </button>`
            }
        </div>`;
    }).join('');

    // Progress bar
    const pct = total > 0 ? Math.round((done.length / total) * 100) : 0;

    const modal = document.getElementById('wmodal');
    modal.innerHTML = `
        <div class="wm-box" style="max-width:520px">
            <div class="wm-hero" style="background:var(--ga);min-height:90px;display:flex;align-items:center;
                    justify-content:center;gap:1rem;padding:1.25rem 1.5rem;flex-direction:column">
                <div style="font-size:2rem">${allDone ? '🏆' : '📅'}</div>
                <div style="font-family:'Oswald',sans-serif;font-size:1.3rem;letter-spacing:1px;color:#fff">
                    ${_activeDay}: ${d.title || 'Workout Day'}
                </div>
                <div style="font-size:.82rem;color:rgba(255,255,255,.7)">
                    ${done.length}/${total} exercise${total !== 1 ? 's' : ''} completed
                </div>
                <div style="width:100%;max-width:280px;height:5px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden">
                    <div style="height:100%;width:${pct}%;background:${allDone ? '#4ade80' : '#D4AF37'};
                                border-radius:10px;transition:width .4s ease"></div>
                </div>
            </div>
            <div class="wm-body" style="padding:1.25rem 1.5rem 1.5rem">
                <div style="margin-bottom:1rem">${exItems}</div>
                <div style="display:flex;gap:.75rem;margin-top:1.25rem">
                    <button onclick="hideModal()"
                        style="flex:1;padding:.85rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
                               color:#aaa;border-radius:12px;cursor:pointer;font-family:'Oswald',sans-serif;
                               font-size:.9rem;letter-spacing:1px">CLOSE</button>
                    <button onclick="hideModal();markDayComplete()"
                        id="btnMarkDone"
                        style="flex:1.4;padding:.85rem;
                               background:${allDone ? 'rgba(74,222,128,0.18)' : 'rgba(255,255,255,0.05)'};
                               border:1px solid ${allDone ? 'rgba(74,222,128,0.4)' : 'rgba(255,255,255,0.12)'};
                               color:${allDone ? '#4ade80' : '#aaa'};border-radius:12px;cursor:pointer;
                               font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px;
                               transition:all .25s">
                        ${allDone ? '🏆 COMPLETE DAY' : '✅ MARK DAY DONE'}
                    </button>
                </div>
                ${!allDone ? `<p style="text-align:center;font-size:.76rem;color:rgba(255,255,255,.35);margin-top:.75rem">
                    Finish all exercises to unlock day completion</p>` : ''}
            </div>
        </div>`;
    modal.classList.add('active');
}

// ── Mark a day complete and persist to API ────────────────────────────────────
async function markDayComplete(fromSession = false) {
    if (!enroll) {
        Toast.warning('Enroll in this program first to track progress.');
        closeModal();
        return;
    }
    const dayIndex = _activeDayIndex;
    if (dayIndex < 0) { closeModal(); return; }

    const tot = (prog.durationWeeks || 0) * (prog.daysPerWeek || 0) || 1;
    const currentDone = enroll.completedDays ?? Math.round((enroll.progress || 0) / 100 * tot);
    if (dayIndex !== currentDone) {
        Toast.warning('Complete days in order — finish the current day first.');
        return;
    }

    closeModal();
    LoadingManager.show('Saving progress...');

    try {
        const newCompleted   = currentDone + 1;
        const newCurrentWeek = Math.min(Math.floor(newCompleted / (prog.daysPerWeek || 3)) + 1, prog.durationWeeks || 4);
        const newCurrentDay  = (newCompleted % (prog.daysPerWeek || 3)) + 1;

        const res = await ProgramsAPI.updateProgress(enroll.id, {
            completedDays: newCompleted,
            currentWeek:   newCurrentWeek,
            currentDay:    newCurrentDay,
        });

        if (res.success) {
            enroll.completedDays = newCompleted;
            enroll.currentWeek   = newCurrentWeek;
            enroll.currentDay    = newCurrentDay;
            enroll.progress      = Math.round((newCompleted / tot) * 100);

            // Clear per-exercise progress for this day — it's fully done
            clearExerciseProgress(dayIndex);

            const d = getDayAt(dayIndex);
            const exCount = d?.exercises?.length || 0;
            Toast.success(`Day ${newCompleted} complete! ${exCount > 1 ? 'All ' + exCount + ' exercises done.' : ''} Keep it up 🔥`);
            renderPanel();
            renderWeeks();
        } else {
            Toast.error('Could not save progress. Try again.');
        }
    } catch (err) {
        console.error('markDayComplete error:', err);
        Toast.error(err.message || 'Failed to save progress.');
    } finally {
        LoadingManager.hide();
    }
}

// ── Handle redirect back from workout-session ─────────────────────────────────
// Two cases:
//   ?exDone=1&dayIndex=N&exIndex=M  → mark exercise M as done, re-open day modal
//   ?completed=1&dayIndex=N         → legacy — mark whole day (kept for safety)
function checkCompletionRedirect() {
    const urlParams = new URLSearchParams(location.search);
    const clean = `program-detail.html?id=${PROG_ID}${EID ? '&enrollmentId=' + EID : ''}`;

    if (urlParams.get('exDone') === '1') {
        const dayIdx = parseInt(urlParams.get('dayIndex') ?? '-1', 10);
        const exIdx  = parseInt(urlParams.get('exIndex')  ?? '-1', 10);
        history.replaceState({}, '', clean);
        if (dayIdx < 0 || exIdx < 0) return;

        _activeDayIndex = dayIdx;
        setExerciseDone(dayIdx, exIdx);

        const d     = getDayAt(dayIdx);
        const total = d?.exercises?.length || 0;
        const done  = getCompletedExercises(dayIdx);
        const name  = d?.exercises?.[exIdx]?.name || d?.exercises?.[exIdx]?.exercise?.name || 'Exercise';

        Toast.success(`${name} logged! ${done.length}/${total} done.`);

        // Small delay so toast shows before modal opens
        setTimeout(() => openDay(dayIdx), 400);
        return;
    }

    if (urlParams.get('completed') === '1') {
        const dayIdx = parseInt(urlParams.get('dayIndex') ?? '-1', 10);
        if (dayIdx < 0) return;
        history.replaceState({}, '', clean);
        _activeDayIndex = dayIdx;
        markDayComplete(true);
    }
}
function enrollNow(){
    showConfirm({
        icon:'🏋️', title:'Enroll in Program',
        message:`Ready to start <strong style="color:#D4AF37">${prog.title}</strong>?`,
        okText:'ENROLL NOW', cancelText:'Not Yet',

        }catch(e){Toast.error(e.message||'Enrollment failed');}finally{LoadingManager.hide();}

}

/* ── SIDEBAR SCROLL-LOCK ──────────────────────────── */

function showConfirm({ icon = '⚠️', title = 'Are you sure?', message = '', okText = 'Confirm', cancelText = 'Cancel', danger = false, onOk }) {
    const ex = document.getElementById('ff-confirm');
    if (ex) ex.remove();
    const backdrop = document.createElement('div');
    backdrop.className = 'ff-confirm-backdrop';
    backdrop.id = 'ff-confirm';
    backdrop.innerHTML = `
        <div class="ff-confirm-box">
            <span class="ff-confirm-icon">${icon}</span>
            <div class="ff-confirm-title">${title}</div>
            <p class="ff-confirm-msg">${message}</p>
            <div class="ff-confirm-actions">
                <button class="ff-confirm-cancel" id="ffCancel">${cancelText}</button>
                <button class="ff-confirm-ok ${danger ? 'danger' : ''}" id="ffOk">${okText}</button>
            </div>
        </div>`;
    document.body.appendChild(backdrop);
    const close = () => {
        backdrop.style.opacity = '0';
        backdrop.style.pointerEvents = 'none';
        backdrop.style.visibility = 'hidden';
        if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
    };
    backdrop.querySelector('#ffCancel').addEventListener('click', e => { e.stopPropagation(); close(); });
    backdrop.querySelector('#ffOk').addEventListener('click', e => { e.stopPropagation(); close(); if (onOk) onOk(); });
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
    });
}
