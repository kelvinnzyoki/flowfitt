  <style>

    /* ═══ GLOBAL OVERFLOW PREVENTION ═════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
}

html {
  overflow-x: hidden !important;
  max-width: 100vw !important;
}

body {
  margin: 0;
  padding: 0;
  overflow-x: hidden !important;
  max-width: 100vw !important;
  width: 100%;
}

    
:root,
[data-theme="dark"] {
    /* ── Ink (backgrounds) ─────────────────────────── */
    --ink:          #07060c;
    --ink-1:        #0c0b12;
    --ink-2:        #111019;
    --g-card:       linear-gradient(145deg,rgba(20,18,32,0.95),rgba(14,13,22,0.95));
    --surface:      rgba(15,14,24,0.88);
    --surface-deep: rgba(3,3,3,0.92);
    --surface-2:    rgba(20,18,32,0.72);

    /* ── Gold (Au) ─────────────────────────────────── */
    --Au:           #C9A84C;
    --Au-hi:        #E8C96A;
    --Au-lo:        #8E6E28;
    --Au-mist:      rgba(212,175,55,0.08);
    --Au-rim:       rgba(212,175,55,0.22);
    --Au-glow:      rgba(212,175,55,0.18);
    --Au-04:        rgba(212,175,55,0.04);
    --Au-06:        rgba(212,175,55,0.06);
    --Au-07:        rgba(212,175,55,0.07);
    --Au-09:        rgba(212,175,55,0.09);
    --Au-10:        rgba(212,175,55,0.10);
    --Au-12:        rgba(212,175,55,0.12);
    --Au-14:        rgba(212,175,55,0.14);
    --Au-15:        rgba(212,175,55,0.15);
    --Au-20:        rgba(212,175,55,0.20);
    --Au-25:        rgba(212,175,55,0.25);
    --Au-28:        rgba(212,175,55,0.28);
    --Au-30:        rgba(212,175,55,0.30);
    --Au-35:        rgba(212,175,55,0.35);
    --Au-38:        rgba(212,175,55,0.38);
    --Au-40:        rgba(212,175,55,0.40);
    --Au-44:        rgba(212,175,55,0.44);
    --Au-50:        rgba(212,175,55,0.50);
    --Au-60:        rgba(212,175,55,0.60);
    --g-Au:         linear-gradient(135deg,#E8C96A 0%,#C9A84C 50%,#8E6E28 100%);
    --g-Au2:        linear-gradient(180deg,#E8C96A 0%,#C9A84C 100%);
    --ga:           linear-gradient(135deg,var(--Au) 0%,var(--Au-hi) 50%,var(--Au-lo) 100%);

    /* ── Accent colours ────────────────────────────── */
    --sage:         #3BBF8A;
    --sage-dim:     rgba(59,191,138,0.12);
    --sage-15:      rgba(59,191,138,0.15);
    --sage-20:      rgba(59,191,138,0.20);
    --sage-25:      rgba(59,191,138,0.25);
    --sage-30:      rgba(59,191,138,0.30);
    --sky:          #5B9CF6;
    --sky-dim:      rgba(0,242,254,0.08);
    --sky-10:       rgba(0,242,254,0.10);
    --sky-15:       rgba(0,242,254,0.15);
    --sky-20:       rgba(0,242,254,0.20);
    --sky-25:       rgba(91,156,246,0.25);
    --sky-30:       rgba(0,242,254,0.30);
    --coral:        #E07B54;
    --red:          #E05454;
    --red-04:       rgba(224,84,84,0.04);
    --red-06:       rgba(224,84,84,0.06);
    --red-08:       rgba(224,84,84,0.08);
    --red-10:       rgba(224,84,84,0.10);
    --red-12:       rgba(224,84,84,0.12);
    --red-20:       rgba(224,84,84,0.20);
    --red-25:       rgba(224,84,84,0.25);
    --red-28:       rgba(224,84,84,0.28);
    --red-30:       rgba(224,84,84,0.30);
    --red-40:       rgba(224,84,84,0.40);
    --red-50:       rgba(224,84,84,0.50);
    --red-60:       rgba(224,84,84,0.60);
    --red-70:       rgba(224,84,84,0.70);
    --red-80:       rgba(224,84,84,0.80);

    /* ── Text ──────────────────────────────────────── */
    --t1:           #F0EBE0;
    --t2:           #8A8590;
    --t3:           #44404A;
    --t4:           #C4BFCA;
    --t1-05:        rgba(240,235,228,0.05);
    --t1-09:        rgba(240,235,228,0.09);
    --t2-65:        rgba(138,133,144,0.65);
    --t2-70:        rgba(138,133,144,0.70);
    --t2-85:        rgba(138,133,144,0.85);

    /* ── Borders ───────────────────────────────────── */
    --b1:           rgba(212,175,55,0.14);
    --b2:           rgba(212,175,55,0.26);
    --b3:           rgba(240,235,228,0.05);
    --b4:           rgba(240,235,228,0.09);

    /* ── Overlays ──────────────────────────────────── */
    --overlay-30:   rgba(0,0,0,0.30);
    --overlay-40:   rgba(0,0,0,0.40);
    --overlay-50:   rgba(0,0,0,0.50);
    --overlay-60:   rgba(0,0,0,0.60);
    --overlay-70:   rgba(0,0,0,0.70);
    --overlay-80:   rgba(0,0,0,0.80);
    --overlay-90:   rgba(0,0,0,0.90);
    --white-02:     rgba(255,255,255,0.02);
    --white-03:     rgba(255,255,255,0.03);
    --white-04:     rgba(255,255,255,0.04);
    --white-05:     rgba(255,255,255,0.05);
    --white-06:     rgba(255,255,255,0.06);
    --white-08:     rgba(255,255,255,0.08);
    --white-10:     rgba(255,255,255,0.10);
    --white-12:     rgba(255,255,255,0.12);
    --white-15:     rgba(255,255,255,0.15);
    --white-20:     rgba(255,255,255,0.20);
    --white-22:     rgba(255,255,255,0.22);
    --white-28:     rgba(255,255,255,0.28);
    --white-38:     rgba(255,255,255,0.38);

    /* ── Aliases (legacy / multi-name support) ─────── */
    --acc:          var(--Au);
    --accent:       var(--Au);
    --bg-dark:      var(--ink);
    --bg-deep:      var(--ink);
    --bg-primary:   var(--ink);
    --bg-surface:   var(--ink-1);
    --bg-sidebar:   var(--ink-1);
    --bg-elevated:  var(--ink-2);
    --bg-card:      var(--g-card);
    --card:         rgba(15,15,18,0.9);
    --sid:          var(--ink-1);
    --border:       var(--b1);
    --border-gold:  var(--b1);
    --border-gold-hover: rgba(212,175,55,0.45);
    --border-subtle: var(--b3);
    --gold-main:    var(--Au);
    --gold-primary: var(--Au);
    --gold-bright:  var(--Au-hi);
    --gold-deep:    var(--Au-lo);
    --gold-glow:    var(--Au-glow);
    --gold-soft:    var(--Au-mist);
    --gold-gradient:var(--g-Au);
    --gold-gradient-soft: var(--Au-mist);
    --gradient-gold: var(--ga);
    --gradient-accent: var(--ga);
    --gradient-1:   linear-gradient(135deg,var(--Au) 0%,var(--Au) 100%);
    --gradient-2:   linear-gradient(135deg,var(--Au-lo) 0%,var(--Au) 100%);
    --gradient-3:   linear-gradient(135deg,var(--Au) 0%,var(--Au-hi) 100%);
    --gradient-gold-soft: linear-gradient(135deg,var(--Au-12),var(--Au-06));
    --g1:           linear-gradient(135deg,var(--Au) 0%,var(--Au) 100%);
    --g2:           linear-gradient(135deg,var(--Au-lo) 0%,var(--Au) 100%);
    --g3:           linear-gradient(135deg,var(--Au) 0%,var(--Au-hi) 100%);
    --text-primary: var(--t1);
    --text-secondary: var(--t2);
    --text-dim:     var(--t2);
    --text-muted:   var(--t3);
    --text-gold:    var(--Au-hi);
    --s:            var(--t2);
    --smoke:        var(--t2);
    --green:        var(--sage);
    --success:      var(--sage);
    --danger:       var(--red);
    --warning:      var(--coral);
    --action-red:   var(--red);
    --accent-green: var(--sage);
    --data-cyan:    var(--sky);
    --cyan-gradient: linear-gradient(180deg,var(--sky) 0%,var(--sky) 100%);
    --shadow-card:  0 10px 40px rgba(0,0,0,0.6);
    --shadow-gold-glow: 0 0 30px rgba(212,175,55,0.15);

    /* ── Typography ────────────────────────────────── */
    --f-display:    'Josefin Sans', sans-serif;
    --f-serif:      'Lora', Georgia, serif;
    --f-mono:       'JetBrains Mono', monospace;

    /* ── Spacing / Radii / Motion ──────────────────── */
    --sidebar-w:    270px;
    --col-max:      1340px;
    --pad-x:        3rem;
    --r-card:       16px;
    --r-sm:         10px;
    --r-pill:       9999px;
    --radius-card:  var(--r-card);
    --radius-btn:   var(--r-sm);
    --ease:         cubic-bezier(0.16,1,0.3,1);
    --ease-s:       cubic-bezier(0.34,1.56,0.64,1);
    --transition:   all 0.3s cubic-bezier(0.16,1,0.3,1);
    --transition-smooth: all 0.4s cubic-bezier(0.165,0.84,0.44,1);
    --glass-blur:   blur(20px);
}

        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Josefin Sans',sans-serif;background:var(--dark);color:var(--t1);min-height:100vh;overflow-x:hidden;}
        .sidebar{width:260px;background:var(--ink-1);border-right:1px solid var(--b1);padding:2rem 1.5rem 2.5rem 1.5rem;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:100;}
        .logo{font-family:'Josefin Sans',sans-serif;font-size:1.8rem;background:var(--g-Au);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3rem;}
        .nav-menu{list-style:none;}.nav-item{margin-bottom:.4rem;}
        .nav-link{display:flex;align-items:center;gap:1rem;padding:.9rem 1.1rem;color:var(--t2);text-decoration:none;border-radius:12px;transition:all .3s;font-weight:500;font-size:.95rem;}
        .nav-link:hover{background:var(--white-05);color:var(--t1);}
        .nav-link.active{background:var(--g-Au);color:var(--t1);}
        .nav-icon{font-size:1.3rem;}
        .user-profile{display:flex;align-items:center;gap:1rem;padding:1.1rem;background:var(--white-03);border-radius:14px;}
        .user-avatar{width:42px;height:42px;border-radius:50%;background:var(--g-Au);display:flex;align-items:center;justify-content:center;font-weight:700;}
        .user-info h4{font-weight:700;font-size:.9rem;margin:0 0 3px;}.user-info p,.user-info span{color:var(--t2);font-size:.73rem;display:block;margin:0;line-height:1.2;}
        .main{margin-left:0;min-height:100vh;}
        .hero{height:340px;position:relative;display:flex;align-items:flex-end;overflow:hidden;}
        .hero-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9rem;}
        .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--dark) 5%,var(--overlay-40) 60%,transparent);}
        .hero-content{position:relative;z-index:1;padding:2.5rem 3rem;width:100%;}
        .breadcrumb{display:flex;align-items:center;gap:.6rem;color:var(--t2);font-size:.9rem;margin-bottom:1rem;}
        .breadcrumb a{color:var(--white-38);text-decoration:none;}.breadcrumb a:hover{color:var(--t1);}
        .hero-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.45rem 1rem;background:var(--white-12);backdrop-filter:blur(10px);border-radius:50px;font-size:.75rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:.75rem;}
        .hero-title{font-family:'Josefin Sans',sans-serif;font-size:3rem;letter-spacing:-2px;line-height:1;margin-bottom:.75rem;}
        .hero-desc{color:var(--white-38);max-width:600px;line-height:1.7;margin-bottom:1.5rem;font-size:1rem;}
        .hero-stats{display:flex;gap:2.5rem;}
        .hero-stat .val{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;display:block;}
        .hero-stat .lbl{color:var(--white-38);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;}
        .body{padding:2rem 3rem;display:grid;grid-template-columns:1fr 340px;gap:2.5rem;}
        .progress-panel{position:sticky;top:2rem;display:flex;flex-direction:column;gap:1.5rem;}
        .panel-card{background:var(--g-card);border-radius:20px;border:1px solid var(--b1);padding:1.75rem;}
        .panel-title{font-family:'Josefin Sans',sans-serif;font-size:1.2rem;margin-bottom:1.25rem;}
        .prog-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 1.25rem;}
        .prog-svg{transform:rotate(-90deg);display:block;width:100%;height:100%;}
        .prog-bg{fill:none;stroke:var(--white-06);stroke-width:10;opacity:0.5;}
        .prog-fill{fill:none;stroke:url(#progGrad);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
        .prog-inner{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
        .prog-pct{font-family:'JetBrains Mono',monospace;font-size:1.65rem;font-weight:800;line-height:1;}.prog-lbl{font-size:.75rem;color:var(--t2);}
        .prog-stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem;}
        .prog-stat{background:var(--white-03);border-radius:12px;padding:.9rem;text-align:left;border:1px solid var(--b1);}
        .prog-stat .v{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--Au);}.prog-stat .l{font-size:.75rem;color:var(--t2);margin-top:.2rem;}
        .btn-continue{width:100%;padding:1.1rem;background:var(--g-Au);color:var(--ink);border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all .3s;margin-bottom:.75rem;}
        .btn-continue:hover{transform:translateY(-2px);box-shadow:0 10px 30px var(--red-30);}
        .btn-continue:disabled{opacity:.5;cursor:not-allowed;transform:none;}
        .btn-enroll{width:100%;padding:1.1rem;background:var(--g-Au);color:var(--ink);border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all .3s;}
        .btn-enroll:hover{transform:translateY(-2px);box-shadow:0 10px 30px var(--red-30);}
        .includes-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem;}
        .include-item{padding:1rem;background:var(--white-03);border-radius:14px;border:1px solid var(--b1);display:flex;align-items:center;gap:.75rem;}
        .include-icon{font-size:1.4rem;}.include-text h4{font-weight:700;font-size:.9rem;}.include-text p{color:var(--t2);font-size:.8rem;margin-top:.1rem;}
        .week-block{background:var(--g-card);border-radius:20px!important;border:1px solid var(--b1);margin-bottom:1.25rem;overflow:hidden;}
        .week-header{padding:1.4rem 1.75rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:background .2s;user-select:none;}
        .week-header:hover,.week-header.open{background:var(--white-03);}
        .week-num{width:38px;height:38px;border-radius:10px;background:var(--g-Au);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;}
        .week-info{flex:1;}.week-title{font-weight:700;font-size:.95rem;margin-bottom:.15rem;}.week-meta{color:var(--t2);font-size:.82rem;}
        .week-chevron{color:var(--t2);font-size:1.1rem;transition:transform .3s;}
        .week-header.open .week-chevron{transform:rotate(180deg);}
        .week-progress-bar{height:3px;background:var(--white-04);}
        .week-progress-fill{height:100%;background:var(--g-Au);transition:width .6s ease;}
        .week-body{display:none;padding:0 1.5rem 1.5rem;}.week-body.open{display:block;}
        .day-row{display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:var(--white-02);border-radius:14px;margin-bottom:.5rem;border:1px solid transparent;transition:all .3s;}
        .day-row:last-child{margin-bottom:0;}
        .day-row.current-day{border-color:var(--red-30);background:var(--red-06);}
        .day-row.completed-day{border-color:var(--sage-15);background:var(--sage-dim);}
        .day-num{width:34px;height:34px;border-radius:50%;background:var(--white-06);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0;}
        .day-row.current-day .day-num{background:var(--g-Au);}.day-row.completed-day .day-num{background:var(--sage-20);color:var(--green);}
        .day-info{flex:1;min-width:0;}.day-title{font-weight:600;font-size:.9rem;margin-bottom:.3rem;}
        .day-exercises{display:flex;gap:.35rem;flex-wrap:wrap;}
        .ex-chip{padding:.2rem .6rem;background:var(--white-06);border-radius:50px;font-size:.73rem;color:var(--t2);}
        .day-status{flex-shrink:0;}
        .status-done{color:var(--green);font-size:1.1rem;}
        .status-current{padding:.4rem .9rem;background:var(--Au);color:var(--t1);border:none;border-radius:50px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;transition:all .2s;white-space:nowrap;}
        .status-current:hover{transform:scale(1.05);box-shadow:0 4px 15px var(--red-40);}
        .status-locked{color:var(--white-20);font-size:1rem;}
        .wmodal{display:none;position:fixed;inset:0;background:var(--overlay-80);backdrop-filter:blur(12px);z-index:500;align-items:center;justify-content:center;padding:1.5rem;}
        .wmodal.active{display:flex;}
        .wmodal-box{background:var(--g-card);border-radius:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border:1px solid var(--white-08);}
        .wm-hero{height:150px;display:flex;align-items:center;justify-content:center;font-size:5rem;border-radius:24px 24px 0 0;}
        .wm-body{padding:1.75rem;}
        .wm-title{font-family:'Josefin Sans',sans-serif;font-size:1.7rem;margin-bottom:.3rem;color:var(--t1);}
        .wm-meta{color:var(--t2);font-size:.88rem;margin-bottom:1.25rem;display:flex;gap:1rem;}
        .wm-desc{color:var(--t2);line-height:1.7;margin-bottom:1.25rem;font-size:.92rem;}
        .wm-steps{list-style:none;margin-bottom:1.5rem;}
        .wm-step{display:flex;gap:.75rem;padding:.7rem 0;border-bottom:1px solid var(--b1);}
        .wm-step:last-child{border-bottom:none;}
        .wm-step-n{width:26px;height:26px;border-radius:50%;background:var(--g-Au);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0;}
        .wm-step-t{color:var(--t2);line-height:1.6;font-size:.88rem;padding-top:.1rem;}
        .wm-actions{display:flex;gap:.75rem;}
        .btn-start-session{flex:2;padding:1rem;background:var(--g-Au);color:var(--ink);border:none;border-radius:14px;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;font-size:.95rem;transition:all .3s;}
        .btn-start-session:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--red-30);}
        .btn-close-wm{flex:1;padding:1rem;background:var(--white-05);color:var(--t1);border:1px solid var(--b1);border-radius:14px;font-weight:600;cursor:pointer;font-family:'Josefin Sans',sans-serif;}
                    .sidebar .logo{font-size:0.7rem!important;letter-spacing:1px!important;margin-bottom:1.2rem!important;-webkit-text-fill-color:var(--Au)!important;}
            .sidebar .nav-link{justify-content:center!important;padding:0.8rem!important;gap:0!important;}
            .sidebar .nav-link span:not(.nav-icon){display:none!important;}
            .sidebar .user-info{display:none!important;}
            .sidebar .logout-btn span{display:none!important;}
            .sidebar .logout-btn{justify-content:center!important;padding:0.55rem!important;}
            .sidebar .user-profile{justify-content:center!important;padding:0.55rem!important;}
            .main{margin-left:72px!important;}
            .hero-content{padding:1.5rem;}
            .hero-title{font-size:2rem;}
            .body{grid-template-columns:1fr;padding:1.5rem;}
            .progress-panel{position:static!important;}
            .hero-stats{gap:1.5rem;}
        }
                    .sidebar.mobile-active .logo{font-size:2rem!important;letter-spacing:4px!important;-webkit-text-fill-color:transparent!important;}

/* ── FEATURED PRICING ────────────────────────────── */

/* ── ACHIEVEMENT ITEMS ───────────────────────────── */

/* ── WORKOUT BADGES ──────────────────────────────── */

.workout-badge.strength{background:var(--Au-12)!important;color:var(--Au)!important;}

/* ── SECTION ICON ────────────────────────────────── */

    background:var(--Au-10)!important;
    border:1px solid var(--b1)!important;
}

/* ── MAIN CONTENT LAYOUT ─────────────────────────── */
.main-content {
    margin-left:0!important;
    width:100%!important;
    overflow-x:hidden!important;
}
.main{margin-left:0!important;}

/* ── GRIDS — OVERFLOW FIX ────────────────────────── */
.programs-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.exercise-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.achievements-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.program-card,.exercise-card,.achievement-item {
    min-width:0!important;overflow:hidden!important;word-break:break-word!important;
}

/* ── HERO BG base (JS sets program-specific gradient) ── */
.hero-bg {
    background:linear-gradient(135deg,var(--ink) 0%,var(--ink-1) 100%);
}

/* ── BG ANIMATION ORBS ───────────────────────────── */
.bg-animation::before {
    background:radial-gradient(circle,var(--Au-50) 0%,transparent 70%)!important;
}
.bg-animation::after {
    background:radial-gradient(circle,var(--sky-15) 0%,transparent 70%)!important;
}

/* ── LOADING MANAGER (api.js injected) ───────────── */
#global-loader {
    position:fixed!important;top:0!important;left:0!important;
    width:100%!important;height:100%!important;
    z-index:10000!important;
}
.loader-backdrop {
    background:var(--surface-deep)!important;
    backdrop-filter:blur(8px)!important;
}
.loader-content {
    background:var(--bg-elevated,var(--ink-2))!important;
    border:1px solid var(--b1)!important;
    border-radius:20px!important;
    box-shadow:0 0 30px var(--Au-10)!important;
}
.loader-spinner {
    border-color:var(--Au-15)!important;
    border-top-color:var(--Au)!important;
}
.loader-message {
    font-family:'Josefin Sans',sans-serif!important;
    letter-spacing:3px!important;color:var(--Au)!important;
}

/* ── MODALS ──────────────────────────────────────── */
.modal-content,.wmodal-box {
    background:var(--ink-2)!important;
    border:1px solid var(--b1)!important;
}
.modal-header{border-bottom:1px solid var(--b1)!important;}

/* ── CARDS STAT TOP BAR ──────────────────────────── */
.stat-card::before{background:linear-gradient(180deg,var(--sky) 0%,var(--sky) 100%)!important;}

/* ── TIMER CARD GOLD ─────────────────────────────── */
.timer-display {
    background:var(--g-Au)!important;
    -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
    background-clip:text!important;
}
.live-cals{
    background:var(--Au-06)!important;
    border:1px solid var(--Au-15)!important;
}
.live-cals-value{color:var(--Au)!important;}

/* ── CUSTOM CONFIRM MODAL ──────────────────────────── */
.ff-confirm-backdrop {
    position: fixed; inset: 0; z-index: 99999;
    background: var(--overlay-80);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
}
@keyframes ffSlideUp {
    from { transform: translateY(24px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
}
.ff-confirm-box {
    background: var(--ink-2);
    border: 1px solid var(--Au-35);
    border-radius: 22px; padding: 2.5rem 2rem 2rem;
    max-width: 400px; width: 100%;

    animation: ffSlideUp 0.22s cubic-bezier(0.165,0.84,0.44,1);
    text-align: center;
}
.ff-confirm-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
.ff-confirm-title { font-family:'Josefin Sans',sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; color: var(--t1); margin-bottom: 0.6rem; }
.ff-confirm-msg { color: var(--t2); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
.ff-confirm-actions { display: flex; gap: 1rem; }
.ff-confirm-cancel { flex: 1; padding: 0.9rem; background: var(--white-04); border: 1px solid var(--white-10); border-radius: 12px; color: var(--t2); font-family:'Josefin Sans',sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
.ff-confirm-cancel:hover { background: var(--white-10); color: var(--t1); }
.ff-confirm-ok { flex: 1.4; padding: 0.9rem; background: linear-gradient(135deg,var(--Au),var(--Au-hi),var(--Au-lo)); border: none; border-radius: 12px; color: var(--ink); font-family:'Josefin Sans',sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
.ff-confirm-ok:hover { box-shadow: 0 6px 20px var(--Au-40); }
.ff-confirm-ok.danger { background: linear-gradient(135deg,var(--red),var(--red)); }
.ff-confirm-ok.danger:hover { box-shadow: 0 6px 20px var(--red-40); }

/* ════════════════════════════════════════════════════════
   GLOBAL POLISH — body, scrollbars, headings, page titles
════════════════════════════════════════════════════════ */

/* ── Body base ─────────────────────────────────────────── */
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ── All headings use Oswald ─────────────────────────────── */
h1, h2, h3, h4, h5, h6 {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
}

/* ── Page header (dashboard pages) ──────────────────────── */
.header h1,
.header-left h1,
.page-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--t1);
    margin-bottom: 0.25rem;
}

.header p,
.header-left p,
.page-subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--t2-85);
    font-weight: 400;
    letter-spacing: 0.01em;
}

/* ── Scrollbar global ────────────────────────────────────── */
::-webkit-scrollbar {
    width: 5px;
    height: 5px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: var(--Au-rim);
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--Au-38);
}

* {
    scrollbar-width: thin;
    scrollbar-color: var(--Au-rim) transparent;
}

/* ── Cards base ──────────────────────────────────────────── */
.card,
.stat-card,
.chart-card,
.panel-card,
.week-block,
.log-card,
.timer-card,
.sets-card,
.info-card,
.billing-card,
.program-card,
.exercise-card {
    background: linear-gradient(145deg, var(--surface), var(--surface));
    border: 1px solid var(--Au-14);
    border-radius: 16px;
    transition: border-color 0.22s ease, box-shadow 0.22s ease;
}

/* ── Stat card accent top bar ────────────────────────────── */
.stat-card {
    position: relative;
    overflow: hidden;
}

.stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(135deg, var(--Au) 0%, var(--Au-hi) 45%, var(--Au-lo) 100%);
}

/* ── Stat values ─────────────────────────────────────────── */
.stat-value,
.stat-number,
.streak-number,
.timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    background: linear-gradient(135deg, var(--Au) 0%, var(--Au-hi) 45%, var(--Au-lo) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* ── Buttons: remove clip-path arrow (looks broken) ─────── */
.btn,
button.btn,
a.btn {
    clip-path: none !important;
    border-radius: 10px !important;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: none;
    padding: 0.8rem 1.8rem;
}

/* Primary buttons */
.btn-primary,
.btn-start,
.btn-enroll,
.btn-log,
.btn-continue,
.btn-save,
.btn-log-workout,
.btn-start-session {
    background: linear-gradient(135deg, var(--Au) 0%, var(--Au-hi) 45%, var(--Au-lo) 100%);
    color: var(--ink) !important;
    border: none !important;
    font-weight: 700 !important;
    clip-path: none !important;
    border-radius: 10px !important;
}

/* Ghost / outline buttons */
.btn-ghost,
.btn-details,
.btn-save-ghost {
    background: var(--Au-06) !important;
    border: 1px solid var(--Au-rim) !important;
    color: var(--Au-hi) !important;
    clip-path: none !important;
    border-radius: 10px !important;
}

.btn-ghost:hover,
.btn-details:hover {
    background: var(--Au-12) !important;
    border-color: var(--Au-44) !important;
    color: var(--Au-hi) !important;
}

/* ── Form inputs ─────────────────────────────────────────── */
.form-input,
.form-select,
.form-field input,
.form-field select,
.form-field textarea,
input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
select,
textarea {
    background: var(--Au-04) !important;
    border: 1px solid var(--Au-glow) !important;
    color: var(--t1) !important;
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    border-radius: 10px !important;
    transition: border-color 0.22s ease !important;
}

input:focus,
select:focus,
textarea:focus,
.form-input:focus,
.form-field input:focus,
.form-field select:focus,
.form-field textarea:focus {
    outline: none !important;
    border-color: var(--Au-50) !important;
    box-shadow: 0 0 0 3px var(--Au-10) !important;
}

/* ── Section labels ──────────────────────────────────────── */
.section-label {
    background: var(--Au-09) !important;
    border: 1px solid var(--Au-rim) !important;
    color: var(--Au) !important;
    border-radius: 50px !important;
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    font-size: 0.76rem !important;
    font-weight: 700 !important;
    letter-spacing: 1.5px !important;
    text-transform: uppercase !important;
}

/* ── Tab / time buttons ──────────────────────────────────── */
.tab-btn,
.time-btn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.84rem;
    font-weight: 600;

/* ── Sidebar container ─────────────────────────────────── */
.sidebar {

    top: 0;
    left: 0;

    overflow-y: auto;

    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    backdrop-filter: blur(20px) saturate(140%);

.sidebar::-webkit-scrollbar {

}
.sidebar::-webkit-scrollbar-track {

/* ══════════════════════════════════════════════════════════
   BUTTON SYSTEM — Arrow signature (matches index.html)
   Primary : gold-filled arrow → + shimmer + glow aura
   Ghost   : outlined arrow + fill-wash hover
   Both use clip-path polygon so shape is non-rectangular.
══════════════════════════════════════════════════════════ */

/* ── Base ──────────────────────────────────────────────── */
.btn,
button.btn,
a.btn,
.btn-primary,
.btn-ghost,
.btn-start,
.btn-enroll,
.btn-continue,
.btn-log,
.btn-save,
.btn-log-workout,
.btn-start-session,
.btn-unlock,
.btn-details {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0.78rem 2.4rem 0.78rem 1.6rem;
    position: relative;
    white-space: nowrap;
    border-radius: 0;
    overflow: hidden;
    transition:
        transform 0.28s cubic-bezier(0.16,1,0.3,1),
        box-shadow 0.28s cubic-bezier(0.16,1,0.3,1),
        filter 0.28s ease;
    /* Arrow tip: right-pointing pentagon */
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
}

/* ── Primary — gold fill ───────────────────────────────── */
.btn-primary,
.btn-start,
.btn-enroll,
.btn-continue,
.btn-log,
.btn-save,
.btn-log-workout,
.btn-start-session,
.btn-unlock {
    background: linear-gradient(135deg, var(--Au-hi) 0%, var(--Au) 50%, var(--Au-lo) 100%) !important;
    color: var(--ink) !important;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%) !important;
    box-shadow:
        inset 0 1px 0 var(--white-22),
        0 5px 22px var(--Au-40),
        0 2px 8px var(--overlay-40) !important;
}

/* Shimmer sweep */
.btn-primary::before,
.btn-start::before,
.btn-enroll::before,
.btn-continue::before,
.btn-log::before,
.btn-save::before,
.btn-log-workout::before,
.btn-start-session::before,
.btn-unlock::before {
    content: '';
    position: absolute;
    top: -60%; left: -120%;
    width: 52%; height: 220%;
    background: linear-gradient(108deg, transparent 20%, var(--white-38) 50%, transparent 80%);
    transition: left 0.52s cubic-bezier(0.16,1,0.3,1);
    pointer-events: none;
}

.btn-primary:hover::before,
.btn-start:hover::before,
.btn-enroll:hover::before,
.btn-continue:hover::before,
.btn-log:hover::before,
.btn-save:hover::before,
.btn-log-workout:hover::before,
.btn-start-session:hover::before,
.btn-unlock:hover::before {
    left: 175%;
}

/* Glow aura */
.btn-primary::after,
.btn-start::after,
.btn-enroll::after,
.btn-continue::after,
.btn-log::after,
.btn-save::after,
.btn-log-workout::after,
.btn-start-session::after,
.btn-unlock::after {
    content: '';
    position: absolute;
    inset: -6px;
    background: radial-gradient(ellipse at 65% 50%, var(--Au-50), transparent 65%);
    opacity: 0;
    transition: opacity 0.32s ease;
    z-index: -1;
    filter: blur(10px);
    pointer-events: none;
}

.btn-primary:hover::after,
.btn-start:hover::after,
.btn-enroll:hover::after,
.btn-continue:hover::after,
.btn-log:hover::after,
.btn-save:hover::after,
.btn-log-workout:hover::after,
.btn-start-session:hover::after,
.btn-unlock:hover::after {
    opacity: 1;
}

.btn-primary:hover,
.btn-start:hover,
.btn-enroll:hover,
.btn-continue:hover,
.btn-log:hover,
.btn-save:hover,
.btn-log-workout:hover,
.btn-start-session:hover,
.btn-unlock:hover {
    transform: translateY(-2px) !important;
    filter: brightness(1.06) !important;
    box-shadow:
        inset 0 1px 0 var(--white-28),
        0 10px 36px var(--Au-50),
        0 3px 12px var(--overlay-40) !important;
}

.btn-primary:active,
.btn-start:active,
.btn-enroll:active,
.btn-continue:active {
    transform: translateY(0) !important;
    filter: brightness(0.96) !important;
}

.btn-primary:disabled,
.btn-start:disabled,
.btn-enroll:disabled,
.btn-continue:disabled,
.btn-log-workout:disabled {
    opacity: 0.52;
    cursor: not-allowed;
    transform: none !important;
    filter: none !important;
}

/* ── Ghost — outlined arrow ────────────────────────────── */
.btn-ghost,
.btn-details {
    background: transparent !important;
    color: var(--Au-hi) !important;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%) !important;
    box-shadow: inset 0 0 0 1.5px var(--Au-30) !important;
    padding: 0.78rem 2.4rem 0.78rem 1.6rem !important;
}

.btn-ghost::before,
.btn-details::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, var(--Au-12) 0%, var(--Au-04) 100%);
    opacity: 0;
    transition: opacity 0.32s ease;
    pointer-events: none;
}

.btn-ghost::after,
.btn-details::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1.5px var(--Au-60);
    opacity: 0;
    transition: opacity 0.32s ease;
    pointer-events: none;
}

.btn-ghost:hover::before,
.btn-details:hover::before { opacity: 1; }
.btn-ghost:hover::after,
.btn-details:hover::after  { opacity: 1; }

.btn-ghost:hover,
.btn-details:hover {
    color: var(--t1) !important;
    transform: translateY(-1px) !important;
    box-shadow:
        inset 0 0 0 1.5px var(--Au-35),
        0 3px 20px var(--Au-12) !important;
}

/* ── Small/inline variant ──────────────────────────────── */
.btn-sm {
    font-size: 0.64rem !important;
    padding: 0.56rem 1.8rem 0.56rem 1.2rem !important;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%) !important;
}

/* ── Full-width (forms/checkout) ───────────────────────── */
.btn-full,
.btn[style*="width:100%"],
.btn[style*="width: 100%"] {
    width: 100% !important;
    clip-path: none !important;
    border-radius: 10px !important;
    padding: 0.88rem 1.8rem !important;
}

/* ── Logout stays subtle red (no arrow) ────────────────── */
.logout-btn,

    background: transparent !important;

}

.logout-btn:hover,

    color: var(--red) !important;

// updatePlanBadge() is provided by api.js — uses live subscription data with caching
async function loadAll(){
    try { populateSidebarUser(); } catch (_) {}
    try { updatePlanBadge(); } catch (_) {}
    LoadingManager.show('Loading...');
    // Safety net: force-hide after 10s
    const _safetyTimer = setTimeout(() => LoadingManager.hide(), 10000);
    try{
        const[pR,eR]=await Promise.all([ProgramsAPI.getProgramById(PROG_ID),ProgramsAPI.getUserPrograms()]);
        // API returns { success, data: programObject } — pR.data IS the full program
        if(pR.success&&pR.data){
            prog=pR.data;
            // Normalise exercises in each day so they work with render functions
            // DB shape: day.exercises[k] = DayExercise { id, exercise:{id,name,...}, ... }
            // We flatten to: { id, name, category, caloriesPerMin, description }
            if(prog.weeks&&prog.weeks.length){
                prog.weeks.forEach(wk=>(wk.days||[]).forEach(day=>{
                    day.exercises=(day.exercises||[]).map(de=>{
                        if(de.exercise) return {
                            id:           de.exercise.id||de.exerciseId||de.id,
                            name:         de.exercise.name||'Exercise',
                            category:     de.exercise.category||'STRENGTH',
                            caloriesPerMin: de.exercise.caloriesPerMin||de.exercise.calories_per_min||8,
                            description:  de.exercise.description||'',
                        };
                        return de; // already flat shape
                    });
                }));
            } else {
                // weeks empty — enrich with fallback weeks if same title matches
                const f=FALLBACK.find(p=>p.id===PROG_ID||p.title===prog.title);
                if(f) prog.weeks=f.weeks;
            }
        } else {
            prog=FALLBACK.find(p=>p.id===PROG_ID)||FALLBACK[0];
        }
        // Enrollment: eR.data is array of { id, programId, progress, program:{...} }
        if(eR.success&&eR.data){
            enroll=eR.data.find(e=>
              e.programId===PROG_ID||
                e.program?.id===PROG_ID||
                String(e.programId)===String(PROG_ID)
            )||null;
            // Compute progress percent if completedDays/totalDays present
            if(enroll&&enroll.completedDays!=null){
                const tot=(prog.durationWeeks||0)*(prog.daysPerWeek||0)||1;
                enroll.progress=Math.round((enroll.completedDays/tot)*100);
            }
        }
        if(!enroll&&EID)enroll={id:EID,programId:PROG_ID,progress:0};
    }catch(err){
        console.warn('Program load error:',err);
        prog=FALLBACK.find(p=>p.id===PROG_ID)||FALLBACK[0];
        enroll=EID?{id:EID,programId:PROG_ID,progress:0}:null;
    }
    finally{ clearTimeout(_safetyTimer); LoadingManager.hide(); }
    if(!prog){document.getElementById('heroTitle').textContent='Program Not Found';return;}
    renderHero();renderIncludes();renderWeeks();renderPanel();
    checkCompletionRedirect();
}

// ── Per-exercise completion helpers ──────────────────────────────────────────
function _exKey(dayIdx) {
    return `ff_ex_${PROG_ID}_${enroll ? enroll.id : 'none'}_d${dayIdx}`;
}
function getCompletedExercises(dayIdx) {
    try { return JSON.parse(localStorage.getItem(_exKey(dayIdx)) || '[]'); }
    catch { return []; }
}
function setExerciseDone(dayIdx, exIdx) {
    const done = getCompletedExercises(dayIdx);
    if (!done.includes(exIdx)) { done.push(exIdx); localStorage.setItem(_exKey(dayIdx), JSON.stringify(done)); }
}
function clearExerciseProgress(dayIdx) {
    localStorage.removeItem(_exKey(dayIdx));
}

// ── Launch a specific exercise from the current day ───────────────────────────
function goToSession(exIdx) {
    const d = getDayAt(_activeDayIndex);
    if (!d || !d.exercises[exIdx]) return;
    const ex  = d.exercises[exIdx];
    const eid = enroll ? enroll.id : '';
    const name = ex.name || ex.exercise?.name || 'Exercise';
    const cat  = (ex.category || ex.exercise?.category || 'STRENGTH');
    const cal  = ex.caloriesPerMin || ex.exercise?.caloriesPerMin || 8;
    const id   = ex.id || ex.exerciseId || ex.exercise?.id || '';
    // Pass exIdx back so we know which exercise was completed on return
    const returnUrl = encodeURIComponent(
        `program-detail.html?id=${PROG_ID}&enrollmentId=${eid}&exDone=1&dayIndex=${_activeDayIndex}&exIndex=${exIdx}`
    );
    location.href = `workout-session.html?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&cal=${cal}&category=${encodeURIComponent(cat)}&program=${encodeURIComponent(PROG_ID)}&enrollment=${encodeURIComponent(eid)}&day=${encodeURIComponent(_activeDay)}&dayIndex=${_activeDayIndex}&exIndex=${exIdx}&returnUrl=${returnUrl}`;
}

// ── Render the day modal with per-exercise checklist ─────────────────────────
function openDay(gi) {
    const d = getDayAt(gi);
    if (!d || !d.exercises || !d.exercises.length) return;
    _activeDay       = `Day ${d.dayNumber}`;
    _activeDayIndex  = gi;
    window.dayExercises = d.exercises;
    renderDayModal();
}

                  ${_activeDay}: ${d.title || 'Workout Day'}

}

// ── Mark a day complete and persist to API ────────────────────────────────────
async function markDayComplete(fromSession = false) {
    if (!enroll) {
        Toast.warning('Enroll in this program first to track progress.');
        closeModal();
        return;
    }
    const dayIndex = _activeDayIndex;
    if (dayIndex < 0) { closeModal(); return; }

    const tot = (prog.durationWeeks || 0) * (prog.daysPerWeek || 0) || 1;
    const currentDone = enroll.completedDays ?? Math.round((enroll.progress || 0) / 100 * tot);
    if (dayIndex !== currentDone) {
        Toast.warning('Complete days in order — finish the current day first.');
        return;
    }

    closeModal();
    LoadingManager.show('Saving progress...');

    try {
        const newCompleted   = currentDone + 1;
        const newCurrentWeek = Math.min(Math.floor(newCompleted / (prog.daysPerWeek || 3)) + 1, prog.durationWeeks || 4);
        const newCurrentDay  = (newCompleted % (prog.daysPerWeek || 3)) + 1;

        const res = await ProgramsAPI.updateProgress(enroll.id, {
            completedDays: newCompleted,
            currentWeek:   newCurrentWeek,
            currentDay:    newCurrentDay,
        });

        if (res.success) {
            enroll.completedDays = newCompleted;
            enroll.currentWeek   = newCurrentWeek;
            enroll.currentDay    = newCurrentDay;
            enroll.progress      = Math.round((newCompleted / tot) * 100);

            // Clear per-exercise progress for this day — it's fully done
            clearExerciseProgress(dayIndex);

            const d = getDayAt(dayIndex);
            const exCount = d?.exercises?.length || 0;
            Toast.success(`Day ${newCompleted} complete! ${exCount > 1 ? 'All ' + exCount + ' exercises done.' : ''} Keep it up `);
            renderPanel();
            renderWeeks();
        } else {
            Toast.error('Could not save progress. Try again.');
        }
    } catch (err) {
        console.error('markDayComplete error:', err);
        Toast.error(err.message || 'Failed to save progress.');
    } finally {
        LoadingManager.hide();
    }
}

// ── Handle redirect back from workout-session ─────────────────────────────────
// Two cases:
//   ?exDone=1&dayIndex=N&exIndex=M  → mark exercise M as done, re-open day modal
//   ?completed=1&dayIndex=N         → legacy — mark whole day (kept for safety)
function checkCompletionRedirect() {
    const urlParams = new URLSearchParams(location.search);
    const clean = `program-detail.html?id=${PROG_ID}${EID ? '&enrollmentId=' + EID : ''}`;

    if (urlParams.get('exDone') === '1') {
        const dayIdx = parseInt(urlParams.get('dayIndex') ?? '-1', 10);
        const exIdx  = parseInt(urlParams.get('exIndex')  ?? '-1', 10);
        history.replaceState({}, '', clean);
        if (dayIdx < 0 || exIdx < 0) return;

        _activeDayIndex = dayIdx;
        setExerciseDone(dayIdx, exIdx);

        const d     = getDayAt(dayIdx);
        const total = d?.exercises?.length || 0;
        const done  = getCompletedExercises(dayIdx);
        const name  = d?.exercises?.[exIdx]?.name || d?.exercises?.[exIdx]?.exercise?.name || 'Exercise';

        const allDone = done.length >= total && total > 0;
        Toast.success(`${name} logged! ${done.length}/${total} done.${allDone ? ' Day complete!' : ''}`);

        if (allDone) {
            // All exercises logged — auto-mark day complete then reopen
            setTimeout(async () => {
                _activeDayIndex = dayIdx;
                await markDayComplete(true);
            }, 600);
        } else {
            setTimeout(() => openDay(dayIdx), 400);
        }
        return;
    }

    if (urlParams.get('completed') === '1') {
        const dayIdx = parseInt(urlParams.get('dayIndex') ?? '-1', 10);
        if (dayIdx < 0) return;
        history.replaceState({}, '', clean);
        _activeDayIndex = dayIdx;
        markDayComplete(true);
    }
}

/* ── SIDEBAR SCROLL-LOCK ──────────────────────────── */

function showConfirm({ icon = '', title = 'Are you sure?', message = '', okText = 'Confirm', cancelText = 'Cancel', danger = false, onOk }) {
    const ex = document.getElementById('ff-confirm');
    if (ex) ex.remove();
    const backdrop = document.createElement('div');
    backdrop.className = 'ff-confirm-backdrop';
    backdrop.id = 'ff-confirm';
    backdrop.innerHTML = `
        <div class="ff-confirm-box">
          <span class="ff-confirm-icon">${icon}</span>
          <div class="ff-confirm-title">${title}</div>
          <p class="ff-confirm-msg">${message}</p>
          <div class="ff-confirm-actions">
              <button class="ff-confirm-cancel" id="ffCancel">${cancelText}</button>
              <button class="ff-confirm-ok ${danger ? 'danger' : ''}" id="ffOk">${okText}</button>
          </div>
      </div>`;
    document.body.appendChild(backdrop);
    const close = () => {
        backdrop.style.opacity = '0';
        backdrop.style.pointerEvents = 'none';
        backdrop.style.visibility = 'hidden';
        if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
    };
    backdrop.querySelector('#ffCancel').addEventListener('click', e => { e.stopPropagation(); close(); });
    backdrop.querySelector('#ffOk').addEventListener('click', e => { e.stopPropagation(); close(); if (onOk) onOk(); });
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
    });
}

<script>
// ── Notification System ─────────────────────────────────────────────────────
(function(){
    const BASE = (typeof API_CONFIG !== 'undefined' && API_CONFIG.baseURL)
        ? API_CONFIG.baseURL
        : 'https://fit.cctamcc.site/api/v1';

    let _open = false, _data = [], _timer = null;

    function _token() {
        return (typeof TokenManager !== 'undefined' && TokenManager.getAccessToken)
            ? TokenManager.getAccessToken()
            : localStorage.getItem('accessToken') || '';
    }
    function _auth() { return typeof isAuthenticated !== 'undefined' ? isAuthenticated() : !!_token(); }

    window.openNotifPanel = function() {
        _open = true;
        document.getElementById('notifPanel').classList.add('open');
        document.getElementById('notifOverlay').classList.add('open');
        fetchNotifs(true);
    };
    window.closeNotifPanel = function() {
        _open = false;
        document.getElementById('notifPanel').classList.remove('open');
        document.getElementById('notifOverlay').classList.remove('open');
    };
    window.toggleNotifPanel = function() { _open ? closeNotifPanel() : openNotifPanel(); };

    async function fetchNotifs(full) {
        if (!_auth()) return;
        try {
            const r = await fetch(BASE + '/notifications?limit=30', {
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token() }
            });
            if (!r.ok) return;
            const d = await r.json();
            _data = d.notifications || [];
            renderNotifs(_data);
            updateBadge(d.unreadCount || 0);
        } catch(e) { /* non-critical */ }
    }

    function renderNotifs(items) {
        const list = document.getElementById('notifList');
        const markBtn = document.getElementById('markAllBtn');
        if (!list) return;
        const hasUnread = items.some(n => !n.readAt);
        if (markBtn) markBtn.style.display = hasUnread ? 'block' : 'none';
        if (!items.length) {
            list.innerHTML = '<div class="notif-empty"><div class="notif-empty-icon">🔔</div><p>You're all caught up!<br>Notifications about your plan, progress, and milestones appear here.</p></div>';
            return;
        }
        list.innerHTML = items.map(n => {
            const iconBg = { welcome:'rgba(212,175,55,0.15)', sub_activated:'rgba(74,222,128,0.12)',
                sub_trial:'rgba(251,191,36,0.12)', sub_expired:'rgba(156,163,175,0.1)',
                sub_cancelled:'rgba(248,113,113,0.12)', sub_renewed:'rgba(74,222,128,0.12)',
                sub_failed:'rgba(248,113,113,0.12)', milestone:'rgba(212,175,55,0.18)',
                achievement:'rgba(212,175,55,0.18)', system:'rgba(96,165,250,0.12)' }[n.type] || 'rgba(255,255,255,0.05)';
            return '<div class="notif-item' + (n.readAt ? '' : ' unread') + '" onclick="handleNotifClick('' + n.id + '','' + (n.link||'') + '')" data-id="' + n.id + '">' +
                '<div class="notif-icon-wrap" style="background:' + iconBg + '">' + n.icon + '</div>' +
                '<div class="notif-content">' +
                '<div class="notif-title">' + escHtml(n.title) + '</div>' +
                '<div class="notif-body">' + escHtml(n.body) + '</div>' +
                '<div class="notif-time">' + timeAgo(new Date(n.createdAt)) + '</div>' +
                '</div>' +
                '<button class="notif-delete-btn" onclick="deleteNotif(event,'' + n.id + '')" aria-label="Dismiss">✕</button>' +
                '</div>';
        }).join('');
    }

    function updateBadge(count) {
        const b = document.getElementById('notifBadge');
        if (!b) return;
        if (count > 0) { b.textContent = count > 99 ? '99+' : String(count); b.classList.add('visible'); }
        else { b.classList.remove('visible'); }
    }

    window.handleNotifClick = async function(id, link) {
        await _call('/' + id + '/read', 'PUT');
        const n = _data.find(x => x.id === id);
        if (n) { n.readAt = new Date().toISOString(); renderNotifs(_data); updateBadge(_data.filter(x=>!x.readAt).length); }
        if (link) { closeNotifPanel(); window.location.href = link; }
    };
    window.deleteNotif = async function(e, id) {
        e.stopPropagation();
        await _call('/' + id, 'DELETE');
        _data = _data.filter(x => x.id !== id);
        renderNotifs(_data); updateBadge(_data.filter(x=>!x.readAt).length);
    };
    window.markAllNotifsRead = async function() {
        await _call('/read-all', 'PUT');
        _data = _data.map(n => ({...n, readAt: n.readAt || new Date().toISOString()}));
        renderNotifs(_data); updateBadge(0);
    };

    async function _call(path, method) {
        try {
            await fetch(BASE + '/notifications' + path, {
                method, credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token() }
            });
        } catch(e) { /* silent */ }
    }

    function escHtml(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function timeAgo(d) {
        const s = Math.floor((Date.now()-d.getTime())/1000);
        if(s<60) return 'just now';
        if(s<3600) return Math.floor(s/60)+'m ago';
        if(s<86400) return Math.floor(s/3600)+'h ago';
        const days=Math.floor(s/86400); return days===1?'yesterday':days+'d ago';
    }

    function startPolling() {
        if (_timer) clearInterval(_timer);
        fetchNotifs();
        _timer = setInterval(async()=>{
            if(!_auth()) return;
            try {
                const r = await fetch(BASE+'/notifications/unread',{
                    credentials:'include', headers:{'Authorization':'Bearer '+_token()}
                });
                if(!r.ok) return;
                const d = await r.json();
                updateBadge(d.count||0);
                if(_open) fetchNotifs();
            } catch(e){}
        }, 90000);
    }

    document.addEventListener('DOMContentLoaded', ()=>{
        if(_auth()) startPolling();
    });
})();
</script>
