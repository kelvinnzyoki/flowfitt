    <style>
        /* Copy all CSS from dashboard.html :root {

    --gold-deep:    #B8860B;

    --sidebar-w:    280px;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }
        
        /* Include sidebar styles from dashboard */
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { /* Copy sidebar CSS from dashboard */ }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; }
        
        .profile-form {
            max-width: 800px;

            display: grid;

/* ═══════════════════════════════════════
   GLOBAL DESIGN SYSTEM — FLOWFIT GOLD
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
    overflow-x: hidden;
    max-width: 100vw;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
}

/* ── Typography ─── */
h1, h2, h3, h4, h5, h6,
.hero-title, .section-title, .card-title,
.stat-value, .logo, .greeting,
.panel-title, .wm-title, .hero-text h1,
.section-header h2, .pricing-card h3,
.feature-card h3, .auth-header h1,
.modal-header h2, .nav-title {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
}

/* Biggest display text → Anton */
.hero-text h1,
.hero-title,
.stat-number {
    font-family: 'Anton', sans-serif;
    letter-spacing: 0.01em;
}

.logo {
    font-family: 'Anton', sans-serif !important;
    letter-spacing: 0.05em;
    background: var(--gradient-gold) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Sidebar ─── */
.sidebar {
    background: var(--bg-secondary) !important;
    border-right: 1px solid var(--border-gold) !important;
    width: 270px !important;
}

.nav-link {
    color: var(--text-secondary) !important;
    border-radius: 10px !important;
    transition: var(--transition-smooth) !important;
    font-family: 'Inter', sans-serif !important;
    font-weight: 500;
}

.nav-link:hover {
    background: var(--gold-soft) !important;
    color: var(--gold-primary) !important;
    border-left: 3px solid var(--gold-primary) !important;
    padding-left: calc(1.25rem - 3px) !important;
}

.nav-link.active {
    background: var(--gradient-gold) !important;
    color: #000 !important;
    font-weight: 700 !important;
    border-left: none !important;
    padding-left: 1.25rem !important;
}

/* ── Cards ─── */
.card, .stat-card, .chart-card, .panel-card,
.program-card, .exercise-card, .feature-card,
.pricing-card, .auth-card, .form-section,
.week-block {
    background: var(--bg-card) !important;
    border: 1px solid var(--border-gold) !important;
    border-radius: 16px !important;
    backdrop-filter: blur(12px);
    transition: var(--transition-smooth) !important;
}

.card:hover, .stat-card:hover, .program-card:hover,
.exercise-card:hover, .feature-card:hover {
    border-color: var(--border-gold-hover) !important;
    box-shadow: var(--shadow-gold-glow), var(--shadow-card) !important;
    transform: translateY(-4px) !important;
}

/* ── Stat card accent bars ─── */
.stat-card::before {
    background: var(--gradient-gold) !important;
}

/* ── Buttons ─── */
.btn-primary, .btn-start, .btn-enroll, .btn-log,
.btn-continue, .btn-enroll, .btn-start-session,
.btn-continue, .logout-btn,
button[class*="btn-enroll"],
button[class*="btn-continue"] {
    background: var(--gradient-gold) !important;
    color: #000 !important;
    font-weight: 700 !important;
    border: none !important;
    font-family: 'Inter', sans-serif !important;
    transition: var(--transition-smooth) !important;
}

.btn-primary:hover, .btn-start:hover, .btn-enroll:hover,
.btn-log:hover, .btn-continue:hover,
.btn-start-session:hover {
    box-shadow: 0 8px 30px var(--accent-glow) !important;
    transform: translateY(-2px) !important;
}

.btn-details, .btn-save, .btn-ghost, .btn-close-wm,
.close-btn, .back-btn {
    border-color: var(--border-gold) !important;
    color: var(--text-gold) !important;
}

.btn-details:hover, .btn-save:hover, .btn-ghost:hover {
    border-color: var(--border-gold-hover) !important;
    background: var(--gold-soft) !important;
}

/* ── Logout btn special ─── */
.logout-btn {
    background: rgba(212, 175, 55, 0.1) !important;
    color: var(--gold-primary) !important;
    border: 1px solid var(--border-gold) !important;
}
.logout-btn:hover {
    background: rgba(212, 175, 55, 0.2) !important;
    box-shadow: none !important;
    transform: none !important;
}

/* ── Inputs ─── */
.form-input, .form-select, .form-textarea,
.search-bar input, .form-field input,
.form-field select, .form-field textarea,
input, select, textarea {
    background: rgba(212, 175, 55, 0.04) !important;
    border: 1px solid var(--border-gold) !important;
    color: var(--text-primary) !important;
    font-family: 'Inter', sans-serif !important;
    border-radius: 10px !important;
}

.form-input:focus, .form-select:focus, .form-textarea:focus,
.search-bar input:focus, .form-field input:focus,
.form-field select:focus, .form-field textarea:focus {
    border-color: var(--gold-primary) !important;
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15) !important;
    outline: none !important;
}

/* ── Progress bars ─── */
.progress-fill, .week-progress-fill, .cat-bar-fill {
    background: var(--gradient-gold) !important;
}

/* ── Badges / Tags / Chips ─── */
.program-badge, .hero-badge, .preview-badge,
.difficulty-badge, .section-label {
    background: rgba(212, 175, 55, 0.15) !important;
    color: var(--gold-primary) !important;
    border: 1px solid var(--border-gold) !important;
}

.premium-tag {
    background: var(--gradient-gold) !important;
    color: #000 !important;
}

/* ── Gradient text helpers ─── */
.gradient-text, .streak-number,
[class*="gradient-text"] {
    background: var(--gradient-gold) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Active nav link accent ─── */
.tab-btn.active, .time-btn.active {
    background: var(--gradient-gold) !important;
    color: #000 !important;
    border-color: transparent !important;
}

/* ── Program header colors ─── */
.program-header {
    background: var(--gradient-gold-soft) !important;
    border-bottom: 1px solid var(--border-gold) !important;
}

/* ── Achievement items ─── */
.achievement-item.unlocked {
    border-color: var(--border-gold) !important;
    background: var(--gold-soft) !important;
}

.achievement-icon-wrap {
    background: var(--gradient-gold) !important;
}

/* ── User avatar ─── */
.user-avatar {
    background: var(--gradient-gold) !important;
    color: #000 !important;
}

/* ── Loading modal fix ─── */
#loadingModal, .loading-modal, [id*="loading"],
[class*="loading-overlay"], [class*="loadingOverlay"] {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 9999 !important;
    background: rgba(5, 5, 5, 0.85) !important;
    backdrop-filter: blur(8px) !important;
}

/* ── Modals ─── */
.modal-content, .wmodal-box, .wm-body {
    background: var(--bg-elevated) !important;
    border: 1px solid var(--border-gold) !important;
}

/* ── Pricing featured card ─── */
.pricing-card.featured {
    border: 2px solid var(--gold-primary) !important;
    box-shadow: 0 30px 80px rgba(212, 175, 55, 0.2) !important;
}

.pricing-badge {
    background: var(--gradient-gold) !important;
    color: #000 !important;
}

/* ── Section icon ─── */
.section-icon {
    background: var(--gradient-gold-soft) !important;
    border: 1px solid var(--border-gold) !important;
}

/* ── Background animation orbs → gold ─── */
.bg-animation::before {
    background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 70%) !important;
}
.bg-animation::after {
    background: radial-gradient(circle, rgba(184,134,11,0.4) 0%, transparent 70%) !important;
}

/* ── Top nav ─── */
nav, .top-nav {
    background: rgba(5, 5, 5, 0.9) !important;
    border-bottom: 1px solid var(--border-gold) !important;
}

/* ── Main content offset for sidebar ─── */
.main-content {
    margin-left: 270px;
    width: calc(100% - 270px);
    max-width: 100%;
    overflow-x: hidden;
}

.main {
    margin-left: 260px !important;
}

/* ── Programs grid overflow fix ─── */
.programs-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

.exercise-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

.achievements-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

/* Contain all grid items */
.program-card, .exercise-card, .achievement-item {
    min-width: 0 !important;
    overflow: hidden !important;
    word-break: break-word !important;
}

/* ── Nav hero section (index) ─── */
nav .btn-primary {
    background: var(--gradient-gold) !important;
    color: #000 !important;
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3) !important;
}

/* ── Workout badge colors → gold palette ─── */
.workout-badge { background: rgba(212,175,55,0.12) !important; color: var(--gold-primary) !important; }
.workout-badge.cardio { background: rgba(212,175,55,0.1) !important; color: #E6BE8A !important; }
.workout-badge.strength { background: rgba(184,134,11,0.15) !important; color: #D4AF37 !important; }
.workout-badge.core { background: rgba(242,212,121,0.12) !important; color: #F2D479 !important; }
.workout-badge.hiit { background: rgba(200,155,60,0.15) !important; color: #c89b3c !important; }

/* ── Hero bg gradient overrides (program-detail, workout-session) ─── */
.hero-bg {
    background: linear-gradient(135deg, #1a1508 0%, #0b0b0f 100%) !important;
}

/* ── Achievement points badge ─── */
.achievement-pts {
    background: rgba(212, 175, 55, 0.15) !important;
    color: var(--gold-primary) !important;
}

/* ════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════ */

/* ── Tablet (max 1024px) ─── */
@media (max-width: 1024px) {
    .main-content {
        margin-left: 240px !important;
        width: calc(100% - 240px) !important;
        padding: 1.5rem 2rem !important;
    }
    .sidebar { width: 240px !important; }
    .main { margin-left: 240px !important; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .chart-grid { grid-template-columns: 1fr !important; }
    .content-grid { grid-template-columns: 1fr !important; }
    .hero-content { grid-template-columns: 1fr !important; }
    .hero-text h1 { font-size: 3.5rem !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .features-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .body { grid-template-columns: 1fr !important; padding: 1.5rem !important; }
}

/* ── Mobile (max 768px) ─── */
@media (max-width: 768px) {
    html, body { overflow-x: hidden !important; }

    .sidebar {
        transform: translateX(-100%) !important;
        z-index: 1000 !important;
        width: 260px !important;
    }
    .sidebar.mobile-active { transform: translateX(0) !important; }

    .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        padding: 1rem !important;
    }
    .main { margin-left: 0 !important; }

    .dashboard-container { flex-direction: column; }

    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 1rem !important; }
    .content-grid { grid-template-columns: 1fr !important; }
    .chart-grid { grid-template-columns: 1fr !important; }
    .streak-section { grid-template-columns: 1fr !important; }
    .programs-grid { grid-template-columns: 1fr !important; }
    .exercise-grid { grid-template-columns: 1fr !important; }
    .achievements-grid { grid-template-columns: 1fr !important; }
    .features-grid { grid-template-columns: 1fr !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }
    .form-row { grid-template-columns: 1fr !important; }
    .hero-content { grid-template-columns: 1fr !important; gap: 2rem !important; }
    .hero-text h1 { font-size: 2.5rem !important; }
    .hero-title { font-size: 2rem !important; }
    .section-header h2 { font-size: 2rem !important; }
    .greeting { font-size: 1.5rem !important; margin-top: 3rem !important; }
    .prog-ring-wrap { width: 100px; height: 100px; }
    .hero-stats { flex-wrap: wrap !important; gap: 1rem !important; }
    .hero-cta { flex-direction: column !important; }
    nav { padding: 1rem 1.5rem !important; }
    .nav-links { display: none !important; }
    .body { padding: 1rem !important; }
    .progress-panel { position: static !important; }
    .stats-grid { grid-template-columns: 1fr 1fr !important; }
    .controls { flex-direction: column !important; }
    .search-bar { min-width: unset !important; width: 100% !important; }
    .program-meta { grid-template-columns: repeat(2, 1fr) !important; }
    .includes-grid { grid-template-columns: 1fr !important; }
    .hero-content.workout { padding: 1.5rem !important; }
    .video-section { margin: 1rem !important; }
}

/* ── Small mobile (max 480px) ─── */
@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr !important; }
    .hero-text h1 { font-size: 2rem !important; }
    .stat-value { font-size: 1.8rem !important; }
    .auth-card { padding: 2rem 1.5rem !important; }
    .modal-content { margin: 0.5rem !important; }
    .program-meta { grid-template-columns: 1fr 1fr !important; }
    .filter-tabs { flex-wrap: wrap; }
    .tab-btn { padding: 0.7rem 1rem !important; font-size: 0.85rem !important; }
}

    
/* ── Extended LoadingManager modal fix ─── */
body > div[style*="position: fixed"],
body > div[style*="position:fixed"] {
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    max-width: 100vw !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 9999 !important;
}

/* Spinner / loading box inside modal */
.loading-spinner, .loading-box, .loading-content,
[class*="spinner"] {
    background: var(--bg-elevated) !important;
    border: 1px solid var(--border-gold) !important;
    border-radius: 16px !important;
    padding: 2rem 3rem !important;
    text-align: center !important;
    color: var(--gold-primary) !important;
    font-family: 'Inter', sans-serif !important;
    box-shadow: var(--shadow-gold-glow) !important;
}

    
/* ════════════════════════════════════════════════
   FLOWFIT ELITE — SHARED DESIGN SYSTEM OVERRIDES
════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;}
html,body{overflow-x:hidden;max-width:100vw;}

body {
    font-family:'Inter',sans-serif!important;
    background-color:var(--bg-deep)!important;
    background-image:
        radial-gradient(circle at 12% 18%,rgba(212,175,55,0.055) 0%,transparent 42%),
        radial-gradient(circle at 88% 82%,rgba(0,242,254,0.03) 0%,transparent 38%)!important;
    color:var(--text-primary)!important;
}

/* ── TYPOGRAPHY ────────────────────────────────── */
h1,h2,h3,h4,h5,h6,
.hero-title,.section-title,.card-title,.stat-value,
.greeting,.panel-title,.wm-title,.chart-title,
.section-header h2,.pricing-card h3,.feature-card h3,
.auth-header h1,.modal-header h2,.nav-title,
.header h1,.header-left h1 {
    font-family:'Oswald',sans-serif!important;
    letter-spacing:0.03em;
}
.logo,.hero-text h1,.stat-number,.hero-title {
    font-family:'Anton',sans-serif!important;
}
p,a,label,button,input,select,textarea,span,li,td,th {
    font-family:'Inter',sans-serif;
}

/* ── LOGO ────────────────────────────────────────── */
.logo {
    font-family:'Anton',sans-serif!important;
    font-size:2rem!important;letter-spacing:4px!important;
    background:var(--gold-gradient)!important;
    -webkit-background-clip:text!important;
    -webkit-text-fill-color:transparent!important;
    background-clip:text!important;
    filter:drop-shadow(0 0 10px rgba(212,175,55,0.2))!important;
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
    background:var(--bg-surface)!important;
    border-right:1px solid var(--border-gold)!important;
    width:280px!important;
}
.nav-link {
    font-family:'Oswald',sans-serif!important;
    font-weight:500!important;letter-spacing:1px!important;
    color:var(--text-secondary)!important;
    border-radius:14px!important;
    border:1px solid transparent!important;
    transition:var(--transition)!important;
}
.nav-link:hover {
    color:var(--gold-main)!important;
    background:var(--gold-soft)!important;
    border-color:var(--border-gold)!important;
}
.nav-link.active {
    background:var(--gold-gradient)!important;
    color:#000!important;border-color:transparent!important;
    box-shadow:0 6px 20px var(--gold-glow)!important;
    font-weight:700!important;
}

/* ── USER AVATAR ─────────────────────────────────── */
.user-avatar {

</style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Copy sidebar from dashboard.html -->
        
        <main class="main-content">
            <h1>Profile Settings</h1>
            
            <form class="profile-form" id="profileForm">
                <!-- Personal Information -->
                <div class="form-section">
                    <h2>Personal Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" name="firstName" class="form-input" placeholder="John">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="lastName" class="form-input" placeholder="Doe">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="dateOfBirth" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Fitness Details -->
                <div class="form-section">
                    <h2>Fitness Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Height (cm)</label>
                            <input type="number" name="height" class="form-input" placeholder="175">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Weight (kg)</label>
                            <input type="number" name="weight" class="form-input" placeholder="70">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Target Weight (kg)</label>
                            <input type="number" name="targetWeight" class="form-input" placeholder="65">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fitness Level</label>
                            <select name="fitnessLevel" class="form-select">
                                <option value="">Select Level</option>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="advanced">Advanced</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fitness Goal</label>
                            <input type="text" name="fitnessGoal" class="form-input" placeholder="Lose weight, Build muscle, etc.">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Timezone</label>
                            <input type="text" name="timezone" class="form-input" placeholder="America/New_York">
                        </div>
                    </div>
                </div>
                
                <!-- Bio -->
                <div class="form-section">
                    <h2>About You</h2>
                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea name="bio" class="form-textarea" placeholder="Tell us about yourself..."></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Save Profile</button>
            </form>
        </main>
    </div>
    
    <script src="api.js"></script>
    <script>
        requireAuth();
        
        // Load profile data
        async function loadProfile() {
            try {
                const response = await UserAPI.getProfile();
                if (response.success && response.data.profile) {
                    const profile = response.data.profile;
                    
                    // Populate form fields
                    Object.keys(profile).forEach(key => {
                        const input = document.querySelector(`[name="${key}"]`);
                        if (input && profile[key]) {
                            if (key === 'dateOfBirth') {
                                input.value = new Date(profile[key]).toISOString().split('T')[0];
                            } else {
                                input.value = profile[key];
                            }
                        }
                    });
                }
            } catch (error) {
                Toast.error('Failed to load profile');
                console.error(error);
            }
        }
        
        // Save profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {};
            
            formData.forEach((value, key) => {
                if (value) data[key] = value;
            });
            
            try {
                LoadingManager.show('Saving profile...');
                
                const response = await UserAPI.updateProfile(data);
                
                if (response.success) {
                    Toast.success('Profile updated successfully! 🎉');
                }
                
                LoadingManager.hide();
            } catch (error) {
                LoadingManager.hide();
                Toast.error('Failed to update profile');
                console.error(error);
            }
        });
        
        // Logout
        async function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                LoadingManager.show('Logging out...');
                await AuthAPI.logout();
            }
        }
        
        // Load on page load
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
