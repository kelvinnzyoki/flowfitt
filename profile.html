        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family:'Josefin Sans',sans-serif;
            background: var(--ink);
            color: var(--t1);
        }
        
        /* Include sidebar styles from dashboard */
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { /* Copy sidebar CSS from dashboard */ }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; }
        
        .profile-form {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-section {
            background: var(--g-card);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid var(--b1);
        }
        
        .form-section h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--t2);
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--b1);
            border-radius: 12px;
            color: var(--t1);
            font-family:'Josefin Sans',sans-serif;
        }
        
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--Au);
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--g-Au);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .main-content { margin-left: 0; padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    
/* ═══════════════════════════════════════
   GLOBAL DESIGN SYSTEM — FLOWFIT GOLD
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
    overflow-x: hidden;
    max-width: 100vw;
}

body {
    font-family:'Josefin Sans',sans-serif;
    background: var(--ink);
    color: var(--t1);
    line-height: 1.6;
}

/* ── Typography ─── */
h1, h2, h3, h4, h5, h6,
.hero-title, .section-title, .card-title,
.stat-value, .logo, .greeting,
.panel-title, .wm-title, .hero-text h1,
.section-header h2, .pricing-card h3,
.feature-card h3, .auth-header h1,
.modal-header h2, .nav-title {
    font-family:'Josefin Sans',sans-serif;
    letter-spacing: 0.02em;
}

/* Biggest display text → Anton */
.hero-text h1,
.hero-title,
.stat-number {
    font-family:'Josefin Sans',sans-serif;
    letter-spacing: 0.01em;
}

.logo {
    font-family:'Josefin Sans',sans-serif !important;
    letter-spacing: 0.05em;
    background: var(--g-Au) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Sidebar ─── */
.sidebar {
    background: var(--bg-secondary) !important;
    border-right: 1px solid var(--b1) !important;
    width: 270px !important;
}

.nav-link {
    color: var(--t2) !important;
    border-radius: 10px !important;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1) !important;
    font-family:'Josefin Sans',sans-serif !important;
    font-weight: 500;
}

.nav-link:hover {
    background: var(--Au-mist) !important;
    color: var(--Au) !important;
    border-left: 3px solid var(--Au) !important;
    padding-left: calc(1.25rem - 3px) !important;
}

.nav-link.active {
    background: var(--g-Au) !important;
    color: #000 !important;
    font-weight: 700 !important;
    border-left: none !important;
    padding-left: 1.25rem !important;
}

/* ── Cards ─── */
.card, .stat-card, .chart-card, .panel-card,
.program-card, .exercise-card, .feature-card,
.pricing-card, .auth-card, .form-section,
.week-block {
    background: var(--g-card) !important;
    border: 1px solid var(--b1) !important;
    border-radius: 16px !important;
    backdrop-filter: blur(12px);
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1) !important;
}

.card:hover, .stat-card:hover, .program-card:hover,
.exercise-card:hover, .feature-card:hover {
    border-color: var(--b2) !important;
    box-shadow: 0 0 30px var(--Au-glow), 0 10px 40px rgba(0,0,0,0.5) !important;
    transform: translateY(-4px) !important;
}

/* ── Stat card accent bars ─── */
.stat-card::before {
    background: var(--g-Au) !important;
}

/* ── Buttons ─── */
.btn-primary, .btn-start, .btn-enroll, .btn-log,
.btn-continue, .btn-enroll, .btn-start-session,
.btn-continue, .logout-btn,
button[class*="btn-enroll"],
button[class*="btn-continue"] {
    background: var(--g-Au) !important;
    color: #000 !important;
    font-weight: 700 !important;
    border: none !important;
    font-family:'Josefin Sans',sans-serif !important;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1) !important;
}

.btn-primary:hover, .btn-start:hover, .btn-enroll:hover,
.btn-log:hover, .btn-continue:hover,
.btn-start-session:hover {
    box-shadow: 0 8px 30px var(--Au-glow) !important;
    transform: translateY(-2px) !important;
}

.btn-details, .btn-save, .btn-ghost, .btn-close-wm,
.close-btn, .back-btn {
    border-color: var(--b1) !important;
    color: var(--Au-hi) !important;
}

.btn-details:hover, .btn-save:hover, .btn-ghost:hover {
    border-color: var(--b2) !important;
    background: var(--Au-mist) !important;
}

/* ── Logout btn special ─── */
.logout-btn {
    background: rgba(212, 175, 55, 0.1) !important;
    color: var(--Au) !important;
    border: 1px solid var(--b1) !important;
}
.logout-btn:hover {
    background: rgba(212, 175, 55, 0.2) !important;
    box-shadow: none !important;
    transform: none !important;
}

/* ── Inputs ─── */
.form-input, .form-select, .form-textarea,
.search-bar input, .form-field input,
.form-field select, .form-field textarea,
input, select, textarea {
    background: rgba(212, 175, 55, 0.04) !important;
    border: 1px solid var(--b1) !important;
    color: var(--t1) !important;
    font-family:'Josefin Sans',sans-serif !important;
    border-radius: 10px !important;
}

.form-input:focus, .form-select:focus, .form-textarea:focus,
.search-bar input:focus, .form-field input:focus,
.form-field select:focus, .form-field textarea:focus {
    border-color: var(--Au) !important;
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15) !important;
    outline: none !important;
}

/* ── Progress bars ─── */
.progress-fill, .week-progress-fill, .cat-bar-fill {
    background: var(--g-Au) !important;
}

/* ── Badges / Tags / Chips ─── */
.program-badge, .hero-badge, .preview-badge,
.difficulty-badge, .section-label {
    background: rgba(212, 175, 55, 0.15) !important;
    color: var(--Au) !important;
    border: 1px solid var(--b1) !important;
}

.premium-tag {
    background: var(--g-Au) !important;
    color: #000 !important;
}

/* ── Gradient text helpers ─── */
.gradient-text, .streak-number,
[class*="gradient-text"] {
    background: var(--g-Au) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Active nav link accent ─── */
.tab-btn.active, .time-btn.active {
    background: var(--g-Au) !important;
    color: #000 !important;
    border-color: transparent !important;
}

/* ── Program header colors ─── */
.program-header {
    background: var(--Au-mist) !important;
    border-bottom: 1px solid var(--b1) !important;
}

/* ── Achievement items ─── */
.achievement-item.unlocked {
    border-color: var(--b1) !important;
    background: var(--Au-mist) !important;
}

.achievement-icon-wrap {
    background: var(--g-Au) !important;
}

/* ── User avatar ─── */
.user-avatar {
    background: var(--g-Au) !important;
    color: #000 !important;
}

/* ── Loading modal fix ─── */
#loadingModal, .loading-modal, [id*="loading"],
[class*="loading-overlay"], [class*="loadingOverlay"] {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 9999 !important;
    background: rgba(5, 5, 5, 0.85) !important;
    backdrop-filter: blur(8px) !important;
}

/* ── Modals ─── */
.modal-content, .wmodal-box, .wm-body {
    background: var(--ink-2) !important;
    border: 1px solid var(--b1) !important;
}

/* ── Pricing featured card ─── */
.pricing-card.featured {
    border: 2px solid var(--Au) !important;
    box-shadow: 0 30px 80px rgba(212, 175, 55, 0.2) !important;
}

.pricing-badge {
    background: var(--g-Au) !important;
    color: #000 !important;
}

/* ── Section icon ─── */
.section-icon {
    background: var(--Au-mist) !important;
    border: 1px solid var(--b1) !important;
}

/* ── Background animation orbs → gold ─── */
.bg-animation::before {
    background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 70%) !important;
}
.bg-animation::after {
    background: radial-gradient(circle, rgba(184,134,11,0.4) 0%, transparent 70%) !important;
}

/* ── Top nav ─── */
nav, .top-nav {
    background: rgba(5, 5, 5, 0.9) !important;
    border-bottom: 1px solid var(--b1) !important;
}

/* ── Main content offset for sidebar ─── */
.main-content {
    margin-left: 270px;
    width: calc(100% - 270px);
    max-width: 100%;
    overflow-x: hidden;
}

.main {
    margin-left: 260px !important;
}

/* ── Programs grid overflow fix ─── */
.programs-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

.exercise-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

.achievements-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

/* Contain all grid items */
.program-card, .exercise-card, .achievement-item {
    min-width: 0 !important;
    overflow: hidden !important;
    word-break: break-word !important;
}

/* ── Nav hero section (index) ─── */
nav .btn-primary {
    background: var(--g-Au) !important;
    color: #000 !important;
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3) !important;
}

/* ── Workout badge colors → gold palette ─── */
.workout-badge { background: rgba(212,175,55,0.12) !important; color: var(--Au) !important; }
.workout-badge.cardio { background: rgba(212,175,55,0.1) !important; color: var(--Au-hi) !important; }
.workout-badge.strength { background: rgba(184,134,11,0.15) !important; color: var(--Au) !important; }
.workout-badge.core { background: rgba(242,212,121,0.12) !important; color: #F2D479 !important; }
.workout-badge.hiit { background: rgba(200,155,60,0.15) !important; color: var(--Au) !important; }

/* ── Hero bg gradient overrides (program-detail, workout-session) ─── */
.hero-bg {
    background: linear-gradient(135deg, #1a1508 0%, #0b0b0f 100%) !important;
}

/* ── Achievement points badge ─── */
.achievement-pts {
    background: rgba(212, 175, 55, 0.15) !important;
    color: var(--Au) !important;
}

/* ════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════ */

/* ── Tablet (max 1024px) ─── */
@media (max-width: 1024px) {
    .main-content {
        margin-left: 240px !important;
        width: calc(100% - 240px) !important;
        padding: 1.5rem 2rem !important;
    }
    .sidebar { width: 240px !important; }
    .main { margin-left: 240px !important; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .chart-grid { grid-template-columns: 1fr !important; }
    .content-grid { grid-template-columns: 1fr !important; }
    .hero-content { grid-template-columns: 1fr !important; }
    .hero-text h1 { font-size: 3.5rem !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .features-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .body { grid-template-columns: 1fr !important; padding: 1.5rem !important; }
}

/* ── Mobile (max 768px) ─── */
@media (max-width: 768px) {
    html, body { overflow-x: hidden !important; }

    .sidebar {
        transform: translateX(-100%) !important;
        z-index: 1000 !important;
        width: 260px !important;
    }
    .sidebar.mobile-active { transform: translateX(0) !important; }

    .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        padding: 1rem !important;
    }
    .main { margin-left: 0 !important; }

    .dashboard-container { flex-direction: column; }

    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 1rem !important; }
    .content-grid { grid-template-columns: 1fr !important; }
    .chart-grid { grid-template-columns: 1fr !important; }
    .streak-section { grid-template-columns: 1fr !important; }
    .programs-grid { grid-template-columns: 1fr !important; }
    .exercise-grid { grid-template-columns: 1fr !important; }
    .achievements-grid { grid-template-columns: 1fr !important; }
    .features-grid { grid-template-columns: 1fr !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }
    .form-row { grid-template-columns: 1fr !important; }
    .hero-content { grid-template-columns: 1fr !important; gap: 2rem !important; }
    .hero-text h1 { font-size: 2.5rem !important; }
    .hero-title { font-size: 2rem !important; }
    .section-header h2 { font-size: 2rem !important; }
    .greeting { font-size: 1.5rem !important; margin-top: 3rem !important; }
    .prog-ring-wrap { width: 100px; height: 100px; }
    .hero-stats { flex-wrap: wrap !important; gap: 1rem !important; }
    .hero-cta { flex-direction: column !important; }
    nav { padding: 1rem 1.5rem !important; }
    .nav-links { display: none !important; }
    .body { padding: 1rem !important; }
    .progress-panel { position: static !important; }
    .stats-grid { grid-template-columns: 1fr 1fr !important; }
    .controls { flex-direction: column !important; }
    .search-bar { min-width: unset !important; width: 100% !important; }
    .program-meta { grid-template-columns: repeat(2, 1fr) !important; }
    .includes-grid { grid-template-columns: 1fr !important; }
    .hero-content.workout { padding: 1.5rem !important; }
    .video-section { margin: 1rem !important; }
}

/* ── Small mobile (max 480px) ─── */
@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr !important; }
    .hero-text h1 { font-size: 2rem !important; }
    .stat-value { font-size: 1.8rem !important; }
    .auth-card { padding: 2rem 1.5rem !important; }
    .modal-content { margin: 0.5rem !important; }
    .program-meta { grid-template-columns: 1fr 1fr !important; }
    .filter-tabs { flex-wrap: wrap; }
    .tab-btn { padding: 0.7rem 1rem !important; font-size: 0.85rem !important; }
}

    
/* ── Extended LoadingManager modal fix ─── */
body > div[style*="position: fixed"],
body > div[style*="position:fixed"] {
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    max-width: 100vw !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 9999 !important;
}

/* Spinner / loading box inside modal */
.loading-spinner, .loading-box, .loading-content,
[class*="spinner"] {
    background: var(--ink-2) !important;
    border: 1px solid var(--b1) !important;
    border-radius: 16px !important;
    padding: 2rem 3rem !important;
    text-align: center !important;
    color: var(--Au) !important;
    font-family:'Josefin Sans',sans-serif !important;
    box-shadow: 0 0 30px var(--Au-glow) !important;
}

    
/* ════════════════════════════════════════════════
   FLOWFIT ELITE — SHARED DESIGN SYSTEM OVERRIDES
════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;}
html,body{overflow-x:hidden;max-width:100vw;}

body {
    font-family:'Josefin Sans',sans-serif!important;
    background-color:var(--ink)!important;
    background-image:
        radial-gradient(circle at 12% 18%,rgba(212,175,55,0.055) 0%,transparent 42%),
        radial-gradient(circle at 88% 82%,rgba(0,242,254,0.03) 0%,transparent 38%)!important;
    color:var(--t1)!important;
}

/* ── TYPOGRAPHY ────────────────────────────────── */
h1,h2,h3,h4,h5,h6,
.hero-title,.section-title,.card-title,.stat-value,
.greeting,.panel-title,.wm-title,.chart-title,
.section-header h2,.pricing-card h3,.feature-card h3,
.auth-header h1,.modal-header h2,.nav-title,
.header h1,.header-left h1 {
    font-family:'Josefin Sans',sans-serif!important;
    letter-spacing:0.03em;
}
.logo,.hero-text h1,.stat-number,.hero-title {
    font-family:'Josefin Sans',sans-serif!important;
}
p,a,label,button,input,select,textarea,span,li,td,th {
    font-family:'Josefin Sans',sans-serif;
}

/* ── LOGO ────────────────────────────────────────── */
.logo {
    font-family:'Josefin Sans',sans-serif!important;
    font-size:2rem!important;letter-spacing:4px!important;
    background:var(--g-Au)!important;
    -webkit-background-clip:text!important;
    -webkit-text-fill-color:transparent!important;
    background-clip:text!important;
    filter:drop-shadow(0 0 10px rgba(212,175,55,0.2))!important;
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
    background:var(--ink-1)!important;
    border-right:1px solid var(--b1)!important;
    width:280px!important;
}
.nav-link {
    font-family:'Josefin Sans',sans-serif!important;
    font-weight:500!important;letter-spacing:1px!important;
    color:var(--t2)!important;
    border-radius:14px!important;
    border:1px solid transparent!important;
    transition:all 0.3s cubic-bezier(0.16,1,0.3,1)!important;
}
.nav-link:hover {
    color:var(--Au)!important;
    background:var(--Au-mist)!important;
    border-color:var(--b1)!important;
}
.nav-link.active {
    background:var(--g-Au)!important;
    color:#000!important;border-color:transparent!important;
    box-shadow:0 6px 20px var(--Au-glow)!important;
    font-weight:700!important;
}

/* ── USER AVATAR ─────────────────────────────────── */
.user-avatar {
    background:var(--g-Au)!important;
    color:#000!important;border-radius:12px!important;
    font-family:'Josefin Sans',sans-serif!important;
}

/* ── CARDS ───────────────────────────────────────── */
.card,.stat-card,.chart-card,.panel-card,
.program-card,.exercise-card,.feature-card,
.pricing-card,.auth-card,.form-section,
.week-block,.content-card,.info-card,
.timer-card,.sets-card,.log-card {
    background:var(--g-card)!important;
    backdrop-filter:blur(20px)!important;
    border:1px solid var(--b1)!important;
    border-radius:24px!important;
    transition:all 0.3s cubic-bezier(0.16,1,0.3,1)!important;
}
.card:hover,.stat-card:hover,.program-card:hover,
.exercise-card:hover,.feature-card:hover {
    border-color:rgba(0,242,254,0.3)!important;
    box-shadow:0 20px 50px rgba(0,0,0,0.6),0 0 20px rgba(0,242,254,0.08)!important;
    transform:translateY(-6px)!important;
}

/* ── STAT VALUES ─────────────────────────────────── */
.stat-value,.stat-number {
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky) 100%)!important;
    -webkit-background-clip:text!important;
    -webkit-text-fill-color:transparent!important;
    background-clip:text!important;
    filter:drop-shadow(0 0 8px rgba(0,242,254,0.2))!important;
    font-family:'Josefin Sans',sans-serif!important;
}

/* ── BUTTONS ─────────────────────────────────────── */
.btn-primary,.btn-start,.btn-enroll,.btn-log,
.btn-continue,.btn-start-session,.btn-unlock,
.btn-log-workout,.btn-action,
button[class*="btn-enroll"],button[class*="btn-continue"] {
    background:var(--g-Au)!important;
    color:#000!important;font-weight:700!important;
    font-family:'Josefin Sans',sans-serif!important;
    letter-spacing:1px!important;border:none!important;
    border-radius:10px!important;
    transition:all 0.3s cubic-bezier(0.16,1,0.3,1)!important;
}
.btn-primary:hover,.btn-start:hover,.btn-enroll:hover,
.btn-log:hover,.btn-continue:hover,.btn-start-session:hover {
    box-shadow:0 8px 25px var(--Au-glow)!important;
    transform:translateY(-2px) scale(1.03)!important;
}
.btn-ghost,.btn-details,.btn-save,.btn-close-wm,.close-btn {
    border-color:var(--b1)!important;
    color:var(--Au)!important;
}
.btn-ghost:hover,.btn-details:hover,.btn-save:hover {
    background:var(--Au-mist)!important;
    border-color:rgba(212,175,55,0.5)!important;
}

/* ── LOGOUT BTN ─────────────────────────────────── */
.logout-btn {
    background:transparent!important;
    color:var(--red)!important;
    border:1px solid rgba(255,62,62,0.3)!important;
    font-family:'Josefin Sans',sans-serif!important;
    font-weight:700!important;letter-spacing:2px!important;
}
.logout-btn:hover {
    background:rgba(255,62,62,0.08)!important;
    border-color:var(--red)!important;
    box-shadow:0 0 15px rgba(255,62,62,0.12)!important;
    transform:none!important;
}

/* ── INPUTS ──────────────────────────────────────── */
.form-input,.form-select,.form-textarea,
.search-bar input,.form-field input,
.form-field select,.form-field textarea,
input:not([type=checkbox]):not([type=radio]),
select,textarea {
    background:rgba(212,175,55,0.04)!important;
    border:1px solid var(--b1)!important;
    color:var(--t1)!important;
    font-family:'Josefin Sans',sans-serif!important;
    border-radius:10px!important;
}
.form-input:focus,.form-field input:focus,.form-field select:focus,
.search-bar input:focus,textarea:focus,select:focus {
    border-color:var(--Au)!important;
    box-shadow:0 0 0 3px rgba(212,175,55,0.12)!important;
    outline:none!important;
}

/* ── PROGRESS BARS ───────────────────────────────── */
.progress-fill,.week-progress-fill,.cat-bar-fill {
    background:var(--g-Au)!important;
}
.progress-bar,.cat-bar-track {
    background:rgba(255,255,255,0.05)!important;
}

/* ── BADGES / CHIPS ──────────────────────────────── */
.program-badge,.hero-badge,.difficulty-badge,
.section-label,.preview-badge {
    background:rgba(212,175,55,0.1)!important;
    color:var(--Au)!important;
    border:1px solid var(--b1)!important;
    font-family:'Josefin Sans',sans-serif!important;
    letter-spacing:1px!important;
}
.premium-tag,.pricing-badge {
    background:var(--g-Au)!important;
    color:#000!important;
}
.free-tag,.free-badge {
    background:rgba(74,222,128,0.12)!important;
    color:var(--sage)!important;border:1px solid rgba(74,222,128,0.3)!important;
}
.pro-badge {
    background:rgba(212,175,55,0.15)!important;
    color:var(--Au)!important;border:1px solid var(--b1)!important;
}

/* ── GRADIENT TEXT ───────────────────────────────── */
.gradient-text,.streak-number {
    background:var(--g-Au)!important;
    -webkit-background-clip:text!important;
    -webkit-text-fill-color:transparent!important;
    background-clip:text!important;
}

/* ── FILTER TABS ─────────────────────────────────── */
.tab-btn,.time-btn {
    background:rgba(255,255,255,0.03)!important;
    border:1px solid var(--b1)!important;
    color:var(--t2)!important;
    font-family:'Josefin Sans',sans-serif!important;
    letter-spacing:1px!important;
}
.tab-btn:hover,.time-btn:hover {
    color:var(--Au)!important;
    border-color:rgba(212,175,55,0.4)!important;
}
.tab-btn.active,.time-btn.active {
    background:var(--g-Au)!important;
    color:#000!important;border-color:transparent!important;
}

/* ── NAV / TOP BAR ───────────────────────────────── */
nav,.top-nav {
    background:rgba(3,3,3,0.92)!important;
    border-bottom:1px solid var(--b1)!important;
    backdrop-filter:blur(16px)!important;
}

/* ── FEATURED PRICING ────────────────────────────── */
.pricing-card.featured {
    border:2px solid var(--Au)!important;
    box-shadow:0 20px 60px rgba(212,175,55,0.15)!important;
}

/* ── ACHIEVEMENT ITEMS ───────────────────────────── */
.achievement-item.unlocked,.achievement-badge {
    border-color:var(--b1)!important;
    background:linear-gradient(135deg,rgba(212,175,55,0.08),transparent)!important;
}
.achievement-icon-wrap {
    background:var(--g-Au)!important;
}
.achievement-pts {
    background:rgba(212,175,55,0.12)!important;
    color:var(--Au)!important;
}

/* ── WORKOUT BADGES ──────────────────────────────── */
.workout-badge{background:rgba(212,175,55,0.1)!important;color:var(--Au)!important;}
.workout-badge.cardio{background:rgba(0,242,254,0.08)!important;color:var(--sky)!important;}
.workout-badge.strength{background:rgba(212,175,55,0.12)!important;color:var(--Au)!important;}
.workout-badge.core{background:rgba(74,222,128,0.08)!important;color:var(--sage)!important;}
.workout-badge.hiit{background:rgba(255,62,62,0.08)!important;color:#ff6b6b!important;}

/* ── SECTION ICON ────────────────────────────────── */
.section-icon {
    background:rgba(212,175,55,0.1)!important;
    border:1px solid var(--b1)!important;
}

/* ── MAIN CONTENT LAYOUT ─────────────────────────── */
.main-content {
    margin-left:280px!important;
    width:calc(100% - 280px)!important;
    overflow-x:hidden!important;
}
.main{margin-left:260px!important;}

/* ── GRIDS — OVERFLOW FIX ────────────────────────── */
.programs-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.exercise-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.achievements-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.program-card,.exercise-card,.achievement-item {
    min-width:0!important;overflow:hidden!important;word-break:break-word!important;
}

/* ── HERO BG (workout session / program detail) ── */
.hero-bg {
    background:linear-gradient(135deg,#1a1508 0%,var(--ink-1) 100%)!important;
}

/* ── BG ANIMATION ORBS ───────────────────────────── */
.bg-animation::before {
    background:radial-gradient(circle,rgba(212,175,55,0.5) 0%,transparent 70%)!important;
}
.bg-animation::after {
    background:radial-gradient(circle,rgba(0,242,254,0.15) 0%,transparent 70%)!important;
}

/* ── LOADING MANAGER (api.js injected) ───────────── */
#global-loader {
    position:fixed!important;top:0!important;left:0!important;
    width:100%!important;height:100%!important;
    z-index:10000!important;
}
.loader-backdrop {
    background:rgba(3,3,3,0.92)!important;
    backdrop-filter:blur(8px)!important;
}
.loader-content {
    background:var(--bg-elevated,var(--ink-2))!important;
    border:1px solid var(--b1)!important;
    border-radius:20px!important;
    box-shadow:0 0 30px rgba(212,175,55,0.1)!important;
}
.loader-spinner {
    border-color:rgba(212,175,55,0.15)!important;
    border-top-color:var(--Au)!important;
}
.loader-message {
    font-family:'Josefin Sans',sans-serif!important;
    letter-spacing:3px!important;color:var(--Au)!important;
}

/* ── MODALS ──────────────────────────────────────── */
.modal-content,.wmodal-box {
    background:var(--ink-2)!important;
    border:1px solid var(--b1)!important;
}
.modal-header{border-bottom:1px solid var(--b1)!important;}

/* ── CARDS STAT TOP BAR ──────────────────────────── */
.stat-card::before{background:linear-gradient(180deg,var(--sky) 0%,var(--sky) 100%)!important;}

/* ── TIMER CARD GOLD ─────────────────────────────── */
.timer-display {
    background:var(--g-Au)!important;
    -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
    background-clip:text!important;
}
.live-cals{
    background:rgba(212,175,55,0.06)!important;
    border:1px solid rgba(212,175,55,0.15)!important;
}
.live-cals-value{color:var(--Au)!important;}

/* ════════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════════════════════ */
@media(max-width:1200px){
    .stats-grid{grid-template-columns:repeat(2,1fr)!important;}
    .chart-grid{grid-template-columns:1fr!important;}
    .content-grid{grid-template-columns:1fr!important;}
}
@media(max-width:1024px){
    .main-content{margin-left:240px!important;width:calc(100% - 240px)!important;padding:2rem!important;}
    .sidebar{width:240px!important;}
    .main{margin-left:240px!important;}
    .body{grid-template-columns:1fr!important;padding:1.5rem!important;}
    .hero-content{grid-template-columns:1fr!important;}
    .features-grid{grid-template-columns:repeat(2,1fr)!important;}
    .pricing-grid{grid-template-columns:1fr!important;}
}
@media(max-width:900px){
    .sidebar{width:76px!important;padding:2rem 0.4rem!important;}
    .nav-link span:not(.nav-icon){display:none!important;}
    .nav-link{justify-content:center!important;padding:0.9rem!important;}
    .user-info,.logout-btn span{display:none!important;}
    .main-content{margin-left:76px!important;width:calc(100% - 76px)!important;}
    .main{margin-left:76px!important;}
    :root{--sidebar-w:76px;}
}
@media(max-width:768px){
    html,body{overflow-x:hidden!important;}
    .sidebar{transform:translateX(-100%)!important;z-index:1000!important;width:260px!important;}
    .sidebar.mobile-active{transform:translateX(0)!important;}
    .sidebar.mobile-active .nav-link span:not(.nav-icon){display:inline!important;}
    .sidebar.mobile-active .nav-link{justify-content:flex-start!important;}
    .sidebar.mobile-active .user-info{display:block!important;}
    .sidebar.mobile-active .logout-btn span{display:inline!important;}
    .main-content{margin-left:0!important;width:100%!important;padding:1.2rem!important;}
    .main{margin-left:0!important;}
    .stats-grid{grid-template-columns:repeat(2,1fr)!important;gap:1rem!important;}
    .content-grid{grid-template-columns:1fr!important;}
    .programs-grid{grid-template-columns:1fr!important;}
    .exercise-grid{grid-template-columns:1fr!important;}
    .achievements-grid{grid-template-columns:1fr!important;}
    .features-grid{grid-template-columns:1fr!important;}
    .pricing-grid{grid-template-columns:1fr!important;}
    .streak-section{grid-template-columns:1fr!important;}
    .form-grid{grid-template-columns:1fr!important;}
    .hero-content{grid-template-columns:1fr!important;gap:2rem!important;}
    .hero-cta{flex-direction:column!important;}
    nav{padding:1rem 1.5rem!important;}
    .nav-links{display:none!important;}
    .greeting{font-size:1.8rem!important;margin-top:3.5rem!important;}
    .hero-title{font-size:2rem!important;}
    .hero-stats{flex-wrap:wrap!important;gap:1rem!important;}
    .body{padding:1rem!important;}
    .progress-panel{position:static!important;}
    .controls{flex-direction:column!important;}
    .search-bar{min-width:unset!important;width:100%!important;}
    .program-meta{grid-template-columns:repeat(2,1fr)!important;}
    .includes-grid{grid-template-columns:1fr!important;}
    .filter-tabs{flex-wrap:wrap!important;}
    .chart-grid{grid-template-columns:1fr!important;}
}
@media(max-width:600px){
    .mobile-menu-btn{display:flex!important;}
    .main-content{padding-top:4.5rem!important;}
    .stats-grid{grid-template-columns:1fr 1fr!important;}
}
@media(max-width:480px){
    .stats-grid{grid-template-columns:1fr!important;}
    .auth-card{padding:2rem 1.5rem!important;}
    .modal-content{margin:0.5rem!important;}
    .tab-btn{padding:0.6rem 0.9rem!important;font-size:0.82rem!important;}
    .hero-text h1{font-size:2rem!important;}
}

    text-transform: uppercase !important;
    /* Arrow tip shape */
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
    padding-right: 2rem !important;
}
.btn-primary,
.btn-start,
.btn-enroll,
.btn-log,
.btn-continue,
.btn-save,
.btn-log-workout,
.btn-start-session {
    background: var(--g-Au) !important;
    color: var(--ink) !important;
    border: none !important;
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
}
.btn-ghost,
.btn-secondary,
.btn-cancel,
.btn-details,
.btn-close-wm,
.btn-unlock {
    background: transparent !important;
    color: var(--Au-hi) !important;
    border: 1px solid var(--b2) !important;
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
}
/* Full-width buttons in modals / cards — no arrow tip */
.btn-full,
.btn-continue,
.btn-enroll,
.btn-log-workout,
.btn-start-session {
    clip-path: none !important;
    border-radius: var(--r-sm) !important;
    width: 100% !important;
}

/* Manage billing buttons (small, inline) */
.btn-manage {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    clip-path: none !important;
    border-radius: var(--r-sm) !important;
}

/* ── Form inputs ── */
input[type="text"],
input[type="email"],
input[type="password"],
input[type="number"],
input[type="date"],
input[type="tel"],
select,
textarea,
.form-input,
.form-select {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.84rem !important;
    background: rgba(201,168,76,0.04) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-sm) !important;
    color: var(--t1) !important;
    letter-spacing: 0.02em !important;
}
input:focus,
select:focus,
textarea:focus,
.form-input:focus {
    border-color: var(--Au) !important;
    outline: none !important;
    box-shadow: 0 0 0 3px var(--Au-mist) !important;
}
label,
.form-label {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    color: var(--t2) !important;
}

/* ── Badges / Pills ── */
.badge,
.difficulty-badge,
.status-pill,
.plan-tier-badge,
.hero-badge,
.premium-tag,
.free-tag {
    font-family: var(--f-display) !important;
    font-weight: 400 !important;
    font-size: 0.6rem !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
}

/* ── Filter tabs ── */
.tab-btn,
.time-btn,
.filter-btn {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.7rem !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
}
.tab-btn.active,
.time-btn.active,
.filter-btn.active {
    background: var(--g-Au) !important;
    color: var(--ink) !important;
    font-weight: 400 !important;
}

/* ── Modal ── */
.modal-backdrop,
.modal-overlay {
    background: rgba(0,0,0,0.72) !important;
    backdrop-filter: blur(6px) !important;
}
.modal-box,
.modal-content {
    background: var(--ink-2) !important;
    border: 1px solid var(--b2) !important;
    border-radius: var(--r-card) !important;
    font-family: var(--f-display) !important;
}
.modal-title {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
    color: var(--Au-hi) !important;
}

/* ── Loading ── */
.loading-text {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    letter-spacing: 0.2em !important;
    color: var(--Au) !important;
}
.spinner {
    border-color: var(--b1) !important;
    border-top-color: var(--Au) !important;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

/* ── Mobile menu button ── */
.mobile-menu-btn {
    background: var(--ink-1) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-sm) !important;
    color: var(--Au) !important;
}


/* ── Profile ── */
.main-content h1,
main h1 {
    font-family: var(--f-serif) !important;
    font-weight: 300 !important;
    font-style: italic !important;
    font-size: 2rem !important;
    color: var(--t1) !important;
    margin-bottom: 2rem !important;
}
.form-section {
    background: var(--g-card) !important;
    border: 1px solid var(--b1) !important;
    border-radius: var(--r-card) !important;
    padding: 2rem !important;
    margin-bottom: 1.5rem !important;
}
.form-section h2 {
    font-family: var(--f-display) !important;
    font-weight: 300 !important;
    font-size: 0.72rem !important;
    letter-spacing: 0.16em !important;
    text-transform: uppercase !important;
    color: var(--Au) !important;
    margin-bottom: 1.5rem !important;
    padding-bottom: 0.75rem !important;
    border-bottom: 1px solid var(--b1) !important;
}
.form-grid {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 1rem !important;
}
.form-group {
    display: flex !important;
    flex-direction: column !important;
    gap: 0.45rem !important;
    margin-bottom: 1rem !important;
}
.profile-form .btn-primary,
.profile-form button[type="submit"] {
    clip-path: polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%) !important;
    border-radius: 0 !important;
}
@media(max-width:768px) {
    .form-grid { grid-template-columns: 1fr !important; }
}



/* ════════════════════════════════════════════════════════
   CANONICAL SIDEBAR — FlowFit Premium
   Matches index.html design system (Anton logo, gold tokens)
════════════════════════════════════════════════════════ */

/* ── Sidebar container ─────────────────────────────────── */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 272px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 2rem 1.5rem 2.5rem;
    background: rgba(8, 8, 14, 0.96);
    border-right: 1px solid rgba(212, 175, 55, 0.18);
    z-index: 1000;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
    scrollbar-width: thin;
    scrollbar-color: rgba(212, 175, 55, 0.22) transparent;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
}

.sidebar::-webkit-scrollbar {
    width: 3px;
}
.sidebar::-webkit-scrollbar-track {
    background: transparent;
}
.sidebar::-webkit-scrollbar-thumb {
    background: rgba(212, 175, 55, 0.28);
    border-radius: 2px;
}

/* ── FlowFit logo in sidebar ──────────────────────────── */
.sidebar .logo,
.sidebar-logo {
    font-family: 'Anton', sans-serif;
    font-size: 1.75rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 14px rgba(212, 175, 55, 0.30));
    text-decoration: none;
    display: block;
    flex-shrink: 0;
    margin-bottom: 2.5rem;
    line-height: 1;
}

/* ── Nav menu list ─────────────────────────────────────── */
.sidebar .nav-menu {
    list-style: none;
    flex: 0 0 auto;
    margin-bottom: 0;
}

.sidebar .nav-item {
    margin-bottom: 0.2rem;
}

/* ── Nav links ─────────────────────────────────────────── */
.sidebar .nav-link {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.72rem 0.9rem;
    color: rgba(168, 168, 184, 0.85);
    text-decoration: none;
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: all 0.22s cubic-bezier(0.22, 1, 0.36, 1);
}

.sidebar .nav-link:hover {
    color: #F2D479;
    background: rgba(212, 175, 55, 0.08);
    border-color: rgba(212, 175, 55, 0.18);
    transform: translateX(3px);
}

.sidebar .nav-link.active {
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
    color: #000;
    font-weight: 700;
    border-color: transparent;
    box-shadow: 0 4px 18px rgba(212, 175, 55, 0.28);
}

/* ── Nav icons ─────────────────────────────────────────── */
.sidebar .nav-icon {
    font-size: 1rem;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
}

/* ── Spacer (pushes user section to bottom on large screens) */
.sidebar .nav-spacer {
    flex: 1;
    min-height: 1.5rem;
}

/* ── User section ──────────────────────────────────────── */
.sidebar .user-section {
    margin-top: 0;
    padding-top: 1.4rem;
    border-top: 1px solid rgba(212, 175, 55, 0.14);
    flex-shrink: 0;
}

.sidebar .user-profile {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.75rem;
    background: rgba(212, 175, 55, 0.04);
    border-radius: 12px;
    margin-bottom: 0.6rem;
    border: 1px solid rgba(212, 175, 55, 0.10);
}

/* ── User avatar ───────────────────────────────────────── */
.sidebar .user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Anton', sans-serif;
    font-size: 0.95rem;
    font-weight: 900;
    flex-shrink: 0;
    letter-spacing: 0;
}

/* ── User info ─────────────────────────────────────────── */
.sidebar .user-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    margin-left: 0;
    width: auto;
}

.sidebar .user-info h4 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.84rem;
    font-weight: 600;
    color: #fff;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
}

.sidebar .user-info p,
.sidebar .user-info span:not(.plan-badge) {
    font-size: 0.70rem;
    color: rgba(168, 168, 184, 0.7);
    margin: 0;
    display: block;
}

/* ── Logout button ─────────────────────────────────────── */
.sidebar .logout-btn {
    width: 100%;
    padding: 0.72rem;
    background: transparent;
    color: #f87171;
    border: 1px solid rgba(248, 113, 113, 0.28);
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    -webkit-tap-highlight-color: transparent;
}

.sidebar .logout-btn:hover,
.sidebar .logout-btn:active {
    background: rgba(248, 113, 113, 0.08);
    border-color: #f87171;
    box-shadow: 0 0 16px rgba(248, 113, 113, 0.10);
}

/* ── Plan badges ───────────────────────────────────────── */
.plan-badge {
    display: inline-block;
    padding: 0.16rem 0.52rem;
    border-radius: 20px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
}

.plan-free {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(168, 168, 184, 0.7);
}

.plan-trial {
    background: rgba(251, 191, 36, 0.10);
    color: #fbbf24;
}

.plan-pro {
    background: rgba(212, 175, 55, 0.14);
    color: #D4AF37;
    border: 1px solid rgba(212, 175, 55, 0.28);
}

.plan-elite,
.plan-premium {
    background: linear-gradient(135deg, rgba(212,175,55,0.20), rgba(184,134,11,0.20));
    color: #F2D479;
    border: 1px solid rgba(212, 175, 55, 0.38);
}

/* ── Sidebar overlay (mobile) ──────────────────────────── */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 999;
    cursor: pointer;
}

.sidebar-overlay.active {
    display: block;
}

/* ── Body scroll lock ──────────────────────────────────── */
body.sidebar-open {
    overflow: hidden;
    position: fixed;
    width: 100%;
}

body.sidebar-open .mobile-menu-btn {
    display: none;
}

body.sidebar-open .sidebar {
    overflow-y: auto;
    touch-action: pan-y;
    pointer-events: all;
}

/* ── Mobile hamburger ──────────────────────────────────── */
.mobile-menu-btn {
    position: fixed;
    top: 1.2rem;
    left: 1.2rem;
    z-index: 2001;
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
    border: none;
    padding: 0.5rem 0.7rem;
    border-radius: 9px;
    cursor: pointer;
    color: #000;
    font-size: 1.05rem;
    font-weight: 900;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(212, 175, 55, 0.28);
    transition: transform 0.14s ease;
    -webkit-tap-highlight-color: transparent;
}

.mobile-menu-btn:active {
    transform: scale(0.9);
}

/* ── Responsive sidebar ────────────────────────────────── */
@media (max-width: 900px) {
    .sidebar {
        width: 68px;
        padding: 1.8rem 0.4rem 2rem;
    }

    .sidebar .logo {
        font-size: 0.7rem;
        letter-spacing: 1px;
        margin-bottom: 1.5rem;
        -webkit-text-fill-color: #D4AF37;
        filter: none;
    }

    .sidebar .nav-link {
        justify-content: center;
        padding: 0.8rem;
        gap: 0;
    }

    .sidebar .nav-link span:not(.nav-icon) {
        display: none;
    }

    .sidebar .user-info {
        display: none;
    }

    .sidebar .logout-btn span {
        display: none;
    }

    .sidebar .user-section {
        align-items: center;
    }

    .sidebar .user-profile {
        justify-content: center;
        padding: 0.5rem;
    }

    .sidebar .logout-btn {
        justify-content: center;
        padding: 0.5rem;
    }

    .sidebar .nav-spacer {
        display: none;
    }

    .main-content {
        margin-left: 68px;
        width: calc(100% - 68px);
    }
}

@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
        width: 272px;
        padding: 2rem 1.5rem 2.5rem;
    }

    .sidebar.mobile-active {
        transform: translateX(0);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        touch-action: pan-y;
    }

    .sidebar.mobile-active .logo {
        font-size: 1.75rem;
        letter-spacing: 3px;
        margin-bottom: 2.5rem;
        -webkit-text-fill-color: transparent;
    }

    .sidebar.mobile-active .nav-link {
        justify-content: flex-start;
        padding: 0.72rem 0.9rem;
        gap: 0.85rem;
    }

    .sidebar.mobile-active .nav-link span:not(.nav-icon) {
        display: inline;
    }

    .sidebar.mobile-active .user-info {
        display: block;
    }

    .sidebar.mobile-active .logout-btn span {
        display: inline;
    }

    .sidebar.mobile-active .logout-btn {
        padding: 0.72rem;
        justify-content: center;
    }

    .sidebar.mobile-active .user-section {
        align-items: stretch;
    }

    .sidebar.mobile-active .nav-spacer {
        display: flex;
        flex: 0 0 auto;
        min-height: 0.5rem;
    }

    .main-content {
        margin-left: 0;
        width: 100%;
        padding-top: 4.5rem;
    }

    .mobile-menu-btn {
        display: flex;
    }
}

@media (max-width: 600px) {
    .sidebar,
    .sidebar.mobile-active {
        width: 268px;
    }
}

.sidebar nav {
    padding: 0;
    margin: 0;
}



/* ── Main content layout offset from sidebar ─────────────── */
.main-content {
    margin-left: 272px;
    width: calc(100% - 272px);
    max-width: 100%;
    overflow-x: hidden;
    padding: 2rem 2.5rem;
}

.main {
    margin-left: 272px;
    width: calc(100% - 272px);
    min-height: 100vh;
}

@media (max-width: 900px) {
    .main-content {
        margin-left: 68px;
        width: calc(100% - 68px);
        padding: 1.5rem 1.75rem;
    }
    .main {
        margin-left: 68px;
        width: calc(100% - 68px);
    }
}

@media (max-width: 768px) {
    .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        padding: 1.2rem !important;
        padding-top: 4.5rem !important;
    }
    .main {
        margin-left: 0 !important;
        width: 100% !important;
        padding-top: 4rem;
    }
}



/* ════════════════════════════════════════════════════════
   GLOBAL POLISH — body, scrollbars, headings, page titles
════════════════════════════════════════════════════════ */

/* ── Body base ─────────────────────────────────────────── */
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ── All headings use Oswald ─────────────────────────────── */
h1, h2, h3, h4, h5, h6 {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
}

/* ── Page header (dashboard pages) ──────────────────────── */
.header h1,
.header-left h1,
.page-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #F0EBE0;
    margin-bottom: 0.25rem;
}

.header p,
.header-left p,
.page-subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    color: rgba(138, 133, 144, 0.85);
    font-weight: 400;
    letter-spacing: 0.01em;
}

/* ── Scrollbar global ────────────────────────────────────── */
::-webkit-scrollbar {
    width: 5px;
    height: 5px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: rgba(212, 175, 55, 0.22);
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
    background: rgba(212, 175, 55, 0.38);
}

* {
    scrollbar-width: thin;
    scrollbar-color: rgba(212, 175, 55, 0.22) transparent;
}

/* ── Cards base ──────────────────────────────────────────── */
.card,
.stat-card,
.chart-card,
.panel-card,
.week-block,
.log-card,
.timer-card,
.sets-card,
.info-card,
.billing-card,
.program-card,
.exercise-card {
    background: linear-gradient(145deg, rgba(20, 18, 32, 0.95), rgba(14, 13, 22, 0.95));
    border: 1px solid rgba(212, 175, 55, 0.14);
    border-radius: 16px;
    transition: border-color 0.22s ease, box-shadow 0.22s ease;
}

/* ── Stat card accent top bar ────────────────────────────── */
.stat-card {
    position: relative;
    overflow: hidden;
}

.stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
}

/* ── Stat values ─────────────────────────────────────────── */
.stat-value,
.stat-number,
.streak-number,
.timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* ── Buttons: remove clip-path arrow (looks broken) ─────── */
.btn,
button.btn,
a.btn {
    clip-path: none !important;
    border-radius: 10px !important;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: none;
    padding: 0.8rem 1.8rem;
}

/* Primary buttons */
.btn-primary,
.btn-start,
.btn-enroll,
.btn-log,
.btn-continue,
.btn-save,
.btn-log-workout,
.btn-start-session {
    background: linear-gradient(135deg, #D4AF37 0%, #F2D479 45%, #B8860B 100%);
    color: #000 !important;
    border: none !important;
    font-weight: 700 !important;
    clip-path: none !important;
    border-radius: 10px !important;
}

/* Ghost / outline buttons */
.btn-ghost,
.btn-details,

/* ══════════════════════════════════════════════════════════
   BUTTON SYSTEM — Arrow signature (matches index.html)
   Primary : gold-filled arrow → + shimmer + glow aura
   Ghost   : outlined arrow + fill-wash hover
   Both use clip-path polygon so shape is non-rectangular.
══════════════════════════════════════════════════════════ */

/* ── Base ──────────────────────────────────────────────── */
.btn,
button.btn,
a.btn,
.btn-primary,
.btn-ghost,
.btn-start,
.btn-enroll,
.btn-continue,
.btn-log,
.btn-save,
.btn-log-workout,
.btn-start-session,
.btn-unlock,
.btn-details {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0.78rem 2.4rem 0.78rem 1.6rem;
    position: relative;
    white-space: nowrap;
    border-radius: 0;
    overflow: hidden;
    transition:
        transform 0.28s cubic-bezier(0.16,1,0.3,1),
        box-shadow 0.28s cubic-bezier(0.16,1,0.3,1),
        filter 0.28s ease;
    /* Arrow tip: right-pointing pentagon */
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
}

/* ── Primary — gold fill ───────────────────────────────── */
.btn-primary,
.btn-start,
.btn-enroll,
.btn-continue,
.btn-log,
.btn-save,
.btn-log-workout,
.btn-start-session,
.btn-unlock {
    background: linear-gradient(135deg, #E8C96A 0%, #C9A84C 50%, #8E6E28 100%) !important;
    color: #0a0800 !important;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%) !important;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.22),
        0 5px 22px rgba(201,168,76,0.40),
        0 2px 8px rgba(0,0,0,0.38) !important;
}

/* Shimmer sweep */
.btn-primary::before,
.btn-start::before,
.btn-enroll::before,
.btn-continue::before,
.btn-log::before,
.btn-save::before,
.btn-log-workout::before,
.btn-start-session::before,
.btn-unlock::before {
    content: '';
    position: absolute;
    top: -60%; left: -120%;
    width: 52%; height: 220%;
    background: linear-gradient(108deg, transparent 20%, rgba(255,255,255,0.38) 50%, transparent 80%);
    transition: left 0.52s cubic-bezier(0.16,1,0.3,1);
    pointer-events: none;
}

.btn-primary:hover::before,
.btn-start:hover::before,
.btn-enroll:hover::before,
.btn-continue:hover::before,
.btn-log:hover::before,
.btn-save:hover::before,
.btn-log-workout:hover::before,
.btn-start-session:hover::before,
.btn-unlock:hover::before {
    left: 175%;
}

/* Glow aura */
.btn-primary::after,
.btn-start::after,
.btn-enroll::after,
.btn-continue::after,
.btn-log::after,
.btn-save::after,
.btn-log-workout::after,
.btn-start-session::after,
.btn-unlock::after {
    content: '';
    position: absolute;
    inset: -6px;
    background: radial-gradient(ellipse at 65% 50%, rgba(201,168,76,0.52), transparent 65%);
    opacity: 0;
    transition: opacity 0.32s ease;
    z-index: -1;
    filter: blur(10px);
    pointer-events: none;
}

.btn-primary:hover::after,
.btn-start:hover::after,
.btn-enroll:hover::after,
.btn-continue:hover::after,
.btn-log:hover::after,
.btn-save:hover::after,
.btn-log-workout:hover::after,
.btn-start-session:hover::after,
.btn-unlock:hover::after {
    opacity: 1;
}

.btn-primary:hover,
.btn-start:hover,
.btn-enroll:hover,
.btn-continue:hover,
.btn-log:hover,
.btn-save:hover,
.btn-log-workout:hover,
.btn-start-session:hover,
.btn-unlock:hover {
    transform: translateY(-2px) !important;
    filter: brightness(1.06) !important;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        0 10px 36px rgba(201,168,76,0.54),
        0 3px 12px rgba(0,0,0,0.42) !important;
}

.btn-primary:active,
.btn-start:active,
.btn-enroll:active,
.btn-continue:active {
    transform: translateY(0) !important;
    filter: brightness(0.96) !important;
}

.btn-primary:disabled,
.btn-start:disabled,
.btn-enroll:disabled,
.btn-continue:disabled,
.btn-log-workout:disabled {
    opacity: 0.52;
    cursor: not-allowed;
    transform: none !important;
    filter: none !important;
}

/* ── Ghost — outlined arrow ────────────────────────────── */
.btn-ghost,
.btn-details {
    background: transparent !important;
    color: #E8C96A !important;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%) !important;
    box-shadow: inset 0 0 0 1.5px rgba(201,168,76,0.30) !important;
    padding: 0.78rem 2.4rem 0.78rem 1.6rem !important;
}

.btn-ghost::before,
.btn-details::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.04) 100%);
    opacity: 0;
    transition: opacity 0.32s ease;
    pointer-events: none;
}

.btn-ghost::after,
.btn-details::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1.5px rgba(201,168,76,0.65);
    opacity: 0;
    transition: opacity 0.32s ease;
    pointer-events: none;
}

.btn-ghost:hover::before,
.btn-details:hover::before { opacity: 1; }
.btn-ghost:hover::after,
.btn-details:hover::after  { opacity: 1; }

.btn-ghost:hover,
.btn-details:hover {
    color: #F0EBE0 !important;
    transform: translateY(-1px) !important;
    box-shadow:
        inset 0 0 0 1.5px rgba(201,168,76,0.32),
        0 3px 20px rgba(201,168,76,0.12) !important;
}

    <script>
        requireAuth();
        
        // Load profile data
        async function loadProfile() {
            try {
                const response = await UserAPI.getProfile();
                if (response.success && response.data.profile) {
                    const profile = response.data.profile;
                    
                    // Populate form fields
                    Object.keys(profile).forEach(key => {
                        const input = document.querySelector(`[name="${key}"]`);
                        if (input && profile[key]) {
                            if (key === 'dateOfBirth') {
                                input.value = new Date(profile[key]).toISOString().split('T')[0];
                            } else {
                                input.value = profile[key];
                            }
                        }
                    });
                }
            } catch (error) {
                Toast.error('Failed to load profile');
                console.error(error);
            }
        }
        
        // Save profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {};
            
            formData.forEach((value, key) => {
                if (value) data[key] = value;
            });
            
            try {
                LoadingManager.show('Saving profile...');
                
                const response = await UserAPI.updateProfile(data);
                
                if (response.success) {
                    Toast.success('Profile updated successfully! 🎉');
                }
                
                LoadingManager.hide();
            } catch (error) {
                LoadingManager.hide();
                Toast.error('Failed to update profile');
                console.error(error);
            }
        });
        
        // Logout
        async function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                LoadingManager.show('Logging out...');
                await AuthAPI.logout();
            }
        }
        
        // Load on page load
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>

<script>
// ── Sidebar open/close ───────────────────────────────────────────────────────
(function() {
    'use strict';
    var _savedY = 0;

    function openSidebar() {
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('sidebarOverlay');
        if (!sb) return;
        _savedY = window.scrollY || 0;
        sb.classList.add('mobile-active');
        sb.scrollTop = 0;
        if (ov) ov.classList.add('active');
        document.body.classList.add('sidebar-open');
        document.body.style.top = '-' + _savedY + 'px';
    }

    function closeSidebar() {
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('sidebarOverlay');
        if (!sb) return;
        sb.classList.remove('mobile-active');
        if (ov) ov.classList.remove('active');
        document.body.classList.remove('sidebar-open');
        document.body.style.top = '';
        window.scrollTo({ top: _savedY, behavior: 'instant' });
    }

    function toggleSidebar() {
        var sb = document.getElementById('sidebar');
        if (!sb) return;
        sb.classList.contains('mobile-active') ? closeSidebar() : openSidebar();
    }

    window.openSidebar  = openSidebar;
    window.closeSidebar = closeSidebar;
    window.toggleSidebar = toggleSidebar;

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('#sidebar .nav-link').forEach(function(l) {
            l.addEventListener('click', function() {
                if (window.innerWidth <= 768) closeSidebar();
            });
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSidebar();
        });
        // Populate user info from stored profile
        if (typeof populateSidebarUser === 'function') populateSidebarUser();
        if (typeof updatePlanBadge    === 'function') updatePlanBadge();
    });
}());
