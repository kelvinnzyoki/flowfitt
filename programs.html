<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs - FlowFit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .main-content { margin-left: 280px; flex: 1; padding: 2rem 3rem; width: calc(100% - 280px); }
        .header { margin-bottom: 2rem; }
        .header h1 { font-family: 'Oswald', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .header p { color: var(--text-secondary); font-size: 1.1rem; }
        /* Dev banner */
        .dev-banner { display: none; align-items: center; gap: 1rem; padding: 0.9rem 1.5rem; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 12px; color: #fbbf24; font-size: 0.9rem; margin-bottom: 2rem; }
        .dev-banner.visible { display: flex; }
        .dev-banner code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.5rem; border-radius: 6px; font-family: monospace; }
        /* Sections */
        .section { margin-bottom: 4rem; }
        .section-title { font-family: 'Oswald', sans-serif; font-size: 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
        .section-icon { width: 50px; height: 50px; border-radius: 12px; background: var(--gradient-2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        /* Program Grid */
        .programs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2.5rem; }
        .program-card { background: var(--bg-card); border-radius: 25px; border: 1px solid var(--border); overflow: hidden; transition: all 0.4s ease; position: relative; }
        .program-card:hover { transform: translateY(-8px); box-shadow: 0 25px 70px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.1); }
        .program-header { height: 180px; background: var(--gradient-1); padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .program-card:nth-child(3n+2) .program-header { background: var(--gradient-2); }
        .program-card:nth-child(3n)   .program-header { background: var(--gradient-3); }
        .program-badge { display: inline-block; padding: 0.5rem 1.2rem; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; align-self: flex-start; }
        .program-title { font-family: 'Oswald', sans-serif; font-size: 1.9rem; line-height: 1.1; letter-spacing: -1px; }
        .program-body { padding: 2rem; }
        .program-description { color: var(--text-secondary); line-height: 1.7; margin-bottom: 2rem; }
        .program-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
        .meta-item { text-align: center; }
        .meta-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .meta-label { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.3rem; }
        .meta-value { font-weight: 700; font-size: 1.1rem; }
        /* Progress bar (for enrolled programs) */
        .program-progress { margin-bottom: 1.5rem; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 0.75rem; font-size: 0.9rem; }
        .progress-label { font-weight: 600; }
        .progress-pct { color: var(--accent); font-weight: 700; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gradient-2); border-radius: 10px; transition: width 0.8s ease; }
        /* CTAs */
        .program-cta { display: flex; gap: 1rem; }
        .btn-program { flex: 1; padding: 1rem; border-radius: 15px; border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .btn-enroll   { background: var(--gradient-accent); color: #000; }
        .btn-enroll:hover   { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,87,108,0.3); }
        .btn-continue { background: var(--gradient-2); color: #fff; }
        .btn-continue:hover { transform: translateY(-2px); }
        .btn-details  { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-primary); }
        .btn-details:hover  { background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .btn-enrolled { background: rgba(74,222,128,0.12); border: 1px solid #4ade80; color: #4ade80; cursor: default; }
        .btn-completed{ background: rgba(79,172,254,0.12); border: 1px solid #4facfe; color: #4facfe; cursor: default; }
        .empty-section { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-secondary); }
        @media (max-width: 768px) {
            .main-content { margin-left: 0; width: 100%; padding: 1.5rem; }
            .programs-grid { grid-template-columns: 1fr; }
            .program-meta { grid-template-columns: repeat(2, 1fr); }
        }
    
/* ═══════════════════════════════════════
   GLOBAL DESIGN SYSTEM — FLOWFIT GOLD
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
    overflow-x: hidden;
    max-width: 100vw;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
}

/* ── Typography ─── */
h1, h2, h3, h4, h5, h6,
.hero-title, .section-title, .card-title,
.stat-value, .logo, .greeting,
.panel-title, .wm-title, .hero-text h1,
.section-header h2, .pricing-card h3,
.feature-card h3, .auth-header h1,
.modal-header h2, .nav-title {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
}

/* Biggest display text → Anton */
.hero-text h1,
.hero-title,
.stat-number {
    font-family: 'Anton', sans-serif;
    letter-spacing: 0.01em;
}

/* ── Sidebar ─── */
/* ── Cards ─── */
.card, .stat-card, .chart-card, .panel-card,
.program-card, .exercise-card, .feature-card,
.pricing-card, .auth-card, .form-section,
.week-block {
    background: var(--bg-card) !important;
    border: 1px solid var(--border-gold) !important;
    border-radius: 16px !important;
    backdrop-filter: blur(12px);
    transition: var(--transition-smooth) !important;
}

.card:hover, .stat-card:hover, .program-card:hover,
.exercise-card:hover, .feature-card:hover {
    border-color: var(--border-gold-hover) !important;
    box-shadow: var(--shadow-gold-glow), var(--shadow-card) !important;
    transform: translateY(-4px) !important;
}

/* ── Stat card accent bars ─── */
.stat-card::before {
    background: var(--gradient-gold) !important;
}

/* ── Buttons ─── */
.btn-primary, .btn-start, .btn-enroll, .btn-log,
.btn-continue, .btn-enroll, .btn-start-session,
.btn-continue, .btn-primary:hover, .btn-start:hover, .btn-enroll:hover,
.btn-log:hover, .btn-continue:hover,
.btn-start-session:hover {
    box-shadow: 0 8px 30px var(--accent-glow) !important;
    transform: translateY(-2px) !important;
}

.btn-details, .btn-save, .btn-ghost, .btn-close-wm,
.close-btn, .back-btn {
    border-color: var(--border-gold) !important;
    color: var(--text-gold) !important;
}

.btn-details:hover, .btn-save:hover, .btn-ghost:hover {
    border-color: var(--border-gold-hover) !important;
    background: var(--gold-soft) !important;
}

/* ── Logout btn special ─── */
/* ── Inputs ─── */
.form-input, .form-select, .form-textarea,
.search-bar input, .form-field input,
.form-field select, .form-field textarea,
input, select, textarea {
    background: rgba(212, 175, 55, 0.04) !important;
    border: 1px solid var(--border-gold) !important;
    color: var(--text-primary) !important;
    font-family: 'Inter', sans-serif !important;
    border-radius: 10px !important;
}

.form-input:focus, .form-select:focus, .form-textarea:focus,
.search-bar input:focus, .form-field input:focus,
.form-field select:focus, .form-field textarea:focus {
    border-color: var(--gold-primary) !important;
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15) !important;
    outline: none !important;
}

/* ── Progress bars ─── */
.progress-fill, .week-progress-fill, .cat-bar-fill {
    background: var(--gradient-gold) !important;
}

/* ── Badges / Tags / Chips ─── */
.program-badge, .hero-badge, .preview-badge,
.difficulty-badge, .section-label {
    background: rgba(212, 175, 55, 0.15) !important;
    color: var(--gold-primary) !important;
    border: 1px solid var(--border-gold) !important;
}

.premium-tag {
    background: var(--gradient-gold) !important;
    color: #000 !important;
}

/* ── Gradient text helpers ─── */
.gradient-text, .streak-number,
[class*="gradient-text"] {
    background: var(--gradient-gold) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
}

/* ── Active nav link accent ─── */
.tab-btn.active, .time-btn.active {
    background: var(--gradient-gold) !important;
    color: #000 !important;
    border-color: transparent !important;
}

/* ── Program header colors ─── */
.program-header {
    background: var(--gradient-gold-soft) !important;
    border-bottom: 1px solid var(--border-gold) !important;
}

/* ── Achievement items ─── */
.achievement-item.unlocked {
    border-color: var(--border-gold) !important;
    background: var(--gold-soft) !important;
}

.achievement-icon-wrap {
    background: var(--gradient-gold) !important;
}

/* ── User avatar ─── */
/* ── Loading modal fix ─── */
#loadingModal, .loading-modal, [id*="loading"],
[class*="loading-overlay"], [class*="loadingOverlay"] {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 9999 !important;
    background: rgba(5, 5, 5, 0.85) !important;
    backdrop-filter: blur(8px) !important;
}

/* ── Modals ─── */
.modal-content, .wmodal-box, .wm-body {
    background: var(--bg-elevated) !important;
    border: 1px solid var(--border-gold) !important;
}

/* ── Pricing featured card ─── */
.pricing-card.featured {
    border: 2px solid var(--gold-primary) !important;
    box-shadow: 0 30px 80px rgba(212, 175, 55, 0.2) !important;
}

.pricing-badge {
    background: var(--gradient-gold) !important;
    color: #000 !important;
}

/* ── Section icon ─── */
.section-icon {
    background: var(--gradient-gold-soft) !important;
    border: 1px solid var(--border-gold) !important;
}

/* ── Background animation orbs → gold ─── */
.bg-animation::before {
    background: radial-gradient(circle, rgba(212,175,55,0.6) 0%, transparent 70%) !important;
}
.bg-animation::after {
    background: radial-gradient(circle, rgba(184,134,11,0.4) 0%, transparent 70%) !important;
}

/* ── Top nav ─── */
nav, .top-nav {
    background: rgba(5, 5, 5, 0.9) !important;
    border-bottom: 1px solid var(--border-gold) !important;
}

/* ── Main content offset for sidebar ─── */
.main-content {
    margin-left: 270px;
    width: calc(100% - 270px);
    max-width: 100%;
    overflow-x: hidden;
}

.main {
    margin-left: 260px !important;
}

/* ── Programs grid overflow fix ─── */
.programs-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

.exercise-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

.achievements-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important;
    width: 100% !important;
    overflow: hidden !important;
}

/* Contain all grid items */
.program-card, .exercise-card, .achievement-item {
    min-width: 0 !important;
    overflow: hidden !important;
    word-break: break-word !important;
}

/* ── Nav hero section (index) ─── */
nav .btn-primary {
    background: var(--gradient-gold) !important;
    color: #000 !important;
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3) !important;
}

/* ── Workout badge colors → gold palette ─── */
.workout-badge { background: rgba(212,175,55,0.12) !important; color: var(--gold-primary) !important; }
.workout-badge.cardio { background: rgba(212,175,55,0.1) !important; color: #E6BE8A !important; }
.workout-badge.strength { background: rgba(184,134,11,0.15) !important; color: #D4AF37 !important; }
.workout-badge.core { background: rgba(242,212,121,0.12) !important; color: #F2D479 !important; }
.workout-badge.hiit { background: rgba(200,155,60,0.15) !important; color: #c89b3c !important; }

/* ── Hero bg gradient overrides (program-detail, workout-session) ─── */
.hero-bg {
    background: linear-gradient(135deg, #1a1508 0%, #0b0b0f 100%) !important;
}

/* ── Achievement points badge ─── */
.achievement-pts {
    background: rgba(212, 175, 55, 0.15) !important;
    color: var(--gold-primary) !important;
}

/* ════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════ */

/* ── Tablet (max 1024px) ─── */
@media (max-width: 1024px) {
    .main-content {
        margin-left: 240px !important;
        width: calc(100% - 240px) !important;
        padding: 1.5rem 2rem !important;
    }
    .main { margin-left: 240px !important; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .chart-grid { grid-template-columns: 1fr !important; }
    .content-grid { grid-template-columns: 1fr !important; }
    .hero-content { grid-template-columns: 1fr !important; }
    .hero-text h1 { font-size: 3.5rem !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .features-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .body { grid-template-columns: 1fr !important; padding: 1.5rem !important; }
}

/* ── Mobile (max 768px) ─── */
@media (max-width: 768px) {
    html, body { overflow-x: hidden !important; }

    .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        padding: 1rem !important;
    }
    .main { margin-left: 0 !important; }

    .dashboard-container { flex-direction: column; }

    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 1rem !important; }
    .content-grid { grid-template-columns: 1fr !important; }
    .chart-grid { grid-template-columns: 1fr !important; }
    .streak-section { grid-template-columns: 1fr !important; }
    .programs-grid { grid-template-columns: 1fr !important; }
    .exercise-grid { grid-template-columns: 1fr !important; }
    .achievements-grid { grid-template-columns: 1fr !important; }
    .features-grid { grid-template-columns: 1fr !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }
    .form-row { grid-template-columns: 1fr !important; }
    .hero-content { grid-template-columns: 1fr !important; gap: 2rem !important; }
    .hero-text h1 { font-size: 2.5rem !important; }
    .hero-title { font-size: 2rem !important; }
    .section-header h2 { font-size: 2rem !important; }
    .greeting { font-size: 1.5rem !important; margin-top: 3rem !important; }
    .prog-ring-wrap { width: 100px; height: 100px; }
    .hero-stats { flex-wrap: wrap !important; gap: 1rem !important; }
    .hero-cta { flex-direction: column !important; }
    nav { padding: 1rem 1.5rem !important; }
    .body { padding: 1rem !important; }
    .progress-panel { position: static !important; }
    .stats-grid { grid-template-columns: 1fr 1fr !important; }
    .controls { flex-direction: column !important; }
    .search-bar { min-width: unset !important; width: 100% !important; }
    .program-meta { grid-template-columns: repeat(2, 1fr) !important; }
    .includes-grid { grid-template-columns: 1fr !important; }
    .hero-content.workout { padding: 1.5rem !important; }
    .video-section { margin: 1rem !important; }
}

/* ── Small mobile (max 480px) ─── */
@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr !important; }
    .hero-text h1 { font-size: 2rem !important; }
    .stat-value { font-size: 1.8rem !important; }
    .auth-card { padding: 2rem 1.5rem !important; }
    .modal-content { margin: 0.5rem !important; }
    .program-meta { grid-template-columns: 1fr 1fr !important; }
    .filter-tabs { flex-wrap: wrap; }
    .tab-btn { padding: 0.7rem 1rem !important; font-size: 0.85rem !important; }
}

    
/* ── Extended LoadingManager modal fix ─── */
body > div[style*="position: fixed"],
body > div[style*="position:fixed"] {
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    max-width: 100vw !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 9999 !important;
}

/* Spinner / loading box inside modal */
.loading-spinner, .loading-box, .loading-content,
[class*="spinner"] {
    background: var(--bg-elevated) !important;
    border: 1px solid var(--border-gold) !important;
    border-radius: 16px !important;
    padding: 2rem 3rem !important;
    text-align: center !important;
    color: var(--gold-primary) !important;
    font-family: 'Inter', sans-serif !important;
    box-shadow: var(--shadow-gold-glow) !important;
}

    transform:translateY(-2px) scale(1.03)!important;

    border-color:var(--border-gold)!important;
    color:var(--gold-main)!important;

    background:var(--gold-soft)!important;
    border-color:rgba(212,175,55,0.5)!important;

/* ── LOGOUT BTN ─────────────────────────────────── */
/* ── INPUTS ──────────────────────────────────────── */
.form-input,.form-select,.form-textarea,
.search-bar input,.form-field input,
.form-field select,.form-field textarea,
input:not([type=checkbox]):not([type=radio]),
select,textarea {
    background:rgba(212,175,55,0.04)!important;
    border:1px solid var(--border-gold)!important;
    color:var(--text-primary)!important;
    font-family:'Inter',sans-serif!important;
    border-radius:10px!important;
}
.form-input:focus,.form-field input:focus,.form-field select:focus,
.search-bar input:focus,textarea:focus,select:focus {
    border-color:var(--gold-main)!important;
    box-shadow:0 0 0 3px rgba(212,175,55,0.12)!important;
    outline:none!important;
}

/* ── PROGRESS BARS ───────────────────────────────── */
.progress-fill,.week-progress-fill,.cat-bar-fill {
    background:var(--gold-gradient)!important;
}
.progress-bar,.cat-bar-track {
    background:rgba(255,255,255,0.05)!important;
}

/* ── BADGES / CHIPS ──────────────────────────────── */
.program-badge,.hero-badge,.difficulty-badge,
.section-label,.preview-badge {
    background:rgba(212,175,55,0.1)!important;
    color:var(--gold-main)!important;
    border:1px solid var(--border-gold)!important;
    font-family:'Oswald',sans-serif!important;
    letter-spacing:1px!important;
}
.premium-tag,.pricing-badge {
    background:var(--gold-gradient)!important;
    color:#000!important;
}
.free-tag,.free-badge {
    background:rgba(74,222,128,0.12)!important;
    color:#4ade80!important;border:1px solid rgba(74,222,128,0.3)!important;
}
.pro-badge {
    background:rgba(212,175,55,0.15)!important;
    color:var(--gold-main)!important;border:1px solid var(--border-gold)!important;
}

/* ── GRADIENT TEXT ───────────────────────────────── */
.gradient-text,.streak-number {
    background:var(--gold-gradient)!important;
    -webkit-background-clip:text!important;
    -webkit-text-fill-color:transparent!important;
    background-clip:text!important;
}

/* ── FILTER TABS ─────────────────────────────────── */
.tab-btn,.time-btn {
    background:rgba(255,255,255,0.03)!important;
    border:1px solid var(--border-gold)!important;
    color:var(--text-secondary)!important;
    font-family:'Oswald',sans-serif!important;
    letter-spacing:1px!important;
}
.tab-btn:hover,.time-btn:hover {
    color:var(--gold-main)!important;
    border-color:rgba(212,175,55,0.4)!important;
}
.tab-btn.active,.time-btn.active {
    background:var(--gold-gradient)!important;
    color:#000!important;border-color:transparent!important;
}

/* ── NAV / TOP BAR ───────────────────────────────── */
nav,.top-nav {
    background:rgba(3,3,3,0.92)!important;
    border-bottom:1px solid var(--border-gold)!important;
    backdrop-filter:blur(16px)!important;
}

/* ── FEATURED PRICING ────────────────────────────── */
.pricing-card.featured {
    border:2px solid var(--gold-main)!important;
    box-shadow:0 20px 60px rgba(212,175,55,0.15)!important;
}

/* ── ACHIEVEMENT ITEMS ───────────────────────────── */
.achievement-item.unlocked,.achievement-badge {
    border-color:var(--border-gold)!important;
    background:linear-gradient(135deg,rgba(212,175,55,0.08),transparent)!important;
}
.achievement-icon-wrap {
    background:var(--gold-gradient)!important;
}
.achievement-pts {
    background:rgba(212,175,55,0.12)!important;
    color:var(--gold-main)!important;
}

/* ── WORKOUT BADGES ──────────────────────────────── */
.workout-badge{background:rgba(212,175,55,0.1)!important;color:var(--gold-main)!important;}
.workout-badge.cardio{background:rgba(0,242,254,0.08)!important;color:#4facfe!important;}
.workout-badge.strength{background:rgba(212,175,55,0.12)!important;color:#D4AF37!important;}
.workout-badge.core{background:rgba(74,222,128,0.08)!important;color:#4ade80!important;}
.workout-badge.hiit{background:rgba(255,62,62,0.08)!important;color:#ff6b6b!important;}

/* ── SECTION ICON ────────────────────────────────── */
.section-icon {
    background:rgba(212,175,55,0.1)!important;
    border:1px solid var(--border-gold)!important;
}

/* ── MAIN CONTENT LAYOUT ─────────────────────────── */
.main-content {
    margin-left:280px!important;
    width:calc(100% - 280px)!important;
    overflow-x:hidden!important;
}
.main{margin-left:260px!important;}

/* ── GRIDS — OVERFLOW FIX ────────────────────────── */
.programs-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.exercise-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.achievements-grid {
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr))!important;
    width:100%!important;overflow:hidden!important;
}
.program-card,.exercise-card,.achievement-item {
    min-width:0!important;overflow:hidden!important;word-break:break-word!important;
}

/* ── HERO BG (workout session / program detail) ── */
.hero-bg {
    background:linear-gradient(135deg,#1a1508 0%,#0a0a0c 100%)!important;
}

/* ── BG ANIMATION ORBS ───────────────────────────── */
.bg-animation::before {
    background:radial-gradient(circle,rgba(212,175,55,0.5) 0%,transparent 70%)!important;
}
.bg-animation::after {
    background:radial-gradient(circle,rgba(0,242,254,0.15) 0%,transparent 70%)!important;
}

/* ── LOADING MANAGER (api.js injected) ───────────── */
#global-loader {
    position:fixed!important;top:0!important;left:0!important;
    width:100%!important;height:100%!important;
    z-index:10000!important;
}
.loader-backdrop {
    background:rgba(3,3,3,0.92)!important;
    backdrop-filter:blur(8px)!important;
}
.loader-content {
    background:var(--bg-elevated,#111115)!important;
    border:1px solid var(--border-gold)!important;
    border-radius:20px!important;
    box-shadow:0 0 30px rgba(212,175,55,0.1)!important;
}
.loader-spinner {
    border-color:rgba(212,175,55,0.15)!important;
    border-top-color:var(--gold-main)!important;
}
.loader-message {
    font-family:'Oswald',sans-serif!important;
    letter-spacing:3px!important;color:var(--gold-main)!important;
}

/* ── MODALS ──────────────────────────────────────── */
.modal-content,.wmodal-box {
    background:var(--bg-elevated)!important;
    border:1px solid var(--border-gold)!important;
}
.modal-header{border-bottom:1px solid var(--border-gold)!important;}

/* ── CARDS STAT TOP BAR ──────────────────────────── */
.stat-card::before{background:var(--cyan-gradient)!important;}

/* ── TIMER CARD GOLD ─────────────────────────────── */
.timer-display {
    background:var(--gold-gradient)!important;
    -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
    background-clip:text!important;
}
.live-cals{
    background:rgba(212,175,55,0.06)!important;
    border:1px solid rgba(212,175,55,0.15)!important;
}
.live-cals-value{color:var(--gold-main)!important;}

/* ── CUSTOM CONFIRM MODAL ──────────────────────────── */
.ff-confirm-backdrop {
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(0,0,0,0.82);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
}
@keyframes ffSlideUp {
    from { transform: translateY(24px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
}
.ff-confirm-box {
    background: #111115;
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 22px;
    padding: 2.5rem 2rem 2rem;
    max-width: 400px; width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 40px rgba(212,175,55,0.08);
    animation: ffSlideUp 0.22s cubic-bezier(0.165,0.84,0.44,1);
    text-align: center;
}
.ff-confirm-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
.ff-confirm-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.5rem; font-weight: 700;
    letter-spacing: 1px; color: #fff; margin-bottom: 0.6rem;
}
.ff-confirm-msg { color: #888; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
.ff-confirm-actions { display: flex; gap: 1rem; }
.ff-confirm-cancel {
    flex: 1; padding: 0.9rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: #aaa;
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; transition: background 0.2s;
}
.ff-confirm-cancel:hover { background: rgba(255,255,255,0.1); color: #fff; }
.ff-confirm-ok {
    flex: 1.4; padding: 0.9rem;
    background: linear-gradient(135deg,#D4AF37 0%,#edcf7d 50%,#b8860b 100%);
    border: none; border-radius: 12px; color: #000;
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s;
}
.ff-confirm-ok:hover { box-shadow: 0 6px 20px rgba(212,175,55,0.4); }
.ff-confirm-ok.danger { background: linear-gradient(135deg,#ff3e3e,#ff6b6b); }
.ff-confirm-ok.danger:hover { box-shadow: 0 6px 20px rgba(255,62,62,0.4); }

/* ═══════════════════════════════════════════════════════════════════════
   FLOWFIT SIDEBAR  ·  Canonical CSS  ·  Single source of truth
   ═══════════════════════════════════════════════════════════════════════ */

/* ── Variables (fallbacks so each page's own vars still work) ──────── */
:root {
    --ff-sidebar-w: 280px;
    --ff-sidebar-bg: var(--bg-surface, var(--bg-sidebar, #0d0d10));
    --ff-border-gold: var(--border-gold, rgba(212,175,55,0.2));
    --ff-gold: var(--gold-main, #D4AF37);
    --ff-gold-grad: var(--gold-gradient, linear-gradient(135deg,#D4AF37,#edcf7d,#b8860b));
    --ff-text-dim: var(--text-secondary, #777);
}

/* ── Base sidebar — always flex, always fixed ──────────────────────── */
.sidebar {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: var(--ff-sidebar-w) !important;
    height: 100vh !important;
    /* scroll — the whole point of this rebuild */
    overflow-y: auto !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch !important;
    overscroll-behavior: contain !important;   /* stops bleed-through */
    /* layout */
    display: flex !important;
    flex-direction: column !important;
    padding: 2rem 1.5rem !important;
    /* visuals */
    background: var(--ff-sidebar-bg) !important;
    border-right: 1px solid var(--ff-border-gold) !important;
    /* stacking */
    z-index: 1000 !important;
    /* animation */
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1) !important;
    /* custom scrollbar */
    scrollbar-width: thin;
    scrollbar-color: rgba(212,175,55,0.25) transparent;
}
.sidebar::-webkit-scrollbar        { width: 3px; }
.sidebar::-webkit-scrollbar-track  { background: transparent; }
.sidebar::-webkit-scrollbar-thumb  { background: rgba(212,175,55,0.28); border-radius: 2px; }

/* ── Logo ─────────────────────────────────────────────────────────── */
.sidebar .logo {
    font-family: 'Anton', sans-serif !important;
    font-size: 2rem !important;
    letter-spacing: 4px !important;
    background: var(--ff-gold-grad) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
    margin-bottom: 2.5rem !important;
    text-align: center !important;
    text-decoration: none !important;
    display: block !important;
    flex-shrink: 0 !important;
    filter: drop-shadow(0 0 10px rgba(212,175,55,0.18)) !important;
}

/* ── Nav ─────────────────────────────────────────────────────────── */
.sidebar .nav-menu  { list-style: none !important; flex: 1 !important; }
.sidebar .nav-item  { margin-bottom: 0.35rem !important; }
.sidebar .nav-link {
    display: flex !important;
    align-items: center !important;
    gap: 1rem !important;
    padding: 0.85rem 1.2rem !important;
    color: var(--ff-text-dim) !important;
    text-decoration: none !important;
    border-radius: 12px !important;
    transition: all 0.22s ease !important;
    font-family: 'Oswald', sans-serif !important;
    font-weight: 500 !important;
    letter-spacing: 1px !important;
    font-size: 0.92rem !important;
    border: 1px solid transparent !important;
    white-space: nowrap !important;
}
.sidebar .nav-link:hover {
    color: var(--ff-gold) !important;
    background: rgba(212,175,55,0.06) !important;
    border-color: rgba(212,175,55,0.18) !important;
}
.sidebar .nav-link.active {
    background: var(--ff-gold-grad) !important;
    color: #000 !important;
    font-weight: 700 !important;
    border-color: transparent !important;
    box-shadow: 0 4px 16px rgba(212,175,55,0.22) !important;
}
.sidebar .nav-icon { font-size: 1.1rem !important; width: 22px !important; text-align: center !important; flex-shrink: 0 !important; }

/* ── User section ────────────────────────────────────────────────── */
.sidebar .user-section {
    margin-top: auto !important;
    padding-top: 1.5rem !important;
    border-top: 1px solid rgba(212,175,55,0.14) !important;
    flex-shrink: 0 !important;
}
.sidebar .user-profile {
    display: flex !important;
    align-items: center !important;
    gap: 0.9rem !important;
    padding: 0.8rem !important;
    background: rgba(255,255,255,0.02) !important;
    border-radius: 12px !important;
    margin-bottom: 0.7rem !important;
    border: 1px solid rgba(212,175,55,0.1) !important;
}
.sidebar .user-avatar {
    width: 40px !important; height: 40px !important;
    border-radius: 10px !important;
    background: var(--ff-gold-grad) !important;
    color: #000 !important;
    display: flex !important; align-items: center !important; justify-content: center !important;
    font-family: 'Anton', sans-serif !important; font-size: 1.1rem !important;
    flex-shrink: 0 !important;
}
.sidebar .user-info h4, .sidebar .user-info p {
    display: block !important;
}
.sidebar .user-info h4 { font-family:'Oswald',sans-serif !important; font-size:0.88rem !important; color:#fff !important; margin:0 0 2px !important; }
.sidebar .user-info p  { font-size:0.7rem !important; color:var(--ff-text-dim) !important; margin:0 !important; }
.sidebar .logout-btn {
    width: 100% !important;
    padding: 0.78rem !important;
    background: transparent !important;
    color: #ff4444 !important;
    border: 1px solid rgba(255,68,68,0.28) !important;
    border-radius: 11px !important;
    font-family: 'Oswald', sans-serif !important;
    font-weight: 700 !important; letter-spacing: 2px !important; font-size: 0.8rem !important;
    cursor: pointer !important;
    transition: all 0.22s ease !important;
    display: flex !important; align-items: center !important; justify-content: center !important; gap: 0.5rem !important;
}
.sidebar .logout-btn:hover {
    background: rgba(255,68,68,0.07) !important;
    border-color: #ff4444 !important;
    box-shadow: 0 0 12px rgba(255,68,68,0.1) !important;
}

/* ── Plan badges ─────────────────────────────────────────────────── */
.plan-badge   { display:inline-block; padding:0.18rem 0.6rem; border-radius:20px; font-size:0.68rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.plan-free    { background:rgba(255,255,255,0.06); color:#666; }
.plan-trial   { background:rgba(251,191,36,0.1); color:#fbbf24; }
.plan-pro     { background:rgba(212,175,55,0.16); color:#D4AF37; border:1px solid rgba(212,175,55,0.3); }
.plan-premium { background:linear-gradient(135deg,rgba(212,175,55,0.22),rgba(184,134,11,0.22)); color:#FFD700; border:1px solid rgba(212,175,55,0.4); }

/* ── Overlay backdrop ────────────────────────────────────────────── */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 999;
    cursor: pointer;
}
.sidebar-overlay.active { display: block; }

/* ── Body lock — page behind stays still while sidebar scrolls ─── */
body.sidebar-open {
    overflow: hidden !important;
    position: fixed !important;
    width: 100% !important;
    /* prevent ANY touch scroll on the body */
    touch-action: none !important;
}
/* But the sidebar itself MUST still be scrollable */
body.sidebar-open .sidebar {
    overflow-y: auto !important;
    touch-action: pan-y !important;
    pointer-events: all !important;
}

/* ── ☰ hamburger button ──────────────────────────────────────────── */
.mobile-menu-btn {
    position: fixed !important;
    top: 1.25rem !important;
    left: 1.2rem !important;
    z-index: 2001 !important;
    background: linear-gradient(135deg,#D4AF37,#edcf7d,#b8860b) !important;
    border: none !important;
    padding: 0.58rem 0.78rem !important;
    border-radius: 10px !important;
    cursor: pointer !important;
    color: #000 !important;
    font-size: 1.1rem !important;
    font-weight: 900 !important;
    line-height: 1 !important;
    display: none;
    align-items: center !important;
    justify-content: center !important;
    box-shadow: 0 4px 14px rgba(212,175,55,0.28) !important;
    transition: transform 0.14s ease !important;
    -webkit-tap-highlight-color: transparent !important;
}
.mobile-menu-btn:active { transform: scale(0.9) !important; }

/* ── Responsive ──────────────────────────────────────────────────── */

/* Tablet: icon-only rail */
@media (max-width: 900px) {
    .sidebar { width: 72px !important; padding: 2rem 0.35rem !important; }
    .sidebar .logo { font-size: 0.9rem !important; letter-spacing: 1px !important; margin-bottom: 1.8rem !important; }
    .sidebar .nav-link { justify-content: center !important; padding: 0.85rem !important; gap: 0 !important; }
    .sidebar .nav-link span:not(.nav-icon) { display: none !important; }
    .sidebar .user-info, .sidebar .logout-btn span { display: none !important; }
    .sidebar .user-section { align-items: center !important; }
    .sidebar .user-profile { justify-content: center !important; padding: 0.6rem !important; }
    .sidebar .logout-btn { justify-content: center !important; padding: 0.6rem !important; }
    .main-content { margin-left: 72px !important; width: calc(100% - 72px) !important; }
}

/* Mobile: full slide-in drawer. CRITICAL: NEVER use display:none here */
@media (max-width: 768px) {
    .sidebar {
        /* hidden off-screen by default — NOT display:none */
        transform: translateX(-100%) !important;
        width: 280px !important;
        padding: 2rem 1.5rem !important;
    }
    /* When open — slide in and make fully scrollable */
    .sidebar.mobile-active {
        transform: translateX(0) !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        overscroll-behavior: contain !important;
        touch-action: pan-y !important;
    }
    /* Restore all items hidden at 900px breakpoint */
    .sidebar.mobile-active .logo {
        font-size: 1.9rem !important;
        letter-spacing: 4px !important;
        margin-bottom: 2.5rem !important;
    }
    .sidebar.mobile-active .nav-link {
        justify-content: flex-start !important;
        padding: 0.85rem 1.2rem !important;
        gap: 1rem !important;
    }
    .sidebar.mobile-active .nav-link span:not(.nav-icon)  { display: inline !important; }
    .sidebar.mobile-active .user-info                     { display: block !important; }
    .sidebar.mobile-active .logout-btn span               { display: inline !important; }
    .sidebar.mobile-active .logout-btn                    { padding: 0.78rem !important; }
    .sidebar.mobile-active .user-section                  { align-items: stretch !important; }
    /* Main content fills full width */
    .main-content { margin-left: 0 !important; width: 100% !important; padding-top: 4.5rem !important; }
    .mobile-menu-btn { display: flex !important; }
}

@media (max-width: 600px) {
    .sidebar { width: 270px !important; }
    .sidebar.mobile-active { width: 270px !important; }
}

</style>
</head>
<body>
<button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="logo">FLOWFIT</a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><span class="nav-icon">🏠</span><span>Home</span></a></li>
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
            <li class="nav-item"><a href="workouts.html" class="nav-link"><span class="nav-icon">💪</span><span>Workouts</span></a></li>
            <li class="nav-item"><a href="programs.html" class="nav-link active"><span class="nav-icon">📋</span><span>Programs</span></a></li>
            <li class="nav-item"><a href="progress.html" class="nav-link"><span class="nav-icon">📈</span><span>Progress</span></a></li>
            <li class="nav-item"><a href="profile.html" class="nav-link"><span class="nav-icon">👤</span><span>Profile</span></a></li>
            <li class="nav-item"><a href="subscription.html" class="nav-link"><span class="nav-icon">💳</span><span>Subscription</span></a></li>
        </ul>
        <div class="user-section">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-info">
                    <h4 id="userName">Loading...</h4>
                    <span id="planBadge" class="plan-badge plan-free">FREE</span>
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">🚪 <span>LOGOUT</span></button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Workout Programs</h1>
            <p>Structured plans to help you achieve your fitness goals</p>
        </div>

        

        <!-- Active Enrollments — hidden until user has enrollments -->
        <div class="section" id="enrollmentsSection" style="display:none;">
            <h2 class="section-title">
                <span class="section-icon">🔥</span> Continue Your Journey
            </h2>
            <div class="programs-grid" id="enrollmentsGrid"></div>
        </div>

        <!-- Available Programs -->
        <div class="section">
            <h2 class="section-title">
                <span class="section-icon">⚡</span> Available Programs
            </h2>
            <div class="programs-grid" id="programsGrid">
                <div class="empty-section">⏳ Loading programs...</div>
            </div>
        </div>
    </main>
</div>

<script src="api.js"></script>
<script>
requireAuth();

// ─────────────────────────────────────────────────────────────────────────────
// FALLBACK PROGRAMS — mirror of seed.ts
// Shown only when DB is empty. IDs match seed so enrolling works post-seed.
// ─────────────────────────────────────────────────────────────────────────────
const FALLBACK_PROGRAMS = [
  {
    id: 'prog-beginner', title: 'Beginner Foundation',
    description: 'Perfect for beginners. Master fundamental movements, build confidence, and establish a sustainable fitness habit over 4 weeks.',
    durationWeeks: 4, daysPerWeek: 3, level: 'Beginner', icon: '🌱',
  },
  {
    id: 'prog-hiit', title: 'Fat Burn HIIT',
    description: 'High-intensity interval training to maximise calorie burn and boost your metabolism. For intermediate athletes ready to push their limits.',
    durationWeeks: 6, daysPerWeek: 4, level: 'Intermediate', icon: '🔥',
  },
  {
    id: 'prog-core', title: 'Core Power',
    description: 'Focused 4-week core training to build a strong, stable midsection. Suitable for all fitness levels.',
    durationWeeks: 4, daysPerWeek: 3, level: 'All Levels', icon: '🧘',
  },
  {
    id: 'prog-strength', title: 'Full Body Strength',
    description: 'Comprehensive 8-week bodyweight strength program with progressive overload. For intermediate athletes.',
    durationWeeks: 8, daysPerWeek: 5, level: 'Intermediate', icon: '💪',
  },
  {
    id: 'prog-flex', title: 'Mobility & Flexibility',
    description: 'Improve range of motion, reduce injury risk, and recover faster. Perfect for athletes with tight hips and hamstrings.',
    durationWeeks: 3, daysPerWeek: 4, level: 'All Levels', icon: '🤸',
  },
];

let allPrograms    = [];
let myEnrollments  = [];
let isFallback     = false;

async function loadAll() {
    populateSidebarUser(); updatePlanBadge();
    try {
        LoadingManager.show('Loading programs...');

        const [progRes, enrollRes] = await Promise.all([
            ProgramsAPI.getPrograms({ limit: 50 }),
            ProgramsAPI.getUserPrograms(),
        ]);

        // Enrollments
        if (enrollRes.success && enrollRes.data) {
            myEnrollments = enrollRes.data;
            renderEnrollments(myEnrollments);
        }

        // Programs
        if (progRes.success && progRes.data && progRes.data.length > 0) {
            allPrograms = progRes.data;
            isFallback  = false;
        } else {
            allPrograms = FALLBACK_PROGRAMS;
            isFallback  = true;
            document.getElementById('devBanner').classList.add('visible');
        }

        renderPrograms(allPrograms);
    } catch (err) {
        console.error('Load error:', err);
        allPrograms = FALLBACK_PROGRAMS;
        isFallback  = true;
        document.getElementById('devBanner').classList.add('visible');
        renderPrograms(allPrograms);
        Toast.warning('Could not reach server — showing sample programs');
    } finally {
        LoadingManager.hide();
    }
}

// ── Render active enrollments ────────────────────────────────────────────────
function renderEnrollments(enrollments) {
    const section = document.getElementById('enrollmentsSection');
    const grid    = document.getElementById('enrollmentsGrid');

    if (!enrollments.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    grid.innerHTML = enrollments.map(e => {
        const prog     = e.program;
        const total    = (prog.durationWeeks || 0) * (prog.daysPerWeek || 0);
        const pct      = total > 0 ? Math.round(e.completedDays / total * 100) : 0;
        const done     = !e.isActive && e.completedAt;

        return `
        <div class="program-card">
            <div class="program-header">
                <span class="program-badge">${done ? '✅ Completed' : '🔥 In Progress'}</span>
                <h3 class="program-title">${esc(prog.title)}</h3>
            </div>
            <div class="program-body">
                <p class="program-description">${esc(prog.description || 'Your active training program.')}</p>
                <div class="program-meta">
                    <div class="meta-item"><div class="meta-icon">📅</div><div class="meta-label">Duration</div><div class="meta-value">${prog.durationWeeks}w</div></div>
                    <div class="meta-item"><div class="meta-icon">📆</div><div class="meta-label">Days/Week</div><div class="meta-value">${prog.daysPerWeek}</div></div>
                    <div class="meta-item"><div class="meta-icon">🏁</div><div class="meta-label">Week</div><div class="meta-value">${e.currentWeek}/${prog.durationWeeks}</div></div>
                </div>
                <div class="program-progress">
                    <div class="progress-header">
                        <span class="progress-label">Day ${e.completedDays} of ${total}</span>
                        <span class="progress-pct">${pct}%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>
                <div class="program-cta">
                    ${done
                        ? `<button class="btn-program btn-completed" disabled>✅ Completed</button>`
                        : `<button class="btn-program btn-continue"
                            onclick="goToProgram('${prog.id}','${e.id}')">Continue →</button>`
                    }
                    <button class="btn-program btn-details"
                        onclick="goToProgram('${prog.id}','${e.id}')">
                        View Details
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ── Render available programs ────────────────────────────────────────────────
function renderPrograms(programs) {
    const grid = document.getElementById('programsGrid');
    if (!programs.length) {
        grid.innerHTML = '<div class="empty-section">No programs available yet.</div>';
        return;
    }

    grid.innerHTML = programs.map(prog => {
        const enrollment = myEnrollments.find(e => e.programId === prog.id);
        const isEnrolled = !!enrollment;
        const isDone     = isEnrolled && !enrollment.isActive;
        // Fallback programs have level/icon; API programs don't — derive them
        const level      = prog.level || deriveDifficulty(prog.durationWeeks, prog.daysPerWeek);
        const icon       = prog.icon  || '💪';
        const totalDays  = (prog.durationWeeks || 0) * (prog.daysPerWeek || 0);
        const pct        = (enrollment && totalDays) ? Math.round(enrollment.completedDays / totalDays * 100) : 0;

        return `
        <div class="program-card">
            <div class="program-header">
                <span class="program-badge">${level}</span>
                <h3 class="program-title">${esc(prog.title)}</h3>
            </div>
            <div class="program-body">
                <p class="program-description">${esc(prog.description || 'No description provided.')}</p>
                <div class="program-meta">
                    <div class="meta-item">
                        <div class="meta-icon">📅</div>
                        <div class="meta-label">Duration</div>
                        <div class="meta-value">${prog.durationWeeks} Weeks</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-icon">🎯</div>
                        <div class="meta-label">Level</div>
                        <div class="meta-value">${level}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-icon">📆</div>
                        <div class="meta-label">Days/Week</div>
                        <div class="meta-value">${prog.daysPerWeek}</div>
                    </div>
                </div>
                ${isEnrolled ? `
                <div class="program-progress">
                    <div class="progress-header">
                        <span class="progress-label">${isDone ? '✅ Completed' : 'Your progress'}</span>
                        <span class="progress-pct">${pct}%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>` : ''}
                <div class="program-cta">
                    ${isDone
                        ? `<button class="btn-program btn-completed" disabled>✅ Completed</button>`
                        : isEnrolled
                            ? `<button class="btn-program btn-enrolled" disabled>✓ Enrolled</button>`
                            : isFallback
                                ? `<button class="btn-program btn-enroll" disabled title="Seed DB first to enable enrolment">Seed DB to Enrol</button>`
                                : `<button class="btn-program btn-enroll"
                                    onclick="enroll('${prog.id}','${escAttr(prog.title)}')">
                                    Enroll Now
                                   </button>`
                    }
                    <button class="btn-program btn-details"
                        onclick="goToProgram('${prog.id}', '${isEnrolled ? enrollment.id : ''}')">
                        View Details
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function deriveDifficulty(weeks, daysPerWeek) {
    const load = (weeks || 4) * (daysPerWeek || 3);
    if (load >= 35) return 'Advanced';
    if (load >= 18) return 'Intermediate';
    return 'Beginner';
}

// ── Enroll ───────────────────────────────────────────────────────────────────
async function enroll(programId, title) {
    showConfirm({
        icon: '🏋️',
        title: 'Enroll in Program',
        message: `Ready to start <strong style="color:var(--gold-main)">${title}</strong>? Your progress will be tracked from today.`,
        okText: 'ENROLL NOW',
        cancelText: 'Not Yet',
        onOk: async () => {
            try {
        LoadingManager.show('Enrolling...');
        const res = await ProgramsAPI.enrollInProgram(programId);
        if (res.success) {
            Toast.success(`Enrolled in ${title}! 🎉`);
            await loadAll();
        }
            } catch (err) {
                if (err.message?.includes('already enrolled')) {
                    Toast.warning('You are already enrolled in this program');
                } else {
                    Toast.error(err.message || 'Failed to enroll');
                }
            } finally {
                LoadingManager.hide();
            }
        }
    });
}

// ── View program details ─────────────────────────────────────────────────────
// ── Navigate to program detail page ─────────────────────────────────────────
function goToProgram(programId, enrollmentId) {
    let url = `program-detail__1_.html?id=${programId}`;
    if (enrollmentId) url += `&enrollment=${enrollmentId}`;
    window.location.href = url;
}

function viewDetails(programId, title) {
    window.location.href = `program-detail__1_.html?id=${programId}&title=${encodeURIComponent(title)}`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'"); }

function handleLogout() {
    showConfirm({
        icon: '🚪',
        title: 'LOG OUT',
        message: 'Are you sure you want to log out of FlowFit Elite?',
        okText: 'LOG OUT',
        cancelText: 'Stay',
        danger: true,
        onOk: async () => {
            LoadingManager.show('Logging out...');
            await AuthAPI.logout();
        }
    });
}

document.addEventListener('DOMContentLoaded', loadAll);


/* ── CUSTOM CONFIRM MODAL ────────────────────────────────── */

/* ── SIDEBAR SCROLL-LOCK ──────────────────────────── */

function showConfirm({ icon = '⚠️', title = 'Are you sure?', message = '', okText = 'Confirm', cancelText = 'Cancel', danger = false, onOk }) {
    const ex = document.getElementById('ff-confirm');
    if (ex) ex.remove();
    const backdrop = document.createElement('div');
    backdrop.className = 'ff-confirm-backdrop';
    backdrop.id = 'ff-confirm';
    backdrop.innerHTML = `
        <div class="ff-confirm-box">
            <span class="ff-confirm-icon">${icon}</span>
            <div class="ff-confirm-title">${title}</div>
            <p class="ff-confirm-msg">${message}</p>
            <div class="ff-confirm-actions">
                <button class="ff-confirm-cancel" id="ffCancel">${cancelText}</button>
                <button class="ff-confirm-ok ${danger ? 'danger' : ''}" id="ffOk">${okText}</button>
            </div>
        </div>`;
    document.body.appendChild(backdrop);
    const close = () => {
        backdrop.style.opacity = '0';
        backdrop.style.pointerEvents = 'none';
        backdrop.style.visibility = 'hidden';
        if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
    };
    backdrop.querySelector('#ffCancel').addEventListener('click', e => { e.stopPropagation(); close(); });
    backdrop.querySelector('#ffOk').addEventListener('click', e => { e.stopPropagation(); close(); if (onOk) onOk(); });
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
    });
}

/* ── PLAN BADGE IN SIDEBAR ───────────────────────── */
function updatePlanBadge() {
    const user = TokenManager.getUser();
    const badge = document.getElementById('planBadge');
    if (!badge) return;
    const sub = user?.subscription || user?.plan || user?.role || '';
    const subUp = String(sub).toUpperCase();
    let cls = 'plan-free', label = 'FREE';
    if (subUp.includes('PREMIUM')) { cls = 'plan-premium'; label = '⭐ PREMIUM'; }
    else if (subUp.includes('PRO'))     { cls = 'plan-pro';     label = '🥇 PRO'; }
    else if (subUp.includes('TRIAL'))   { cls = 'plan-trial';   label = '⏳ TRIAL'; }
    else if (subUp === 'ADMIN')         { cls = 'plan-premium'; label = '🛡 ADMIN'; }
    badge.className = 'plan-badge ' + cls;
    badge.textContent = label;
    // Fetch fresh subscription from API
    SubscriptionAPI.getCurrentSubscription().then(r => {
        if (!r.success) return;
        const d = r.data || {};
        const plan = (d.plan || d.type || d.status || '').toUpperCase();
        let c2 = 'plan-free', l2 = 'FREE';
        if (plan.includes('PREMIUM')) { c2 = 'plan-premium'; l2 = '⭐ PREMIUM'; }
        else if (plan.includes('PRO')) { c2 = 'plan-pro'; l2 = '🥇 PRO'; }
        else if (plan.includes('TRIAL') || d.isTrial) { c2 = 'plan-trial'; l2 = '⏳ TRIAL'; }
        badge.className = 'plan-badge ' + c2;
        badge.textContent = l2;
        // Store in user object
        const u = TokenManager.getUser() || {};
        u.subscription = plan; u.subscriptionData = d;
        TokenManager.setUser(u);
    }).catch(() => {});
}



/* ── FLOWFIT SIDEBAR JS  ─────────────────────────────────────────────── */
(function() {
    'use strict';
    var _savedScrollY = 0;

    function openSidebar() {
        _savedScrollY = window.scrollY || window.pageYOffset || 0;
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('sidebarOverlay');
        if (!sb) return;
        sb.classList.add('mobile-active');
        sb.scrollTop = 0;            // always start from top when opening
        if (ov) ov.classList.add('active');
        document.body.classList.add('sidebar-open');
        document.body.style.top = '-' + _savedScrollY + 'px';
    }

    function closeSidebar() {
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('sidebarOverlay');
        if (!sb) return;
        sb.classList.remove('mobile-active');
        if (ov) ov.classList.remove('active');
        document.body.classList.remove('sidebar-open');
        document.body.style.top = '';
        window.scrollTo({ top: _savedScrollY, behavior: 'instant' });
    }

    function toggleSidebar() {
        var sb = document.getElementById('sidebar');
        if (!sb) return;
        sb.classList.contains('mobile-active') ? closeSidebar() : openSidebar();
    }

    // Close on nav-link tap (mobile)
    document.addEventListener('DOMContentLoaded', function() {
        var links = document.querySelectorAll('#sidebar .nav-link');
        links.forEach(function(link) {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) closeSidebar();
            });
        });
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSidebar();
    });

    // Expose globally
    window.openSidebar  = openSidebar;
    window.closeSidebar = closeSidebar;
    window.toggleSidebar = toggleSidebar;
})();

</script>
